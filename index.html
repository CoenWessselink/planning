<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CWS Planning - Interne testversie</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/responsive-v73.css">
</head>
<body data-cws-build="COMPLETE_GANTT_CAPACITY_MOBILE_STABILITY_BUILD" data-cws-previous-build="V87_SETTINGS_DEPARTMENT_DELETE_FIX" data-cws-legacy-builds="V86_COMPLETE_GANTT_CAPACITY_MOBILE_VISUAL_HARDENING">
  <div class="headerbar">
    <div class="left">
      <button class="btn" id="openApps">Apps Menu</button>
      <span class="pill">Rol: <span id="rolePill">Admin</span></span>
      <span class="pill">Afdeling: <span id="deptPill">Alle</span></span>
      <button class="btn" id="deptToggle">Wissel afdeling</button>
      <button class="btn" id="roleToggle">Wissel rol</button>
    </div>
    <div id="moduleTitle" style="font-size:24px">CWS Planning - Interne testversie</div>
    <div class="right">
      <span class="pill" id="storagePill">Opslag detecteren...</span>
      <span class="pill">Gebruiker: <span id="userPill">Identiteit laden...</span></span>
      <button class="btn" id="importExcel">Import Excel</button>
      <button class="btn" id="resetDemo">Demo data</button>
      <button class="btn" id="clearData">Data leegmaken</button>
    </div>
  </div>

  <div class="app-shell">
    <div class="storage-warning" id="storageWarning" hidden>
      Let op: je werkt nu met lokale browserdata. Collega's zien deze wijzigingen niet.
    </div>
    <div class="panel">
      <iframe id="appFrame" title="CWS Planning module" style="width:100%;height:calc(100vh - 140px);border:0;display:block"></iframe>
    </div>
  </div>

  <div class="modal-backdrop" id="appsBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        APPS MENU
        <button class="close" id="closeApps" aria-label="Sluiten">X</button>
      </div>
      <div class="modal-body"><div class="apps-grid" id="appsGrid"></div></div>
      <div class="footerbar" id="appsFooter">0 projecten | Pagina 1 van 1</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/core/store.js"></script>
  <script src="js/core/permissions.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/core/attention.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/mobile_adapter.js"></script>
  <script src="js/core/responsive.js"></script>
  <script src="js/core/apps_menu.js"></script>
  <script src="js/core/export.js"></script>
  <script src="js/core/import_excel.js"></script>
  <script>
    (async()=>{
      try{
        document.body.dataset.cwsBuild = "COMPLETE_GANTT_CAPACITY_MOBILE_STABILITY_BUILD";
        AppsMenu.render();
        AppsMenu.bind();
        CWS_ExcelImport.bind();
        CWS_MobileAdapter.bind();
        Router.boot();
        CWS_Responsive.bind();
        document.body.dataset.cwsShellReady = "true";

        await CWS.init();

        const refreshStatus = () => {
          const state = CWS.getState();
          document.getElementById("rolePill").textContent = state.ui.role;
          document.getElementById("deptPill").textContent = state.user?.dept || "Alle";
          document.getElementById("storagePill").textContent = "Opslag: " + CWS.storageStatus.label + (CWS.getRemoteVersion?.() ? ` v${CWS.getRemoteVersion()}` : "") + (CWS.storageStatus.booting ? " - laden..." : "");
          document.getElementById("userPill").textContent = CWS.getCurrentUser().email;
          const warning = document.getElementById("storageWarning");
          warning.hidden = CWS.storageStatus.mode === "api" && !CWS.storageStatus.unsynced;
          if(CWS.storageStatus.unsynced){
            const runtime = CWS.getRuntimeInfo?.() || {};
            const prefix = runtime.isPreviewDeployment ? "Previewdeployment: D1/Access kan ontbreken. " : "Let op: wijzigingen zijn nog niet gesynchroniseerd met D1. ";
            warning.textContent = prefix + (CWS.storageStatus.lastError || "") + (CWS.storageStatus.accessMissing ? " Cloudflare Access-identiteit ontbreekt." : "");
            if(CWS.storageStatus.conflictActionRequired){
              const msg = document.createElement("span");
              msg.textContent = "D1 conflict: kies hoe je verder wilt. ";
              const load = document.createElement("button");
              load.className = "btn";
              load.type = "button";
              load.textContent = "Serverversie laden";
              load.onclick = () => CWS.loadServerVersion?.();
              const retry = document.createElement("button");
              retry.className = "btn primary";
              retry.type = "button";
              retry.textContent = "Mijn wijziging opnieuw proberen";
              retry.onclick = () => CWS.retryRemoteSave?.("conflict-action-retry");
              const cancel = document.createElement("button");
              cancel.className = "btn";
              cancel.type = "button";
              cancel.textContent = "Annuleren";
              cancel.onclick = () => UI.toast("Conflict blijft open tot je herlaadt of opnieuw opslaat.");
              warning.replaceChildren(msg, load, retry, cancel);
            }
          }else{
            warning.textContent = "Let op: je werkt nu met lokale browserdata. Collega\'s zien deze wijzigingen niet.";
          }
          document.getElementById("roleToggle").hidden = CWS.storageStatus.mode === "api";
        };

        refreshStatus();
        CWS.subscribe(refreshStatus);
        AppsMenu.render();
        Router.markReady();
        document.body.dataset.cwsReady = "true";

        window.addEventListener("message", event => {
          if(event?.data?.type === "cws_apps_menu") AppsMenu.show();
        });

        document.getElementById("resetDemo").addEventListener("click", () => {
          if(!CWS.hasPermission("admin_settings")){
            CWS.audit("demo_data_attempt_blocked", { reason:"permission", role:CWS.getState().user?.role || "unknown" });
            return UI.toast("Alleen een beheerder kan demo data laden.");
          }
          const metrics = CWS.getStateMetrics?.() || {};
          CWS.audit("demo_data_attempt", { projectCount:Number(metrics.projectCount || 0) });
          const typed = prompt(`Demo data vervangt de huidige planning (${metrics.projectCount || 0} projecten). Typ exact DEMO OVERSCHRIJVEN om door te gaan.`);
          if(typed !== "DEMO OVERSCHRIJVEN") return UI.toast("Demo data geblokkeerd; bestaande planning blijft veilig.");
          CWS.recovery?.createRecoverySnapshot?.("before_demo_reset");
          CWS.resetDemo();
          try{
            const now = new Date().toISOString();
            localStorage.setItem("cws.v33.demoLoadedAt", now);
            localStorage.setItem("cws.v35.demoRequested", now);
          }catch(_e){}
          UI.toast("Demo data geladen.");
          setTimeout(()=>Router.loadApp("projecten"), 80);
        });

        document.getElementById("clearData").addEventListener("click", () => {
          if(!CWS.hasPermission("admin_settings")){
            CWS.audit("clear_data_attempt_blocked", { reason:"permission", role:CWS.getState().user?.role || "unknown" });
            return UI.toast("Alleen een beheerder kan alle data wissen.");
          }
          const metrics = CWS.getStateMetrics?.() || {};
          CWS.audit("clear_data_attempt", { projectCount:Number(metrics.projectCount || 0) });
          const typed = prompt(`Data leegmaken verwijdert de huidige planning (${metrics.projectCount || 0} projecten). Typ exact DATA LEEGMAKEN om door te gaan.`);
          if(typed !== "DATA LEEGMAKEN") return UI.toast("Data leegmaken geblokkeerd; bestaande planning blijft veilig.");
          if(!confirm("Alle CWS Planning-data verwijderen? Deze actie kan niet ongedaan worden gemaakt.")) return;
          CWS.recovery?.createRecoverySnapshot?.("before_clear_all");
          CWS.clearAll();
          try{ localStorage.removeItem("cws.v35.demoRequested"); localStorage.removeItem("cws.v33.demoLoadedAt"); }catch(_e){}
          UI.toast("Data geleegd.");
          Router.loadApp("projecten");
        });
      }catch(error){
        console.error("Boot failed", error);
        Router.showBootError?.(String(error.message || error));
        const warning = document.getElementById("storageWarning");
        warning.hidden = false;
        warning.textContent = `CWS Planning kon niet volledig starten: ${String(error.message || error)}`;
        document.body.dataset.cwsBootError = "true";
      }
    })();
  </script>
</body>
</html>
