<head>

  <title>Laag 5 - Capaciteit</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/patches.css">
  <style>
    :root{--line:#e5e7eb;--soft:#f8fafc;--text:#0f172a;--muted:#64748b;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;--blue:#0b5cac}
    html,body{height:100%;margin:0;background:#f5f7fb;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif}body{padding:14px}.cap-shell{background:#fff;border:1px solid #e2e8f0;border-radius:16px;box-shadow:0 10px 26px rgba(15,23,42,.08);overflow:hidden}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(#fff,#fbfdff)}h1{font-size:18px;margin:0 0 4px}p{margin:0;color:var(--muted);font-size:13px}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid var(--line);background:#fff}.left,.right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn,.select{height:38px;border:1px solid #d7dee8;border-radius:11px;background:#f8fafc;color:#111827;font-weight:700;padding:0 12px;font-size:13px}.select{background:#fff;min-width:150px}.btn{cursor:pointer}.btn:hover,.btn.active{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}.btn.primary{background:#e8f1ff;border-color:#9cc4ff;color:#0b5cac}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:8px 11px;font-size:12px;font-weight:800;color:#475569}.progress{width:180px;height:12px;border:1px solid #d7dee8;border-radius:999px;overflow:hidden;background:#f1f5f9}.fill{height:100%;background:var(--ok);width:0}.notice{margin:12px 18px;padding:10px 12px;border:1px solid #fed7aa;border-radius:11px;background:#fff7ed;color:#9a3412;font-weight:700;font-size:13px}.notice.hidden{display:none}.matrix-wrap{margin:0 18px 18px;border:1px solid var(--line);border-radius:13px;overflow:auto;background:#fff}.matrix{border-collapse:separate;border-spacing:0;min-width:1200px;width:max(100%,1200px);font-size:12px}.matrix th{position:sticky;top:0;z-index:4;background:linear-gradient(#fff,#f8fafc);height:48px;text-align:left;border-bottom:1px solid var(--line);padding:8px 10px;color:#334155;white-space:nowrap}.matrix td{height:42px;border-bottom:1px solid #eef2f7;padding:6px 10px;white-space:nowrap}.sticky{position:sticky;left:0;background:#fff;z-index:3;box-shadow:4px 0 10px rgba(15,23,42,.03)}.matrix th.sticky{z-index:6}.rowhead{font-weight:900}.subrow .sticky{padding-left:32px}.deptrow .sticky{background:#f8fafc}.available{background:#f8fafc;color:#334155}.ok{background:rgba(22,163,74,.14);color:#166534;font-weight:800}.warn{background:rgba(245,158,11,.18);color:#92400e;font-weight:800}.bad{background:rgba(220,38,38,.16);color:#991b1b;font-weight:800}.neg{font-weight:900}.muted{color:var(--muted)}.toggle{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border:1px solid #cbd5e1;border-radius:6px;margin-right:7px;background:#fff}.legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:0 18px 18px;color:#64748b;font-size:12px;font-weight:700}.sw{width:18px;height:12px;border-radius:4px;display:inline-block;border:1px solid #d1d5db}.why{cursor:pointer}.modalback{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:1000}.modalback.show{display:flex}.modal{width:min(860px,96vw);max-height:86vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 18px 60px rgba(15,23,42,.28);border:1px solid #e2e8f0}.modal-head,.modal-foot{padding:14px 16px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}.modal-foot{border-top:1px solid #e2e8f0;border-bottom:0;justify-content:flex-end}.modal-body{padding:16px}.detail-table{width:100%;border-collapse:collapse}.detail-table th,.detail-table td{border-bottom:1px solid #e5e7eb;text-align:left;padding:8px;font-size:13px}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#172033;color:#fff;border-radius:999px;padding:10px 14px;font-weight:800;font-size:13px;box-shadow:0 12px 30px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:.18s;z-index:1200}.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}@media print{@page{size:A3 landscape;margin:10mm}.toolbar,.notice,.legend,.modalback{display:none!important}body{padding:0;background:#fff}.cap-shell,.matrix-wrap{box-shadow:none;border:0;margin:0}.matrix th,.matrix td{font-size:10px;padding:4px 6px}.matrix{min-width:0}}
  </style>
</head>
<body>
  <div class="cap-shell" data-testid="capacity-root">
    <div class="head"><div><h1>Laag 5 — Capaciteit</h1><p>Beschikbaar uit Instellingen/Werknemers. Gepland uit Gantt-verdeling per dag. Klik op een cel voor WHY/details.</p></div><div class="right"><span class="pill" id="storagePill">Opslag controleren…</span><span class="pill" id="totalPill">Totaal uren: 0 / 0</span><div class="progress"><div class="fill" id="progressFill"></div></div><span class="pill" id="pctPill">0%</span></div></div>
    <div class="toolbar"><div class="left"><button class="btn" id="prevBtn">◀</button><span class="pill" id="weekLabel">W15 2026</span><button class="btn" id="nextBtn">▶</button><button class="btn active" data-weeks="6">6 weken</button><button class="btn" data-weeks="8">8 weken</button><button class="btn" data-weeks="12">12 weken</button><select class="select" id="statusSel"><option value="Alle">Alle statussen</option><option>Te plannen</option><option>Ingepland</option><option>In uitvoering</option><option>Gereed</option></select><select class="select" id="deptSel"><option value="">Alle afdelingen</option></select></div><div class="right"><button class="btn primary" id="refreshBtn">Herbereken</button><button class="btn" id="exportBtn">Export CSV</button><button class="btn" id="printBtn">Print A3</button></div></div>
    <div class="notice hidden" id="notice"></div>
    <div class="matrix-wrap"><table class="matrix" id="matrix"><thead><tr id="headRow"></tr></thead><tbody id="bodyRows"></tbody></table></div>
    <div class="legend"><span><span class="sw" style="background:rgba(22,163,74,.14)"></span> binnen capaciteit</span><span><span class="sw" style="background:rgba(245,158,11,.18)"></span> >85%</span><span><span class="sw" style="background:rgba(220,38,38,.16)"></span> overcapaciteit</span><span>SSOT: Projecturen → Gantt → Capaciteit</span></div>
  </div>
  <div class="modalback" id="modalBack"><div class="modal"><div class="modal-head"><b id="modalTitle">WHY</b><button class="btn" id="modalClose">Sluiten</button></div><div class="modal-body" id="modalBody"></div><div class="modal-foot"><button class="btn primary" id="modalOk">OK</button></div></div></div>
  <div class="toast" id="toast"></div>
  <script src="../js/core/ui.js"></script>
  <script>
  (function(){
    const CWS = window.parent?.CWS || window.CWS;
    const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
    const esc=s=>String(s??"").replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    const pad=n=>String(n).padStart(2,"0");
    const UI={year:2026,week:15,weeks:6,status:"Alle",dept:"",open:{}};
    function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toast.t); toast.t=setTimeout(()=>t.classList.remove("show"),2200); }
    function state(){ return CWS?.getState?.() || {projects:{order:[],byId:{},deptHours:[]},resources:{order:[],byId:{}},departments:{order:[],byId:{}},gantt:{hoursByDay:{},sourcesByDay:{}},settings:{tables:{}}}; }
    function parseWeekKey(key){ const m=String(key).match(/^(\d{4})-W(\d{1,2})$/); return m?{year:+m[1],week:+m[2]}:null; }
    function weekKey(y,w){ return `${y}-W${pad(w)}`; }
    function weekStartUTC(y,w){ const simple=new Date(Date.UTC(y,0,1+(w-1)*7)); const dow=simple.getUTCDay(); simple.setUTCDate(simple.getUTCDate()+(dow<=4?1-dow:8-dow)); return simple; }
    function iso(d){ return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`; }
    function addDays(d,n){ const x=new Date(d.getTime()); x.setUTCDate(x.getUTCDate()+n); return x; }
    function addWeeks(y,w,n){ let yy=y,ww=w+n; while(ww<1){yy--;ww+=52;} while(ww>52){yy++;ww-=52;} return {year:yy,week:ww}; }
    function weeks(){ return Array.from({length:UI.weeks},(_,i)=>addWeeks(UI.year,UI.week,i)); }
    function deptList(st=state()){ const set=new Set(); (st.departments?.order||[]).forEach(id=>{ const d=st.departments.byId[id]; if(d?.name) set.add(d.name); else set.add(id); }); (st.resources?.order||[]).forEach(id=>{ const d=st.resources.byId[id]?.dept; if(d) set.add(d); }); Object.values(st.gantt?.hoursByDay||{}).forEach(byDept=>Object.keys(byDept||{}).forEach(d=>set.add(d))); (st.projects?.deptHours||[]).forEach(r=>{ if(r.deptId) set.add(r.deptId); }); return [...set].filter(Boolean).sort(); }
    function projects(st=state()){ return (st.projects?.order||[]).map(id=>st.projects.byId[id]).filter(Boolean).filter(p=>UI.status==="Alle"||String(p.status||"")===UI.status); }
    function availableByDeptWeek(dept,wk){ try{ const x=CWS?.capacity?.computeDeptCapacityForWeek?.(weekKey(wk.year,wk.week)); if(x?.byDept) return Math.round(Number(x.byDept[dept]||0)*10)/10; }catch(e){} const st=state(); const emps=st.settings?.tables?.employees||[]; if(Array.isArray(emps)&&emps.length){ return emps.filter(e=>(e.dept||"")===dept && (e.active??true)!==false).reduce((s,e)=>s+["ma","di","wo","do","vr","za","zo"].reduce((a,k)=>a+(Number(e[k])||0),0),0); } return (st.resources?.order||[]).map(id=>st.resources.byId[id]).filter(r=>r?.dept===dept).reduce((s,r)=>s+(Number(r.daily)||0)*5,0); }
    function availableTotalWeek(wk){ return deptList().reduce((s,d)=>s+availableByDeptWeek(d,wk),0); }
    function dateRangeForWeek(wk){ const start=weekStartUTC(wk.year,wk.week); return {start:iso(start), end:iso(addDays(start,6))}; }
    let planCache = null;
    function buildPlanCache(ws){
      const st=state();
      const cache={total:{},dept:{},project:{},projectDept:{}};
      const ranges=ws.map(w=>({key:weekKey(w.year,w.week),...dateRangeForWeek(w)}));
      const ensure=(bucket,key)=> bucket[key] || (bucket[key]={hours:0,items:[]});
      const roundAll=(bucket)=>Object.values(bucket).forEach(v=>{ v.hours=Math.round((Number(v.hours)||0)*10)/10; });
      Object.entries(st.gantt?.sourcesByDay||{}).forEach(([date,byDept])=>{
        const wk=ranges.find(r=>date>=r.start && date<=r.end);
        if(!wk) return;
        Object.entries(byDept||{}).forEach(([d,arr])=>{
          (Array.isArray(arr)?arr:[]).forEach(item=>{
            const projectId=item?.projectId;
            const h=Number(item?.hours||0);
            if(!h) return;
            const row={date,dept:d,projectId,hours:h};
            const total=ensure(cache.total,wk.key); total.hours+=h; total.items.push(row);
            const byDept=ensure(cache.dept,`${d}|${wk.key}`); byDept.hours+=h; byDept.items.push(row);
            const byProject=ensure(cache.project,`${projectId}|${wk.key}`); byProject.hours+=h; byProject.items.push(row);
            const byProjectDept=ensure(cache.projectDept,`${projectId}|${d}|${wk.key}`); byProjectDept.hours+=h; byProjectDept.items.push(row);
          });
        });
      });
      roundAll(cache.total); roundAll(cache.dept); roundAll(cache.project); roundAll(cache.projectDept);
      return cache;
    }
    function plannedFor({projectId=null, dept=null, wk}){
      const key=weekKey(wk.year,wk.week);
      if(planCache){
        let hit;
        if(projectId && dept) hit=planCache.projectDept[`${projectId}|${dept}|${key}`];
        else if(projectId) hit=planCache.project[`${projectId}|${key}`];
        else if(dept) hit=planCache.dept[`${dept}|${key}`];
        else hit=planCache.total[key];
        return hit ? {hours:hit.hours,items:hit.items} : {hours:0,items:[]};
      }
      const st=state(), range=dateRangeForWeek(wk); let total=0, items=[];
      Object.entries(st.gantt?.sourcesByDay||{}).forEach(([date,byDept])=>{ if(date<range.start||date>range.end) return; Object.entries(byDept||{}).forEach(([d,arr])=>{ if(dept && d!==dept) return; (Array.isArray(arr)?arr:[]).forEach(item=>{ if(projectId && item.projectId!==projectId) return; const h=Number(item.hours||0); total+=h; items.push({date,dept:d,projectId:item.projectId,hours:h}); }); }); });
      return {hours:Math.round(total*10)/10,items};
    }
    function cls(planned, available){ if(!available) return planned>0?"warn":""; if(planned>available) return "bad"; if(planned>available*.85) return "warn"; return "ok"; }
    function cell(content, clsName="", why=null){ const td=document.createElement("td"); td.textContent=content; td.className=clsName+(why?" why":""); if(why) td.addEventListener("click",()=>showWhy(why)); return td; }
    function sticky(content, clsName=""){ const td=cell("",`sticky ${clsName}`); td.innerHTML=content; return td; }
    function renderHead(ws){ const tr=$("#headRow"); tr.innerHTML=""; const th=(txt,cls="")=>{ const e=document.createElement("th"); e.textContent=txt; e.className=cls; return e; }; tr.append(th("Project / afdeling","sticky"), th("Status")); ws.forEach(w=>tr.append(th(`W${pad(w.week)} ${w.year}`))); tr.append(th("Totaal")); }
    function addDeptSummaryRows(tb, ws, depts){ depts.forEach(dept=>{ const planned=ws.map(w=>plannedFor({dept,wk:w}).hours); const available=ws.map(w=>availableByDeptWeek(dept,w)); const trA=document.createElement("tr"); trA.className="deptrow"; trA.append(sticky(`<span class="rowhead">Beschikbaar ${esc(dept)}</span>`,"rowhead"),cell("")); available.forEach(v=>trA.append(cell(v,"available"))); trA.append(cell(Math.round(available.reduce((a,b)=>a+b,0)*10)/10,"available rowhead")); tb.append(trA); const trP=document.createElement("tr"); trP.className="deptrow"; trP.append(sticky(`<span class="rowhead">Gepland ${esc(dept)}</span>`,"rowhead"),cell("")); planned.forEach((v,i)=>trP.append(cell(v,cls(v,available[i]),{type:"dept",dept,wk:ws[i]}))); trP.append(cell(Math.round(planned.reduce((a,b)=>a+b,0)*10)/10,"rowhead")); tb.append(trP); const trS=document.createElement("tr"); trS.className="deptrow"; trS.append(sticky(`<span class="rowhead">Saldo ${esc(dept)}</span>`,"rowhead"),cell("")); available.forEach((a,i)=>{ const saldo=Math.round((a-planned[i])*10)/10; trS.append(cell(saldo,saldo<0?"bad neg":"ok")); }); trS.append(cell(Math.round(available.reduce((a,b)=>a+b,0)-planned.reduce((a,b)=>a+b,0))*10/10,"rowhead")); tb.append(trS); }); }
    function renderBody(ws){ const st=state(), tb=$("#bodyRows"); tb.innerHTML=""; const depts=deptList(st).filter(d=>!UI.dept||d===UI.dept); addDeptSummaryRows(tb,ws,depts); projects(st).forEach(p=>{ const pid=p.id; const open=UI.open[pid]!==false; const tr=document.createElement("tr"); tr.append(sticky(`<button class="toggle" data-toggle="${esc(pid)}">${open?"−":"+"}</button><span class="rowhead">${esc(p.nr||p.code||pid)} | ${esc(p.name||"Project")}</span>`), cell(p.status||"")); let total=0; ws.forEach(w=>{ const x=plannedFor({projectId:pid,wk:w}); total+=x.hours; tr.append(cell(x.hours,cls(x.hours,availableTotalWeek(w)),{type:"project",projectId:pid,wk:w})); }); tr.append(cell(Math.round(total*10)/10,"rowhead")); tb.append(tr); if(open){ depts.forEach(dept=>{ const sr=document.createElement("tr"); sr.className="subrow"; sr.append(sticky(esc(dept)),cell("")); let sub=0; ws.forEach(w=>{ const x=plannedFor({projectId:pid,dept,wk:w}); sub+=x.hours; sr.append(cell(x.hours,cls(x.hours,availableByDeptWeek(dept,w)),{type:"projectDept",projectId:pid,dept,wk:w})); }); sr.append(cell(Math.round(sub*10)/10,"rowhead")); tb.append(sr); }); } }); $$('[data-toggle]').forEach(b=>b.onclick=()=>{ UI.open[b.dataset.toggle]=!(UI.open[b.dataset.toggle]!==false); render(); }); const trT=document.createElement("tr"); trT.append(sticky(`<span class="rowhead">Totaal gepland</span>`,"rowhead"),cell("")); let grand=0; ws.forEach(w=>{ const v=plannedFor({wk:w}).hours; grand+=v; trT.append(cell(v,cls(v,availableTotalWeek(w)),{type:"total",wk:w})); }); trT.append(cell(Math.round(grand*10)/10,"rowhead")); tb.append(trT); const trS=document.createElement("tr"); trS.append(sticky(`<span class="rowhead">Saldo totaal</span>`,"rowhead"),cell("")); let saldoGrand=0; ws.forEach(w=>{ const saldo=availableTotalWeek(w)-plannedFor({wk:w}).hours; saldoGrand+=saldo; trS.append(cell(Math.round(saldo*10)/10,saldo<0?"bad neg":"ok")); }); trS.append(cell(Math.round(saldoGrand*10)/10,"rowhead")); tb.append(trS); }
    function updateTop(ws){ const planned=ws.reduce((s,w)=>s+plannedFor({wk:w}).hours,0); const available=ws.reduce((s,w)=>s+availableTotalWeek(w),0); const pct=available?Math.round(planned/available*100):0; $("#totalPill").textContent=`Totaal uren: ${Math.round(planned*10)/10} / ${Math.round(available*10)/10}`; $("#pctPill").textContent=`${pct}%`; $("#progressFill").style.width=Math.min(100,pct)+"%"; $("#progressFill").style.background=pct>100?"#dc2626":pct>85?"#f59e0b":"#16a34a"; $("#weekLabel").textContent=`W${pad(UI.week)} ${UI.year}`; const status=CWS?.storageStatus; $("#storagePill").textContent=status?.mode==="api"?`D1 gedeeld v${CWS.getRemoteVersion?.()||0}`:"Lokale data"; }
    function showWhy(why){ const st=state(); const wk=why.wk; const titleParts=[`W${pad(wk.week)} ${wk.year}`]; if(why.dept) titleParts.push(why.dept); if(why.projectId) titleParts.push(st.projects?.byId?.[why.projectId]?.name||why.projectId); $("#modalTitle").textContent="WHY — " + titleParts.join(" / "); let x; if(why.type==="dept") x=plannedFor({dept:why.dept,wk}); else if(why.type==="project") x=plannedFor({projectId:why.projectId,wk}); else if(why.type==="projectDept") x=plannedFor({projectId:why.projectId,dept:why.dept,wk}); else x=plannedFor({wk}); const rows=x.items.map(i=>`<tr><td>${esc(i.date)}</td><td>${esc(i.dept)}</td><td>${esc(st.projects?.byId?.[i.projectId]?.nr||i.projectId)}</td><td>${esc(st.projects?.byId?.[i.projectId]?.name||"")}</td><td>${Math.round(i.hours*10)/10}</td></tr>`).join(""); $("#modalBody").innerHTML= rows?`<table class="detail-table"><thead><tr><th>Datum</th><th>Afdeling</th><th>Project</th><th>Naam</th><th>Uren</th></tr></thead><tbody>${rows}</tbody></table>`:`<p class="muted">Geen Gantt-bronregels gevonden. Genereer of controleer eerst de Gantt-planning.</p>`; $("#modalBack").classList.add("show"); }
    let rendering = false;
    let queuedRender = false;
    let lastRenderError = null;
    let firstRenderDone = false;
    function showError(error){
      const n=$("#notice");
      if(!n) return;
      lastRenderError = String(error?.message || error || "Onbekende fout");
      n.textContent = "Capaciteit kon niet volledig tekenen: " + lastRenderError + ". Probeer Herbereken of laad Demo data opnieuw.";
      n.classList.remove("hidden");
      try{ console.error("[CWS Capaciteit]", error); }catch(_e){}
    }
    function safeRender(){
      if(rendering){ queuedRender = true; return; }
      rendering = true;
      try{
        if(!CWS?.getState){
          $("#notice").textContent="CWS Store is niet geladen.";
          $("#notice").classList.remove("hidden");
          return;
        }
        const st=state();
        const depts=deptList(st);
        $("#deptSel").innerHTML='<option value="">Alle afdelingen</option>'+depts.map(d=>`<option value="${esc(d)}" ${UI.dept===d?"selected":""}>${esc(d)}</option>`).join("");
        $("#statusSel").value=UI.status;
        const ws=weeks();
        planCache = buildPlanCache(ws);
        renderHead(ws);
        renderBody(ws);
        updateTop(ws);
        const hasSource=Object.keys(st.gantt?.sourcesByDay||{}).length>0;
        const n=$("#notice");
        if(!hasSource){
          n.textContent="Nog geen Gantt-urenverdeling gevonden. Open Laag 4, klik 'Genereer fasen' en daarna 'Herbereken uren'.";
          n.classList.remove("hidden");
        } else if(!lastRenderError) {
          n.classList.add("hidden");
        }
        firstRenderDone = true;
      }catch(error){
        showError(error);
      }finally{
        rendering = false;
        if(queuedRender){
          queuedRender = false;
          requestAnimationFrame(safeRender);
        }
      }
    }
    function render(){ safeRender(); }
    function scheduleRender(){ requestAnimationFrame(safeRender); }
    function exportCsv(){ const lines=[]; lines.push($$("#matrix thead th").map(th=>th.textContent.trim())); $$("#matrix tbody tr").forEach(tr=>lines.push($$("td",tr).map(td=>td.textContent.trim()))); if(window.UI?.downloadCSV) UI.downloadCSV("capaciteit.csv",lines); else { const csv=lines.map(r=>r.map(c=>`"${String(c).replaceAll('"','""')}"`).join(",")).join("\n"); const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="capaciteit.csv"; a.click(); URL.revokeObjectURL(a.href);} }
    function bind(){ const st=state(); if(st.ui?.week){ UI.year=st.ui.week.year||UI.year; UI.week=st.ui.week.week||UI.week; } $("#prevBtn").onclick=()=>{ const x=addWeeks(UI.year,UI.week,-1); UI.year=x.year; UI.week=x.week; render(); }; $("#nextBtn").onclick=()=>{ const x=addWeeks(UI.year,UI.week,1); UI.year=x.year; UI.week=x.week; render(); }; $$('[data-weeks]').forEach(b=>b.onclick=()=>{UI.weeks=Number(b.dataset.weeks); $$('[data-weeks]').forEach(x=>x.classList.toggle('active',x===b)); render();}); $("#statusSel").onchange=e=>{UI.status=e.target.value; render();}; $("#deptSel").onchange=e=>{UI.dept=e.target.value; render();}; $("#refreshBtn").onclick=()=>{ try{ CWS?.gantt?.recalculateHours?.(); lastRenderError=null; toast("Capaciteit herberekend"); }catch(error){ showError(error); } render();}; $("#exportBtn").onclick=exportCsv; $("#printBtn").onclick=()=>window.print(); $("#modalClose").onclick=$("#modalOk").onclick=()=>$("#modalBack").classList.remove("show"); $("#modalBack").onclick=e=>{ if(e.target.id==="modalBack") $("#modalBack").classList.remove("show"); }; if(CWS?.subscribe) CWS.subscribe(()=>scheduleRender()); }
    try{ bind(); render(); }catch(error){ showError(error); }
  })();
  </script>
</body>
