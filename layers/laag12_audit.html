
<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <title>CWS – Audit log</title>
  <link rel="stylesheet" href="../css/theme.css"/>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>Audit log</h1>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Tijd</th><th>Gebruiker</th><th>Rol</th><th>Actie</th><th>Details</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>(function(){
  var parentCws = null;
  try{ parentCws = (window.parent && window.parent !== window) ? window.parent.CWS : null; }catch(_e){ parentCws = null; }
  if(parentCws){ window.CWS = parentCws; window.CWS_PARENT_BRIDGED = true; }
  else if(!window.CWS){ document.write('<script src="../js/core/store.js"><\/script>'); }
})();
var CWS = window.CWS;</script>
<script>
(function(){
  try{
    var requested = localStorage.getItem("cws.v35.demoRequested") || localStorage.getItem("cws.v33.demoLoadedAt");
    var st = window.CWS && window.CWS.getState ? window.CWS.getState() : null;
    if(requested && window.CWS && typeof window.CWS.resetDemo === "function" && (!st || !st.projects || !Array.isArray(st.projects.order) || st.projects.order.length === 0)){
      window.CWS.resetDemo();
      console.info("CWS V35 fallback: demo-data lokaal opnieuw geladen voor module.");
    }
  }catch(e){ console.warn("CWS V35 fallback demo-load mislukt", e); }
})();
</script>

<script src="../js/core/ui.js"></script>
<script>
async function render(){
  const rows = document.getElementById("rows");
  rows.innerHTML="";
  let log = CWS.getState().auditLog || [];
  if(CWS.storageStatus?.mode === "api"){
    try{
      const response = await fetch("/api/audit", { headers:{ "Accept":"application/json" } });
      const data = await response.json();
      if(response.ok && data.ok){
        log = data.items.map(item => ({
          ts:item.created_at,
          user:item.actor_email,
          role:"",
          action:item.action,
          meta:item.metadata
        })).reverse();
      }
    }catch(_){}
  }
  log.slice().reverse().forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML = `<td>${r.ts}</td><td>${r.user}</td><td>${r.role}</td><td>${r.action}</td><td>${JSON.stringify(r.meta||{})}</td>`;
    rows.appendChild(tr);
  });
}
render();
</script>
</body>
</html>
