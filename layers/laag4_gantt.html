  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/patches.css">
  <style>
    :root{--rowH:48px;--headH:102px;--dayW:34px;--leftW:1120px;--blue:#2f6fbd;--dark:#172033;--line:#e5e7eb;--soft:#f8fafc;--text:#0f172a;--muted:#64748b;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626}
    html,body{height:100%;margin:0;background:#f5f7fb;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
    body{padding:14px}
    .gantt-shell{background:#fff;border:1px solid #e2e8f0;border-radius:16px;box-shadow:0 10px 26px rgba(15,23,42,.08);overflow:hidden}
    .module-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(#fff,#fbfdff)}
    .module-head h1{font-size:18px;margin:0 0 4px 0}.module-head p{margin:0;color:var(--muted);font-size:13px}.status{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.badge{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:#fff;color:var(--muted);font-size:12px;font-weight:700}.badge.ok{color:#166534;background:#ecfdf5;border-color:#bbf7d0}.badge.warn{color:#92400e;background:#fffbeb;border-color:#fde68a}.badge.bad{color:#991b1b;background:#fef2f2;border-color:#fecaca}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--line);background:#fff}.toolbar-group{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding-right:8px;border-right:1px solid var(--line)}.toolbar-group:last-child{border-right:0}.input,.select{height:38px;min-width:150px;border:1px solid #d7dee8;border-radius:11px;background:#fff;color:#0f172a;padding:0 10px;font-size:13px;outline:none}.select.project{min-width:260px}.btn{height:38px;border:1px solid #d7dee8;border-radius:11px;background:#f8fafc;color:#111827;font-weight:700;padding:0 12px;font-size:13px;cursor:pointer;white-space:nowrap}.btn:hover{background:#eff6ff;border-color:#bfdbfe}.btn.primary{background:#e8f1ff;border-color:#9cc4ff;color:#0b5cac}.btn.active{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}.btn.danger{background:#fff7ed;border-color:#fed7aa;color:#9a3412}.btn:disabled{opacity:.55;cursor:not-allowed}
    .notice{margin:12px 18px;padding:10px 12px;border:1px solid #fed7aa;border-radius:11px;background:#fff7ed;color:#9a3412;font-weight:700;font-size:13px}.notice.hidden{display:none}.meta-line{display:flex;justify-content:center;color:#7b8797;font-size:12px;padding:8px 18px 12px 18px}
    .board-wrap{margin:0 18px 18px;border:1px solid var(--line);border-radius:13px;overflow:auto;background:#fff;position:relative}.board{display:grid;grid-template-columns:minmax(620px,var(--leftW)) max-content;min-width:1180px}.board.table-only{grid-template-columns:1fr}.board.table-only .chart-pane{display:none}.board.diagram-only{grid-template-columns:max-content}.board.diagram-only .table-pane{display:none}.table-pane{position:sticky;left:0;z-index:5;background:#fff;border-right:1px solid var(--line);box-shadow:4px 0 10px rgba(15,23,42,.03)}
    table{border-collapse:separate;border-spacing:0;width:100%;font-size:12px}.gantt-table thead th{height:var(--headH);vertical-align:bottom;position:sticky;top:0;z-index:7;background:linear-gradient(#fff,#f8fafc);border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;color:#334155;white-space:nowrap}.gantt-table tbody tr{height:var(--rowH)}.gantt-table td{height:var(--rowH);padding:0 8px;border-bottom:1px solid #eef2f7;vertical-align:middle;white-space:nowrap}.gantt-table tr:hover td{background:#f8fbff}.gantt-table tr.selected td{background:#eaf3ff}.taskcell{display:flex;align-items:center;gap:6px;min-width:230px}.twisty{width:16px;text-align:center;color:#334155}.taskname{border:0;background:transparent;height:34px;min-width:160px;width:100%;font-weight:650}.taskname:focus,.cellinput:focus{outline:2px solid #bfdbfe;border-radius:8px;background:#fff}.summary .taskname{font-weight:900}.cellinput{border:0;background:transparent;height:34px;width:100%;min-width:74px}.smallinput{min-width:56px;width:66px}.color-select,.resource-select,.dept-select{width:100%;height:34px;border:0;background:transparent}.lockbox{width:18px;height:18px}.row-actions{display:flex;gap:5px;align-items:center;justify-content:center}.iconbtn{width:28px;height:28px;border:1px solid #d7dee8;border-radius:8px;background:#fff;color:#0f172a;font-weight:900;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}.iconbtn:hover{background:#eff6ff;border-color:#93c5fd}.iconbtn.danger:hover{background:#fef2f2;border-color:#fca5a5;color:#991b1b}.iconbtn:disabled{opacity:.45;cursor:not-allowed}.chart-pane{min-width:900px;position:relative;background:#fff}.timeline{height:var(--headH);position:sticky;top:0;z-index:4;background:linear-gradient(#fff,#f8fafc);border-bottom:1px solid var(--line);display:grid;grid-template-rows:34px 34px 34px}.tl-row{display:grid;min-width:max-content}.tl-cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;color:#475569;font-weight:700}.tl-cell.day.weekend{background:#fafafa;color:#94a3b8}.tl-cell.today{background:#fef2f2;color:#b91c1c}.lane{height:var(--rowH);position:relative;border-bottom:1px solid #eef2f7;background-image:linear-gradient(to right,#e7ecf3 1px,transparent 1px);background-size:var(--dayW) 100%}.lane:nth-child(even){background-color:#fbfdff}.bar{position:absolute;top:2px;height:45px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;padding:0 9px;font-size:12px;font-weight:800;box-shadow:0 4px 10px rgba(47,111,189,.22);cursor:grab;overflow:hidden}.bar.locked{opacity:.65;filter:grayscale(.25);cursor:not-allowed}.bar.critical{box-shadow:0 0 0 2px rgba(220,38,38,.65),0 4px 10px rgba(47,111,189,.22)}.bar.summary{background:transparent!important;box-shadow:none;cursor:default;color:#111827;padding:0}.bar.summary:before{content:"";position:absolute;left:0;right:0;top:20px;border-top:4px solid rgba(15,23,42,.90);border-radius:2px}.bar.summary:after{content:"";position:absolute;left:0;right:0;top:29px;border-top:2px solid rgba(15,23,42,.85);border-radius:2px}.bar-label{position:relative;z-index:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar-progress{position:absolute;left:0;top:0;bottom:0;background:rgba(187,247,208,.62);border-right:2px solid rgba(22,101,52,.72);z-index:1;pointer-events:none}.bar-progress.done{background:rgba(220,252,231,.82)}.bar-feedback-dot{position:absolute;right:5px;top:5px;width:14px;height:14px;border-radius:999px;background:#fff;color:#1d4ed8;border:1px solid rgba(29,78,216,.35);font-size:10px;line-height:12px;text-align:center;font-weight:900;z-index:3;box-shadow:0 1px 3px rgba(15,23,42,.18)}.handle{position:absolute;top:0;width:8px;height:100%;background:rgba(255,255,255,.26);cursor:ew-resize}.handle.left{left:0}.handle.right{right:0}.summary .handle{display:none}.baseline{position:absolute;height:7px;border-radius:4px;background:#111827;opacity:.32;bottom:3px}.dep-svg{position:absolute;left:0;top:var(--headH);width:100%;height:calc(100% - var(--headH));pointer-events:none;overflow:visible}.empty{margin:18px;padding:24px;border:1px dashed #cbd5e1;border-radius:14px;text-align:center;color:#64748b;background:#f8fafc}.context{margin:0 18px 18px;border:1px solid var(--line);border-radius:13px;background:#fff;overflow:hidden}.context-head{padding:11px 13px;border-bottom:1px solid var(--line);font-weight:900}.context-body{padding:12px;color:#475569;font-size:13px}.ctx-grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px}.ctx-card{border:1px solid #e2e8f0;border-radius:10px;padding:9px;background:#f8fafc}.ctx-card b{display:block;color:#0f172a;margin-bottom:3px}.modalback{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:1000}.modalback.show{display:flex}.modal{width:min(920px,96vw);max-height:88vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 18px 60px rgba(15,23,42,.28);border:1px solid #e2e8f0}.modal-head,.modal-foot{padding:14px 16px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}.modal-foot{border-top:1px solid #e2e8f0;border-bottom:0;justify-content:flex-end;gap:8px}.modal-body{padding:16px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:5px;font-size:12px;color:#64748b;font-weight:700}.field input,.field select,.field textarea{height:38px;border:1px solid #d7dee8;border-radius:10px;padding:0 10px;background:#fff}.field textarea{height:76px;padding:10px;resize:vertical}.gantt-context-menu{position:fixed;z-index:1600;min-width:230px;background:#fff;border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 18px 48px rgba(15,23,42,.22);padding:6px;display:none}.gantt-context-menu.show{display:block}.gantt-context-menu button{width:100%;height:34px;border:0;background:#fff;border-radius:9px;text-align:left;padding:0 10px;font-size:13px;font-weight:700;color:#0f172a;cursor:pointer}.gantt-context-menu button:hover{background:#eff6ff;color:#1d4ed8}.gantt-context-menu button.danger:hover{background:#fef2f2;color:#991b1b}.gantt-context-menu .sep{height:1px;background:#e5e7eb;margin:5px 4px}.gantt-context-menu .title{font-size:11px;font-weight:900;color:#64748b;padding:6px 10px 4px;text-transform:uppercase;letter-spacing:.04em}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#172033;color:#fff;border-radius:999px;padding:10px 14px;font-weight:800;font-size:13px;box-shadow:0 12px 30px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:.18s;z-index:1200}.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}@media print{@page{size:A3 landscape;margin:10mm}.toolbar,.notice,.context,.module-head .status{display:none!important}body{padding:0;background:#fff}.gantt-shell,.board-wrap{box-shadow:none;border:0;margin:0}.board{min-width:0}.table-pane{position:relative}.chart-pane{overflow:visible}.bar{print-color-adjust:exact;-webkit-print-color-adjust:exact}}
    /* V79 pointer targets: make move/resize reliable without changing print geometry. */
    .bar:not(.summary){padding-left:12px;padding-right:12px;touch-action:none;user-select:none}
    .bar:not(.summary):active{cursor:grabbing}
    .bar-label,.bar-feedback-dot{pointer-events:none}
    .handle{width:14px;z-index:4;touch-action:none;background:rgba(255,255,255,.20)}
    .handle.left{border-radius:8px 0 0 8px}
    .handle.right{border-radius:0 8px 8px 0}
    .handle:hover{background:rgba(255,255,255,.42)}

    /* V12 Gantt alignment fix
       The left task table has 11 columns. In V11 the table was wider than the
       760px grid column, so its text visually flowed into the timeline and
       over the bars. Keep the table and chart in two hard columns. */
    .board{grid-template-columns:var(--leftW) max-content;min-width:calc(var(--leftW) + 900px)}
    .table-pane{width:var(--leftW);min-width:var(--leftW);max-width:var(--leftW);overflow:hidden;z-index:12}
    .chart-pane{z-index:1;overflow:hidden}
    .gantt-table{table-layout:fixed;width:var(--leftW);min-width:var(--leftW);max-width:var(--leftW)}
    .gantt-table th,.gantt-table td{overflow:hidden;text-overflow:ellipsis;max-width:0}
    .gantt-table th:nth-child(1),.gantt-table td:nth-child(1){width:100px}
    .gantt-table th:nth-child(2),.gantt-table td:nth-child(2){width:250px}
    .gantt-table th:nth-child(3),.gantt-table td:nth-child(3){width:100px}
    .gantt-table th:nth-child(4),.gantt-table td:nth-child(4){width:100px}
    .gantt-table th:nth-child(5),.gantt-table td:nth-child(5){width:60px}
    .gantt-table th:nth-child(6),.gantt-table td:nth-child(6){width:90px}
    .gantt-table th:nth-child(7),.gantt-table td:nth-child(7){width:105px}
    .gantt-table th:nth-child(8),.gantt-table td:nth-child(8){width:100px}
    .gantt-table th:nth-child(9),.gantt-table td:nth-child(9){width:90px}
    .gantt-table th:nth-child(10),.gantt-table td:nth-child(10){width:75px}
    .gantt-table th:nth-child(11),.gantt-table td:nth-child(11){width:50px}
    .taskcell{min-width:0;width:100%;overflow:hidden}.taskname{min-width:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}.cellinput,.color-select,.resource-select,.dept-select{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar{z-index:6;min-width:18px;contain:layout paint}.bar-label{min-width:0;max-width:100%;display:block;pointer-events:none;text-shadow:0 1px 1px rgba(15,23,42,.25)}.bar.summary{z-index:5}.baseline{z-index:4}.dep-svg{z-index:3}.handle{z-index:8}
    .board-wrap{scrollbar-gutter:stable both-edges}.timeline{z-index:4}.gantt-table thead th{z-index:13}
    @media (max-width: 1280px){:root{--leftW:1040px}.gantt-table th:nth-child(2),.gantt-table td:nth-child(2){width:220px}.gantt-table th:nth-child(7),.gantt-table td:nth-child(7){width:95px}.gantt-table th:nth-child(8),.gantt-table td:nth-child(8){width:95px}.gantt-table th:nth-child(9),.gantt-table td:nth-child(9){width:80px}.gantt-table th:nth-child(10),.gantt-table td:nth-child(10){width:65px}}
  

    /* V14 Gantt table/diagram/print refinements */
    :root{--print-scale:1;--print-chart-w:1000px}
    .toolbar-group.columns-group{border-right:1px solid var(--line)}
    .gantt-table{table-layout:fixed}
    .gantt-table th,.gantt-table td{box-sizing:border-box}
    .gantt-table th[data-col],.gantt-table td[data-col]{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .gantt-table input,.gantt-table select{max-width:100%;min-width:0}
    .taskcell{min-width:0;width:100%;overflow:hidden}
    .taskname{min-width:0;overflow:hidden;text-overflow:ellipsis}
    .lane{background-image:repeating-linear-gradient(to right, rgba(15,23,42,.13) 0 1px, transparent 1px var(--dayW)), repeating-linear-gradient(to right, rgba(15,23,42,.28) 0 2px, transparent 2px calc(var(--dayW) * 7));}
    .tl-cell{border-right-color:#d0d7e2;border-bottom-color:#d0d7e2}
    .bar{z-index:6;font-size:14px;line-height:1.1;text-shadow:0 1px 1px rgba(0,0,0,.26)}
    .bar-label{display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar.summary{height:45px;overflow:visible;text-shadow:none;z-index:5}
    .bar.summary:before{top:28px;border-top-width:4px}
    .bar.summary:after{top:36px;border-top-width:2px}
    .bar.summary .bar-label{position:absolute;left:0;top:3px;max-width:min(420px,100%);padding:2px 7px;border:1px solid #111827;border-radius:4px;background:#fff;color:#111827;font-size:13px;line-height:16px;font-weight:900;box-shadow:0 1px 0 rgba(255,255,255,.95);}
    .dep-svg{z-index:3}.dep-svg path{vector-effect:non-scaling-stroke}.baseline{z-index:4}.today-line{position:absolute;top:0;bottom:0;width:2px;background:#dc2626;z-index:12;pointer-events:none;box-shadow:0 0 0 1px rgba(220,38,38,.20)}
    .today-line::before{content:"Vandaag";position:absolute;top:3px;left:4px;background:#dc2626;color:#fff;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:900;white-space:nowrap}
    .print-legend{display:none;margin:0 18px 18px;border:1px solid #111827;background:#fff;color:#111827;font-size:11px}.print-legend .legend-title{font-weight:900;padding:6px 8px;border-bottom:1px solid #111827}.legend-items{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:6px 12px;padding:7px 8px}.legend-item{display:flex;align-items:center;gap:6px;min-width:0}.legend-swatch{width:30px;height:12px;border:1px solid #111827;flex:0 0 auto}.legend-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.legend-diamond{width:10px;height:10px;border:1px solid #111827;transform:rotate(45deg);background:#fff;margin-left:10px;margin-right:10px;flex:0 0 auto}
    @media print{
      @page{size:A3 landscape;margin:8mm}
      html,body{height:auto!important;overflow:visible!important;background:#fff!important}
      body{padding:0!important;color:#000!important}
      .gantt-shell{border:0!important;border-radius:0!important;box-shadow:none!important;overflow:visible!important}
      .module-head{padding:4px 6px 8px 6px!important;border-bottom:0!important;background:#fff!important;text-align:center!important}
      .module-head h1{font-size:12px!important;margin:0!important}.module-head p{font-size:8px!important;color:#000!important}.module-head .status,.toolbar,.notice,.context,.table-pane{display:none!important}
      .meta-line{font-size:7px!important;padding:2px 0 4px!important;color:#000!important}.board-wrap{margin:0!important;border:0!important;border-radius:0!important;overflow:visible!important;background:#fff!important}.board{display:block!important;min-width:0!important}.board.diagram-only{display:block!important}.chart-pane{display:block!important;min-width:0!important;overflow:visible!important;background:#fff!important}.timeline{position:relative!important;top:auto!important;height:54px!important;grid-template-rows:18px 18px 18px!important;background:#fff!important}.tl-cell{font-size:6px!important;color:#000!important;border-color:#777!important}.lane{height:30px!important;border-bottom:1px solid #bbb!important;background-image:repeating-linear-gradient(to right,#777 0 1px,transparent 1px var(--dayW)),repeating-linear-gradient(to right,#000 0 2px,transparent 2px calc(var(--dayW) * 7))!important}.bar{top:4px!important;height:18px!important;border-radius:2px!important;font-size:6px!important;padding:0 3px!important;box-shadow:none!important;text-shadow:none!important;border:1px solid #111!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.bar.summary{height:28px!important;border:0!important}.bar.summary:before{top:13px!important;border-top:2px solid #111!important}.bar.summary:after{top:18px!important;border-top:1px solid #111!important}.bar.summary .bar-label{top:0!important;font-size:6px!important;line-height:8px!important;padding:0 2px!important;border:1px solid #111!important}.handle{display:none!important}.dep-svg{top:54px!important;height:calc(100% - 54px)!important}.dep-svg path{stroke:#777!important;stroke-width:.8!important}.today-line{width:1.5px!important;background:#dc2626!important}.today-line::before{display:none!important}.print-legend{display:block!important;margin:6px 0 0!important;break-inside:avoid;page-break-inside:avoid}.legend-title{font-size:8px!important;padding:3px 4px!important}.legend-items{grid-template-columns:repeat(6,minmax(95px,1fr))!important;gap:3px 6px!important;padding:4px!important}.legend-item{font-size:7px!important}.legend-swatch{width:22px!important;height:8px!important}.legend-diamond{width:7px!important;height:7px!important;margin-left:5px;margin-right:5px}
    }


    /* V16 — Gantt kalender/print volledig herzien
       Doelen: kalender vult zichtbaar diagram, daglijnen dun maar zichtbaar,
       taakrijen gescheiden, A3-print vult de pagina en gebruikt exact projectbereik. */
    .chart-pane{min-width:100%;overflow:visible;background:#fff}
    #timeline,#lanes{min-width:100%;background:#fff}
    .tl-cell{border-right:1px solid rgba(15,23,42,.16)!important;border-bottom:1px solid rgba(15,23,42,.16)!important}
    .tl-row:nth-child(1) .tl-cell,.tl-row:nth-child(2) .tl-cell{border-right:1px solid rgba(15,23,42,.20)!important}
    .tl-row:nth-child(2) .tl-cell{border-bottom:1px solid rgba(15,23,42,.30)!important}
    .lane{border-bottom:1px solid rgba(15,23,42,.10)!important;background-image:repeating-linear-gradient(to right, rgba(15,23,42,.13) 0 1px, transparent 1px var(--dayW)), repeating-linear-gradient(to right, rgba(15,23,42,.28) 0 1px, transparent 1px calc(var(--dayW) * 7))!important;background-size:auto!important}

      .printing .lane{height:var(--v48-print-row-h)!important;min-height:var(--v48-print-row-h)!important;max-height:var(--v48-print-row-h)!important;border-bottom:var(--v48-print-inner-line) solid var(--v48-print-inner-color)!important;box-sizing:border-box!important;background-color:#fff!important;}
      .printing .lane:nth-child(even){background-color:#f4f4f4!important;}
      .printing .summary-lane{background:#ffd400!important;}
      .printing .day-grid-line{width:var(--v48-print-inner-line)!important;background:var(--v48-print-inner-color)!important;opacity:1!important;}
      .printing .nonwork-shade{background:var(--v48-print-nonwork)!important;opacity:1!important;border:0!important;}
      .printing .bar,
      .printing .bar .bar-label,
      .printing .bar-text-before,
      .printing .bar-text-after{font-family:Arial,Helvetica,sans-serif!important;font-weight:900!important;}
      .printing .bar{border:var(--v48-print-outer-line) solid var(--v48-print-outer-color)!important;}
    }

    /* V49 — niet-werkbare dagen met zichtbare dunne daglijnen
       - niet-werkbare dagvlakken blijven lichtgrijs
       - elke daglijn blijft zichtbaar over het grijze vlak
       - lijnen zijn extreem dun en donker/zwart
       - day-grid-line ligt boven nonwork-shade in print */
    :root{
      --v49-nonwork-fill:#e6eaef;
      --v49-nonwork-line-screen:rgba(0,0,0,.36);
      --v49-nonwork-line-print:rgba(0,0,0,.68);
      --v49-nonwork-line-width-screen:.5px;
      --v49-nonwork-line-width-print:.18px;
    }
    .nonwork-shade{
      background:
        linear-gradient(to right, var(--v49-nonwork-line-screen) 0 var(--v49-nonwork-line-width-screen), transparent var(--v49-nonwork-line-width-screen) 100%),
        var(--v49-nonwork-fill)!important;
      border:0!important;
      opacity:.88!important;
      z-index:1!important;
    }
    .nonwork-shade::after{
      content:"";
      position:absolute;
      top:0;
      right:0;
      bottom:0;
      width:var(--v49-nonwork-line-width-screen);
      background:var(--v49-nonwork-line-screen);
      pointer-events:none;
    }
    .tl-cell.day.weekend,.tl-cell.day.nonwork{
      background:var(--v49-nonwork-fill)!important;
      color:#111827!important;
      border-right:.5px solid var(--v49-nonwork-line-screen)!important;
    }
    @media print{
      .printing .tl-cell.day.weekend,.printing .tl-cell.day.nonwork{
        background:var(--v49-nonwork-fill)!important;
        color:#000!important;
        border-right:var(--v49-nonwork-line-width-print) solid var(--v49-nonwork-line-print)!important;
      }
      .printing .nonwork-shade{
        background:
          linear-gradient(to right, var(--v49-nonwork-line-print) 0 var(--v49-nonwork-line-width-print), transparent var(--v49-nonwork-line-width-print) 100%),
          var(--v49-nonwork-fill)!important;
        border:0!important;
        opacity:1!important;
        z-index:1!important;
      }
      .printing .nonwork-shade::after{
        width:var(--v49-nonwork-line-width-print)!important;
        background:var(--v49-nonwork-line-print)!important;
      }
      .printing .day-grid-line{
        width:var(--v49-nonwork-line-width-print)!important;
        background:var(--v49-nonwork-line-print)!important;
        opacity:1!important;
        z-index:2!important;
        display:block!important;
      }
    }


    /* V50 — raster dunner + gele samenvattingsbalk alleen in tabel
       - niet-werkbare dagen blijven zichtbaar lichtgrijs
       - daglijnen over niet-werkbare dagen blijven zichtbaar maar subtiel/dun
       - geen dubbele/dikke lijnen door nonwork-overlay + grid tegelijk
       - gele samenvattingsmarkering blijft uitsluitend in de print-/linkertabel */
    :root{
      --v50-nonwork-fill:#e6eaef;
      --v50-screen-day-line-color:rgba(15,23,42,.20);
      --v50-print-day-line-color:rgba(17,24,39,.24);
      --v50-day-line-width-screen:.25px;
      --v50-day-line-width-print:.10px;
      --v50-row-line-color:#d8e0ea;
      --v50-row-line-width-print:.12px;
    }
    .lane{
      background-image:linear-gradient(to right, rgba(15,23,42,.13) .35px, transparent .35px)!important;
      background-size:var(--dayW) 100%!important;
    }
    .nonwork-shade{
      background:var(--v50-nonwork-fill)!important;
      border-left:var(--v50-day-line-width-screen) solid var(--v50-screen-day-line-color)!important;
      border-right:0!important;
      opacity:.86!important;
      z-index:1!important;
    }
    .nonwork-shade::after{display:none!important;}
    .tl-cell.day.weekend,.tl-cell.day.nonwork{
      background:var(--v50-nonwork-fill)!important;
      color:#111827!important;
      border-right:var(--v50-day-line-width-screen) solid var(--v50-screen-day-line-color)!important;
    }
    .lane.summary-lane{background-color:#fff!important;}
    .lane.summary-lane:nth-child(even){background-color:#fbfdff!important;}
    @media print{
      .printing .tl-cell{
        border-right:var(--v50-day-line-width-print) solid var(--v50-print-day-line-color)!important;
        border-bottom:var(--v50-row-line-width-print) solid var(--v50-row-line-color)!important;
      }
      .printing .tl-cell.day.weekend,.printing .tl-cell.day.nonwork{
        background:var(--v50-nonwork-fill)!important;
        color:#000!important;
        border-right:var(--v50-day-line-width-print) solid var(--v50-print-day-line-color)!important;
      }
      .printing .lane{
        border-bottom:var(--v50-row-line-width-print) solid var(--v50-row-line-color)!important;
        background-image:none!important;
        background-color:#fff!important;
      }
      .printing .lane:nth-child(even){background-color:#f7f7f7!important;}
      .printing .lane.summary-lane,.printing .summary-lane{background-color:#fff!important;}
      .printing .lane.summary-lane:nth-child(even){background-color:#f7f7f7!important;}
      .printing .day-grid-line{
        width:var(--v50-day-line-width-print)!important;
        background:var(--v50-print-day-line-color)!important;
        opacity:.72!important;
        z-index:2!important;
        display:block!important;
      }
      .printing .nonwork-shade{
        background:var(--v50-nonwork-fill)!important;
        border:0!important;
        opacity:.96!important;
        z-index:1!important;
      }
      .printing .nonwork-shade::after{display:none!important;}
      .printing .print-task-table tbody tr.summary-row td{
        background:#ffd400!important;
        font-weight:900!important;
        text-transform:uppercase!important;
      }
    }

    /* V51 — kalender direct boven én onder de printtabel
       - één volledige printkalender staat direct boven de tabel/het diagram
       - dezelfde kalender wordt onder de tabel/het diagram herhaald
       - linker kalenderdeel bevat de printtabel-kolomkop zodat rijen direct onder de kalender starten
       - de originele chart-timeline wordt in print verborgen zodat er geen extra kalender of witruimte ontstaat */
    .print-calendar{display:none;}
    @media print{
      .printing .print-calendar{
        display:grid!important;
        grid-template-columns:var(--v47-print-left-w,var(--v46-print-left-w,360px)) minmax(0,1fr)!important;
        width:100%!important;
        min-width:0!important;
        margin:0!important;
        padding:0!important;
        background:#fff!important;
        color:#000!important;
        font-family:Arial,Helvetica,sans-serif!important;
        break-inside:avoid!important;
        page-break-inside:avoid!important;
      }
      .printing .print-calendar-top{border-bottom:var(--v48-print-outer-line,.32px) solid var(--v48-print-outer-color,#111827)!important;}
      .printing .print-calendar-bottom{border-top:var(--v48-print-outer-line,.32px) solid var(--v48-print-outer-color,#111827)!important;}
      .printing .print-calendar-left{
        width:var(--v47-print-left-w,var(--v46-print-left-w,360px))!important;
        min-width:var(--v47-print-left-w,var(--v46-print-left-w,360px))!important;
        max-width:var(--v47-print-left-w,var(--v46-print-left-w,360px))!important;
        border-right:var(--v48-print-outer-line,.32px) solid var(--v48-print-outer-color,#111827)!important;
        box-sizing:border-box!important;
        overflow:hidden!important;
        background:#fff!important;
      }
      .printing .print-calendar-left table{
        width:100%!important;
        height:var(--v48-print-head-h,58px)!important;
        border-collapse:collapse!important;
        table-layout:fixed!important;
        margin:0!important;
        font-family:Arial,Helvetica,sans-serif!important;
        font-size:6.2px!important;
        line-height:1.05!important;
      }
      .printing .print-calendar-left th{
        height:var(--v48-print-head-h,58px)!important;
        min-height:var(--v48-print-head-h,58px)!important;
        max-height:var(--v48-print-head-h,58px)!important;
        box-sizing:border-box!important;
        border-right:var(--v48-print-inner-line,.18px) solid var(--v48-print-inner-color,#d4dbe4)!important;
        padding:1px 3px!important;
        vertical-align:bottom!important;
        text-align:left!important;
        font-weight:900!important;
        background:#fff!important;
        color:#000!important;
        overflow:hidden!important;
        white-space:nowrap!important;
        text-overflow:ellipsis!important;
      }
      .printing .print-calendar-left th:last-child{border-right:0!important;}
      .printing .print-calendar-right{
        min-width:0!important;
        overflow:hidden!important;
        background:#fff!important;
      }
      .printing .print-calendar .timeline{
        position:relative!important;
        top:auto!important;
        display:grid!important;
        grid-template-rows:19px 19px 20px!important;
        height:var(--v48-print-head-h,58px)!important;
        min-height:var(--v48-print-head-h,58px)!important;
        max-height:var(--v48-print-head-h,58px)!important;
        border-bottom:0!important;
        background:#fff!important;
        margin:0!important;
        padding:0!important;
        font-family:Arial,Helvetica,sans-serif!important;
      }
      .printing .print-calendar .tl-cell{
        height:auto!important;
        min-height:0!important;
        max-height:none!important;
        border-right:var(--v50-day-line-width-print,.10px) solid var(--v50-print-day-line-color,rgba(17,24,39,.24))!important;
        border-bottom:var(--v50-row-line-width-print,.12px) solid var(--v50-row-line-color,#d8e0ea)!important;
        background:#fff!important;
        color:#000!important;
        font-family:Arial,Helvetica,sans-serif!important;
        font-size:5px!important;
        font-weight:900!important;
        line-height:1!important;
        box-sizing:border-box!important;
      }
      .printing .print-calendar .tl-cell.day{
        display:flex!important;
        flex-direction:column!important;
        align-items:center!important;
        justify-content:center!important;
        gap:1px!important;
      }
      .printing .print-calendar .tl-cell.day.weekend,
      .printing .print-calendar .tl-cell.day.nonwork{
        background:var(--v50-nonwork-fill,#e6eaef)!important;
        color:#000!important;
      }
      .printing .chart-pane > .timeline{display:none!important;visibility:hidden!important;height:0!important;min-height:0!important;max-height:0!important;overflow:hidden!important;}
      .printing .print-task-table thead{display:none!important;visibility:hidden!important;height:0!important;max-height:0!important;overflow:hidden!important;}
      .printing .chart-pane > .dep-svg{top:0!important;height:100%!important;}
      .printing .today-line{top:0!important;}
    }

    /* V53 — onderste printkalender omgekeerd
       De kalender onder de tabel/het diagram leest van boven naar beneden:
       dag -> week -> maand -> jaar. De bovenste kalender blijft ongewijzigd direct
       boven de tabel staan. */
    @media print{
      .printing .print-calendar-bottom .print-calendar-left{
        height:72px!important;
        min-height:72px!important;
        max-height:72px!important;
        background:#fff!important;
      }
      .printing .print-calendar-bottom .timeline{
        grid-template-rows:20px 17px 17px 18px!important;
        height:72px!important;
        min-height:72px!important;
        max-height:72px!important;
      }
      .printing .print-calendar-bottom .tl-cell{
        font-size:5px!important;
        line-height:1!important;
      }
      .printing .print-calendar-bottom .tl-cell.day{
        font-size:5px!important;
        font-weight:900!important;
      }
      .printing .print-calendar-bottom .tl-cell.year{
        font-size:6px!important;
        font-weight:900!important;
        background:#fff!important;
        letter-spacing:.01em!important;
      }
      .printing .print-calendar-bottom .tl-row-years .tl-cell{
        border-bottom:0!important;
      }
    }


    /* V56 — Gantt schermdiagram: dunne daglijnen altijd zichtbaar
       - daglijnen worden ook in normale schermweergave als echte spans gerenderd
       - lijnen liggen boven werkbare/niet-werkbare achtergrondvlakken, maar onder taakbalken
       - niet-werkbare dagen blijven herkenbaar zonder dikke donkere strepen */
    :root{
      --v56-screen-day-line-color:rgba(15,23,42,.18);
      --v56-screen-day-line-width:.5px;
      --v56-screen-nonwork-fill:#e6eaef;
    }
    .lane{
      background-image:none!important;
      background-color:#fff!important;
    }
    .lane:nth-child(even){background-color:#fbfdff!important;}
    .day-grid-line{
      display:block!important;
      position:absolute!important;
      top:0!important;
      bottom:0!important;
      width:var(--v56-screen-day-line-width)!important;
      background:var(--v56-screen-day-line-color)!important;
      opacity:1!important;
      pointer-events:none!important;
      z-index:2!important;
    }
    .nonwork-shade{
      background:var(--v56-screen-nonwork-fill)!important;
      border:0!important;
      opacity:.82!important;
      z-index:1!important;
    }
    .lane .baseline{z-index:4!important;}
    .lane .bar{z-index:8!important;}
    .lane .bar-text-before,.lane .bar-text-after{z-index:9!important;}
    @media print{
      .printing .day-grid-line{
        width:var(--v50-day-line-width-print,.10px)!important;
        background:var(--v50-print-day-line-color,rgba(17,24,39,.24))!important;
        opacity:.78!important;
        display:block!important;
        z-index:2!important;
      }
      .printing .nonwork-shade{
        background:var(--v50-nonwork-fill,#e6eaef)!important;
        border:0!important;
        opacity:.96!important;
        z-index:1!important;
      }
    }


    /* V58 — Projecturen per afdeling zijn de standaard Gantt-urenbron.
       Handmatige taakuren zijn alleen actief als de gebruiker expliciet Handmatig kiest. */
    .hours-source-cell{display:flex;align-items:center;gap:6px;min-width:210px;}
    .hours-source-select{height:34px;border:1px solid #cbd5e1;border-radius:9px;background:#fff;font-weight:800;color:#0f172a;padding:0 8px;max-width:118px;}
    .hours-source-cell .cellinput{width:74px!important;min-width:74px!important;text-align:right;}
    .hours-source-cell .cellinput:disabled{background:#eef6ff;color:#2563eb;border-color:#bfdbfe;font-weight:900;opacity:1;}
    .hours-source-badge{display:inline-flex;align-items:center;border-radius:999px;border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;font-size:11px;font-weight:900;padding:4px 8px;white-space:nowrap;}
    .hours-mode-note{margin-top:7px;color:#64748b;font-weight:700;line-height:1.35;}
    .hours-mode-note strong{color:#0f172a;}





    /* V65 — structurele Gantt-balkfix. V66 — centrale PDF-balkgeometrie.
       V59/V64 tekende taken als losse werkdag-segmenten. Bij herstelde D1-data met
       oude sched-velden leidde dat tot smalle 1-dags blokjes en vastlopende render/save-loops.
       Vanaf V65/V66 is de visuele balk weer één brede, PDF-achtige taakbalk met centrale geometrie.
       Werkdagenlogica blijft leidend voor start/einde en uren/capaciteit; renderen zelf
       schrijft nooit automatisch naar D1. */
    .bar.bar-continuous-task{
      overflow:hidden!important;
      min-width:18px!important;
      contain:layout paint;
    }
    .bar.bar-continuous-task.selected{outline:2px solid rgba(37,99,235,.30);outline-offset:2px;}
    .bar.bar-continuous-task .bar-label{position:relative;z-index:3;line-height:45px;}
    .bar.bar-continuous-task .bar-progress{z-index:1;}
    .workday-rule-note{display:block;color:#64748b;font-size:11px;font-weight:800;margin-top:3px;}
    @media print{
      .printing .bar.bar-continuous-task{height:15px!important;box-shadow:none!important;}
      .printing .bar.bar-continuous-task .bar-label{font-size:6px!important;line-height:15px!important;font-weight:900!important;text-shadow:none!important;}
    }

  .gantt-dragging{user-select:none!important;cursor:grabbing!important}.bar.drag-preview{box-shadow:0 0 0 2px rgba(37,99,235,.30),0 6px 16px rgba(37,99,235,.22)}
    /* Runtime layout: keep the sticky task table from covering the chart. */
    .board:not(.table-only):not(.diagram-only){
      grid-template-columns:48vw max-content!important;
      min-width:calc(48vw + 900px)!important;
    }
    .board:not(.table-only):not(.diagram-only) .table-pane{
      width:48vw!important;
      min-width:48vw!important;
      max-width:48vw!important;
      overflow-x:auto!important;
    }
    @media (min-width:901px){
      :root{--rowH:38px;--headH:78px;--leftW:980px}
      body{padding:10px;font-size:12px}
      .module-head{padding:12px 16px}
      .module-head h1{font-size:16px}
      .module-head p{font-size:11px}
      .badge{padding:5px 8px;font-size:10px}
      .toolbar{gap:5px;padding:8px 16px}
      .toolbar-group{gap:5px;padding-right:5px}
      .input,.select,.btn{height:32px;min-height:32px;border-radius:9px;font-size:11px}
      .select.project{min-width:250px}
      .btn{padding:0 9px}
      .meta-line{font-size:10px;padding:5px 16px 7px}
      .board-wrap{
        margin:0 16px 12px;
        max-height:calc(100vh - 180px);
        overscroll-behavior:contain;
      }
      .gantt-table{font-size:11px!important}
      .gantt-table thead th{height:var(--headH)!important;padding:6px 4px!important;font-size:9px}
      .gantt-table tbody tr,.gantt-table td{height:var(--rowH)!important}
      .gantt-table td{padding:0 4px!important;font-size:11px!important}
      .taskname,.cellinput,.color-select,.resource-select,.dept-select{height:27px!important;font-size:11px!important}
      .taskname{font-weight:600}
      .rowno-cell,.pred-nos{font-size:10px}
      .date-cell .weekno{font-size:8px}
      .hours-source-cell{gap:4px;min-width:180px}
      .hours-source-select{height:27px;max-width:82px;padding:0 5px;font-size:9px!important}
      .hours-source-cell .cellinput{height:27px!important;width:58px!important;min-width:58px!important;font-size:9px!important}
      .iconbtn{width:24px;height:24px;border-radius:7px;font-size:11px}
      .timeline{height:var(--headH)!important;grid-template-rows:26px 26px 26px!important}
      .tl-cell{font-size:9px}
      .lane{height:var(--rowH)!important}
      .bar{top:2px!important;height:34px!important;font-size:10px!important;border-radius:6px!important}
      .bar.bar-continuous-task .bar-label{line-height:34px!important}
      .bar.summary:before{top:17px}
      .bar.summary:after{top:24px}
      .modal{width:min(820px,94vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
      .modal-head,.modal-foot{flex:0 0 auto;padding:9px 12px}
      .modal-body{padding:11px 12px;overflow:auto}
      .form-grid{gap:8px 10px}
      .field{gap:3px;font-size:10.5px}
      .field input,.field select{height:32px;border-radius:8px;padding:0 9px;font-size:11px}
      .field textarea{height:58px;padding:8px;font-size:11px}
      .workday-rule-note,.pred-help,.hours-mode-note{font-size:9px!important;line-height:1.25}
      .pred-select{min-height:105px!important;max-height:130px!important}
    }
  </style>
</head>
<body>
  <div class="print-header" id="printHeader"></div>
  <div class="gantt-shell" data-testid="gantt-root">
    <div class="module-head">
      <div><h1>Laag 4 — Gantt Planning</h1><p>SSOT-koppeling: Projecturen per afdeling → Gantt-taakplanning → Capaciteit.</p></div>
      <div class="status"><span class="badge" id="storageBadge">Opslag controleren…</span><span class="badge ok" id="saveBadge">Gereed</span></div>
    </div>
    <div class="toolbar" data-testid="gantt-toolbar">
      <div class="toolbar-group"><select class="select project" id="projectSel"></select><select class="select" id="deptSel"><option value="">Alle afdelingen</option></select><select class="select" id="resourceSel"><option value="">Alle resources</option></select></div>
      <div class="toolbar-group"><button class="btn" id="todayBtn">Vandaag</button><button class="btn" data-zoom="day">Dag</button><button class="btn active" data-zoom="week">Week</button><button class="btn" data-zoom="month">Maand</button></div>

    const colorMap = { c1:"#2f6fbd", c2:"#16a34a", c3:"#f59e0b", c4:"#dc2626", c5:"#8b5cf6", c6:"#14b8a6", c7:"#f97316", c8:"#22c55e" };
    const colorNames = { c1:"Blauw", c2:"Groen", c3:"Geel", c4:"Rood", c5:"Paars", c6:"Turquoise", c7:"Oranje", c8:"Lime" };

      if(byName) return byName[0];
      const byHex = Object.entries(colorMap).find(([,hex])=>String(hex).toLowerCase()===lower);
      if(byHex) return byHex[0];
      return colorMap[fallback] ? fallback : "c1";
    }
    function colorHex(value){ return colorMap[normalizeColorKey(value)] || colorMap.c1; }
    function colorLabel(value){ const key=normalizeColorKey(value); return colorNames[key] || colorNames.c1; }
    function colorOptions(selected){
      const sel = normalizeColorKey(selected);

    }

    function logoHtml(st){ const src=st.company?.logo?.dataUrl || CWS?.getCompanyLogo?.() || "../assets/tasche-logo.png"; const name=companyName(st)||"Bedrijf"; return src ? `<img class="print-logo" src="${src}" alt="Bedrijfslogo">` : `<div class="print-logo print-logo-placeholder" aria-label="Bedrijfslogo placeholder">${esc(name).slice(0,2).toUpperCase()}</div>`; }
    function safeFilePart(v){ return String(v||"").normalize("NFKD").replace(/[\/:*?"<>|]+/g,"-").replace(/\s+/g," ").trim().slice(0,80) || "planning"; }
    function projectClient(p){ return p.client || p.opdrachtgever || p.customer || p.klant || ""; }
    function printFileName(p){ const d=new Date(); const date=`${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`; return [p.name||"project", p.nr||p.code||p.id||"nummer", projectClient(p)||"opdrachtgever", date].map(safeFilePart).join(" - "); }

    function updatePrintHeader(model, range){

    const COL_KEY = "cws.gantt.visibleColumns.v20";
    const COL_ORDER_KEY = "cws.gantt.columnOrder.v28";
    const ALL_COLUMNS = [
      {id:"rowno",label:"Nr",min:42,control:"text"},
      {id:"id",label:"ID",min:72,control:"text"},
      {id:"name",label:"Taak",min:118,control:"task"},
      {id:"start",label:"Start",min:82,control:"date"},
      {id:"end",label:"Einde",min:82,control:"date"},
      {id:"duration",label:"Duur",min:54,control:"text"},
      {id:"progress",label:"Voortgang",min:78,control:"number"},
      {id:"taskStatus",label:"Status",min:112,control:"select"},
      {id:"feedback",label:"Terugkoppeling",min:170,control:"input"},
      {id:"hours",label:"Uren",min:58,control:"number"},

      {id:"department",label:"Afdeling",min:78,control:"select"},

      {id:"locked",label:"Lock",min:46,control:"checkbox"},
      {id:"actions",label:"Acties",min:74,control:"actions"}
    ];
    const DEFAULT_COLS = ["rowno","id","name","start","end","duration","progress","taskStatus","feedback","hours","predecessor","department","resource","color","locked","actions"];
    const BASIC_COLS = ["rowno","id","name","start","end","duration","hours","predecessor","actions"];
    const LABEL_KEY = "cws.gantt.barLabels.v25";
    const LABEL_POSITIONS = [
      {id:"before", label:"Voor taakbalk", note:"Zwarte tekst links van de balk"},
      {id:"inside", label:"In taakbalk", note:"Witte tekst in de balk"},

    const LABEL_FIELDS = [
      {id:"name", label:"Taaknaam"},
      {id:"project", label:"Project"},
      {id:"department", label:"Afdeling"},
      {id:"resource", label:"Resource"},
      {id:"start", label:"Startdatum"},
      {id:"end", label:"Einddatum"},
      {id:"duration", label:"Aantal dagen"},
      {id:"hours", label:"Uren"},

    const DEFAULT_LABELS = { before:[], inside:["name"], after:["resource","duration"] };
    function cleanLabelConfig(raw){
      const allowed=new Set(LABEL_FIELDS.map(f=>f.id));
      const next={before:[],inside:["name"],after:["resource","duration"]};
      LABEL_POSITIONS.forEach(pos=>{
        const arr=Array.isArray(raw?.[pos.id]) ? raw[pos.id] : DEFAULT_LABELS[pos.id];

    function loadVisibleCols(){
      try{
        const arr=JSON.parse(localStorage.getItem(COL_KEY)||"null");
        if(Array.isArray(arr)&&arr.length){
          const allowed=new Set(ALL_COLUMNS.map(c=>c.id));
          const clean=arr.filter(id=>allowed.has(id));
          if(clean.length){
            // V23: urenkolom standaard zichtbaar maken bij bestaande browsers.
            if(clean.includes("progress") && !clean.includes("hours")) clean.splice(clean.indexOf("progress")+1,0,"hours");

          }
        }
      }catch(e){}
      return new Set(DEFAULT_COLS);

        const raw=JSON.parse(localStorage.getItem(COL_ORDER_KEY)||"null");

          const allowed=new Set(ALL_COLUMNS.map(c=>c.id));
          const clean=raw.filter(id=>allowed.has(id));

      }catch(e){}

    function textForCol(col,row,sc){
      const d=taskDurationForInteraction(row,sc);
      if(col.id==="rowno") return row._displayNo || "";
      if(col.id==="id") return row.id;
      if(col.id==="name") return row.name;
      if(col.id==="start") return toNL(sc.start);
      if(col.id==="end") return toNL(sc.end);
      if(col.id==="duration") return `${d} d`;
      if(col.id==="progress") return `${Number(row.progress||0)} %`;
      if(col.id==="taskStatus") return row.status || (Number(row.progress||0)>=100 ? "Gereed" : Number(row.progress||0)>0 ? "In uitvoering" : "Niet gestart");
      if(col.id==="feedback") return row.feedback || row.why || "";
      if(col.id==="hours") return hoursSourceLabel(row);
      if(col.id==="predecessor") return predecessorDisplay(row.predecessor);
      if(col.id==="department") { const st=state(); const d=departments(st).find(x=>String(x.id||x.name)===String(row.department)||String(x.name)===String(row.department)); return d?(d.name||d.id):(row.department||""); }
      if(col.id==="resource") { const st=state(); const r=(st.resources?.byId||{})[row.resourceId]; return r?(r.name||r.id):(row.resourceId||"—"); }
      if(col.id==="color") return colorLabel(row.colorKey);
      if(col.id==="locked") return row.locked?"ja":"nee";
      if(col.id==="actions") return "";
      if(col.id==="project") { const p=state().projects?.byId?.[currentProjectId()]||{}; return p.nr||p.code||p.name||p.id||""; }
      if(col.id==="status") return row.status || (row.locked ? "Vastgezet" : row.type==="summary" ? "Fase" : "Taak");
      if(col.id==="why") return row.why || "";
      return "";
    }
    function rowHoursMode(row){
      const mode=String(row?.hoursMode||row?.hoursSource||"auto").trim().toLowerCase();
      return (mode==="manual"||mode==="handmatig"||mode==="manual-override"||mode==="task-hours") ? "manual" : "auto";
    }
    function rowManualHours(row){
      const n=Number(String(row?.manualHours ?? row?.hours ?? 0).replace(",","."));
      return Number.isFinite(n) ? Math.max(0,n) : 0;
    }
    function projectDeptHoursTotalFor(row, pid=currentProjectId(), st=state()){
      const dept=String(row?.department||row?.dept||row?.afdeling||"(Geen)").trim()||"(Geen)";
      const p=st.projects?.byId?.[pid]||{};
      let total=0;
      (Array.isArray(st.projects?.deptHours)?st.projects.deptHours:[]).forEach(r=>{
        if(String(r?.projectId||r?.project||"")!==String(pid)) return;
        const rd=String(r?.deptId||r?.dept||r?.department||"(Geen)").trim()||"(Geen)";
        if(rd===dept){ const h=Number(String(r?.hours??0).replace(",",".")); if(Number.isFinite(h)) total+=Math.max(0,h); }
      });
      if(total<=0 && p.deptHours && typeof p.deptHours==="object"){ const h=Number(String(p.deptHours[dept]??0).replace(",",".")); if(Number.isFinite(h)) total=Math.max(0,h); }
      return Math.round(total*100)/100;

      return rowHoursMode(row)==="manual" ? `${rowManualHours(row)} u handmatig` : "Auto uit projecturen";

    function measurePx(value, weight){
      const ctx=textMeasure();

    function columnPadding(col){

      if(col.control==="checkbox") return 24;

    function columnWidths(cols, rows){

          const indent = col.id==="name" ? Math.max(0,Number(row.level||0))*18 : 0;

      return esc(textForCol(col,row,sc));
    }

      $("#modalBody").innerHTML=`
        <p style="margin-top:0;color:#64748b;line-height:1.45">

        </p>

    function uniqueRowId(model, base){
      const existing=new Set(model.rows.map(r=>String(r.id)));
      const clean=sanitizeIdPart(base||"TA", "TA");
      let n=1, id=`${clean}-K${n}`;
      while(existing.has(id)){ n++; id=`${clean}-K${n}`; }
      return id;
    }
    function blockRange(model, rowId){
      const idx=model.rows.findIndex(r=>r.id===rowId);
      if(idx<0) return [-1,-1];
      const row=model.rows[idx];
      if(row.type!=="summary") return [idx,idx];
      let end=idx;
      const lvl=Number(row.level||0);
      for(let i=idx+1;i<model.rows.length;i++){
        if(Number(model.rows[i].level||0)<=lvl) break;
        end=i;
      }
      return [idx,end];
    }
    function removePredRefs(raw, removed){
      return String(raw||"").split(/[;,]+/).map(x=>x.trim()).filter(Boolean).filter(part=>{
        const m=part.match(/^(.+?)(FS|SS|FF|SF)([+-]\d+)?$/i);
        const id=m?m[1].trim():part;
        return !removed.has(id);
      }).join(",");
    }
    function deleteRow(rowId){ if(!assertLiveMode()) return; 
      const pid=currentProjectId(), model=getModel(pid);
      const [a,b]=blockRange(model,rowId);
      if(a<0) return;
      const row=model.rows[a];
      const label=row.type==="summary" ? "fase inclusief onderliggende taken" : "taak";
      if(!window.confirm(`${label} verwijderen?`)) return;
      const removedRows=model.rows.slice(a,b+1);
      const removed=new Set(removedRows.map(r=>r.id));
      model.rows.splice(a,b-a+1);
      removed.forEach(id=>{ delete model.sched[id]; });
      model.rows.forEach(r=>{ if(r.predecessor) r.predecessor=removePredRefs(r.predecessor, removed); if(removed.has(r.parent)) delete r.parent; });
      UI.selected=null;
      saveModel(pid,model,"Taak verwijderd");
      toast(row.type==="summary" ? "Fase verwijderd" : "Taak verwijderd");
      render();
    }
    function duplicateRow(rowId){ if(!assertLiveMode()) return; 
      const pid=currentProjectId(), model=getModel(pid);
      const [a,b]=blockRange(model,rowId);
      if(a<0) return;
      const source=model.rows.slice(a,b+1);
      const idMap=new Map();
      source.forEach(r=>idMap.set(r.id, uniqueRowId(model, r.id)));
      const clones=source.map((r,idx)=>{
        const c=JSON.parse(JSON.stringify(r));
        c.id=idMap.get(r.id);
        if(idx===0) c.name=`${c.name || "Taak"} kopie`;
        if(c.parent && idMap.has(c.parent)) c.parent=idMap.get(c.parent);
        if(c.predecessor){
          c.predecessor=String(c.predecessor).split(/[;,]+/).map(part=>{
            const x=part.trim();
            const m=x.match(/^(.+?)(FS|SS|FF|SF)([+-]\d+)?$/i);
            if(!m){ const target=idMap.get(x) || idMap.get(sanitizeIdPart(x,x)); return target?`${target}FS`:x; }
            const repl=idMap.get(m[1].trim()) || m[1].trim();
            return `${repl}${m[2].toUpperCase()}${m[3]||""}`;
          }).filter(Boolean).join(",");
        }
        return c;
      });
      clones.forEach((c,idx)=>{
        const old=source[idx];
        if(model.sched[old.id]) model.sched[c.id]=JSON.parse(JSON.stringify(model.sched[old.id]));
      });
      model.rows.splice(b+1,0,...clones);
      UI.selected=clones[0]?.id || rowId;
      saveModel(pid,model,"Taak gedupliceerd");
      toast(source[0].type==="summary" ? "Fase gedupliceerd" : "Taak gedupliceerd");
      render();
    }
    function addTask(){ if(!assertLiveMode()) return; 
      const pid=currentProjectId(), model=getModel(pid), st=state();
      let insertAt=model.rows.length;
      let level=1, parent="", dept=departments(st)[0]?.id || departments(st)[0]?.name || "Engineering";
      let start=firstProjectStart(st,pid), pred="";
      if(UI.selected){
        const [a,b]=blockRange(model,UI.selected);
        const sel=model.rows.find(r=>r.id===UI.selected);
        if(sel){
          if(sel.type==="summary"){
            insertAt=b+1;
            level=Number(sel.level||0)+1;
            parent=sel.id;
            dept=sel.department || dept;
            const lastChild=model.rows.slice(a+1,b+1).filter(r=>r.type!=="summary").at(-1);
            const lastSc=lastChild ? model.sched[lastChild.id] : null;
            if(lastSc?.end){ start=nextWorkingIso(st,addDays(lastSc.end,1)); pred=`${lastChild.id}FS`; }
          } else {
            insertAt=b+1;
            level=Math.max(1,Number(sel.level||1));
            parent=sel.parent || "";
            dept=sel.department || dept;
            const selSc=model.sched[sel.id];
            if(selSc?.end){ start=nextWorkingIso(st,addDays(selSc.end,1)); pred=`${sel.id}FS`; }
          }
        }
      } else if(model.rows.length){
        const prev=model.rows.filter(r=>r.type!=="summary").at(-1);
        if(prev){ const sc=model.sched[prev.id]; if(sc?.end){ start=nextWorkingIso(st,addDays(sc.end,1)); pred=`${prev.id}FS`; } level=Math.max(1,Number(prev.level||1)); parent=prev.parent||""; dept=prev.department||dept; }
      }
      const id=uniqueRowId(model, `${pid}-T`);
      const row={id,name:"Nieuwe taak",type:"task",level,parent,department:dept,resourceId:"",progress:0,predecessor:pred,locked:false,colorKey:"c1",hours:0,why:""};
      model.rows.splice(insertAt,0,row);
      model.sched[id]=normalizeSchedule(st,start,null,5);
      UI.selected=id;
      saveModel(pid,model,"Taak toegevoegd");
      render();
      setTimeout(()=>openEdit(id),80);
    }
    function updateButtons(){ $$('[data-zoom]').forEach(b=>b.classList.toggle('active',b.dataset.zoom===UI.zoom)); $$('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===UI.view)); $('#depsBtn').classList.toggle('active',UI.showDeps); $('#criticalBtn').classList.toggle('active',UI.showCritical); $('#baselineBtn').classList.toggle('active',UI.showBaseline); $('#undoBtn').disabled=!!UI.revisionId||!(CWS?.canUndo?.()); $('#redoBtn').disabled=!!UI.revisionId||!(CWS?.canRedo?.()); ['generateBtn','addTaskBtn','recalcBtn','setBaselineBtn','indentBtn','outdentBtn','saveRevisionBtn'].forEach(id=>{ const el=$('#'+id); if(el) el.disabled=!!UI.revisionId; }); const live=$('#liveBtn'); if(live) live.classList.toggle('hidden',!UI.revisionId); }

    function wireColumnDrag(){

        th.addEventListener("dragover",e=>{ e.preventDefault(); e.dataTransfer.dropEffect="move"; });
        th.addEventListener("drop",e=>{
          e.preventDefault();
          const from=e.dataTransfer.getData("text/plain");
          const to=th.dataset.col;
          if(!from||!to||from===to) return;
          const order=loadColumnOrder();
          const a=order.indexOf(from), b=order.indexOf(to);
          if(a<0||b<0) return;
          const [moved]=order.splice(a,1);
          order.splice(b,0,moved);
          saveColumnOrder(order);

          render();
        });

    function wireRows(model,pid){
      $$("#tableRows tr").forEach(tr=>{
        const rowId=tr.dataset.id;
        tr.addEventListener("dragstart",e=>{ if(e.target && ["INPUT","SELECT","OPTION","BUTTON","TEXTAREA"].includes(e.target.tagName)) { e.preventDefault(); return; } e.dataTransfer.setData("text/plain", rowId); e.dataTransfer.effectAllowed="move"; });
        tr.addEventListener("dragover",e=>{ e.preventDefault(); e.dataTransfer.dropEffect="move"; });
        tr.addEventListener("drop",e=>{
          e.preventDefault();
          if(!assertLiveMode()) return;
          const from=e.dataTransfer.getData("text/plain"), to=rowId;
          if(!from||!to||from===to) return;
          const fromIdx=model.rows.findIndex(r=>r.id===from), toIdx=model.rows.findIndex(r=>r.id===to);
          if(fromIdx<0||toIdx<0) return;
          const [moved]=model.rows.splice(fromIdx,1);
          model.rows.splice(toIdx,0,moved);
          UI.selected=from;
          saveModel(pid,model,"Rijvolgorde opgeslagen");
          toast("Rij versleept");
          render();
        });
        tr.querySelectorAll("button[data-action]").forEach(btn=>{
          btn.addEventListener("click",e=>{
            e.preventDefault(); e.stopPropagation();
            const action=btn.dataset.action;
            if(!assertLiveMode()) return;
            if(action==="duplicate") duplicateRow(rowId);
            if(action==="delete") deleteRow(rowId);
          });
        });
        tr.addEventListener("contextmenu",e=>showGanttContextMenu(e,rowId,"row"));
        tr.addEventListener("click",()=>{selectRow(model,rowId);});
        tr.addEventListener("dblclick",(e)=>{
          if(e.target && ["SELECT","OPTION"].includes(e.target.tagName)) return;
          openEdit(rowId);
        });
        tr.querySelectorAll("select.color-select").forEach(sel=>{
          setColorPickerPreview(sel);
          sel.addEventListener("input",()=>setColorPickerPreview(sel));
        });
        tr.querySelectorAll("button[data-pred-pick]").forEach(btn=>{
          btn.addEventListener("click",e=>{ e.preventDefault(); e.stopPropagation(); selectRow(model,rowId); openPredecessorPicker(rowId); });
        });
        tr.querySelectorAll("input,select").forEach(el=>{
          if(el.classList.contains("dateinput")){ el.addEventListener("dblclick",()=>{ try{ el.showPicker?.(); }catch(_e){} }); }
          el.addEventListener("click",()=>selectRow(model,rowId));
          el.addEventListener("change",()=>{
            if(!assertLiveMode()){ render(); return; }
            const row=model.rows.find(r=>r.id===rowId);
            if(!row) return;
            const k=el.dataset.k;
            if(k==="start"||k==="end"){
              const iso=toIso(el.value);
              if(!iso){toast("Ongeldige datum","bad");render();return;}
              model.sched[rowId]=model.sched[rowId]||{};
              const oldDur=taskDurationForInteraction(row,model.sched[rowId]);
              if(k==="start"){
                const fixed=normalizeSchedule(state(),iso,null,oldDur);
                model.sched[rowId].start=fixed.start;
                model.sched[rowId].end=fixed.end;
              }else{
                const fixed=normalizeSchedule(state(),model.sched[rowId].start||iso,iso);
                model.sched[rowId].start=fixed.start;
                model.sched[rowId].end=fixed.end;
              }
            } else if(k==="duration"){
              const days=Math.max(1,Number(el.value)||1);
              model.sched[rowId]=model.sched[rowId]||{};
              const start=nextWorkingIso(state(),model.sched[rowId].start||firstProjectStart(state(),pid));
              model.sched[rowId].start=start;
              model.sched[rowId].end=addWorkingDays(state(),start,days);
            } else if(k==="progress"){
              row.progress=Math.max(0,Math.min(100,Number(el.value)||0));
              row.status=row.progress>=100?"Gereed":row.progress>0?(row.status||"In uitvoering"):(row.status||"Niet gestart");
              row.progressUpdatedAt=new Date().toISOString();
            } else if(k==="hoursMode"){
              const mode=el.value==="manual" ? "manual" : "auto";
              row.hoursMode=mode;
              row.hoursSource=mode==="manual" ? "manual" : "project-dept-hours";
              if(mode==="auto"){ row.hours=0; row.manualHours=0; }
            } else if(k==="hours"){
              const v=Math.max(0,Number(String(el.value).replace(",","."))||0);
              row.hoursMode="manual";
              row.hoursSource="manual";
              row.manualHours=v;
              row.hours=v;
            } else if(k==="status"){
              row.status=el.value;
            } else if(k==="feedback"){
              row.feedback=el.value.trim();
              row.why=row.feedback || row.why || "";
              row.feedbackUpdatedAt=row.feedback ? new Date().toISOString() : (row.feedbackUpdatedAt || "");
            } else if(k==="locked"){
              row.locked=el.checked;
            } else if(k==="predecessor"){
              const v=el.value.trim();
              if(parsePred(v).some(p=>p.id===rowId)){toast("Circulaire afhankelijkheid geweigerd","bad");render();return;}
              row.predecessor=v;
            } else if(k==="colorKey"){
              row.colorKey=normalizeColorKey(el.value,row.colorKey||"c1");
            } else {
              row[k]=el.value;
            }
            saveModelNoRender(pid,model);
            if(k==="department"||k==="resourceId"||k==="colorKey"||k==="status"||k==="feedback"){
              if(k==="colorKey") setColorPickerPreview(el);
              scheduleRenderAfterInput(260);
            }else{
              render();
            }
          });
        });
      });
    }
    function wireBars(model,pid,range){

          if(e.pointerType==="touch" && window.matchMedia?.("(max-width: 767px)")?.matches && handle==="move") return;
          const rowIndex=model.rows.findIndex(r=>r.id===id);
          const eff=rowSchedule(model,row,rowIndex)||{};
          const stored=model.sched[id]||{};
          const baseSc={...(stored.start&&stored.end?stored:(eff.start||eff.end?eff:stored))};
          if(!baseSc.start && bar.dataset.start) baseSc.start=bar.dataset.start;
          if((!baseSc.end || calendarDuration(baseSc.start,baseSc.end)<=1) && bar.dataset.end) baseSc.end=bar.dataset.end;

          });
          UI.drag={
            ...immutableRef,

            startX:e.clientX,
            dayWidth:pxPerDay(),
            pointerId:e.pointerId,
            originalSchedule:Object.freeze({...baseSc, workdays:originalDuration}),
            tempSchedule:null,
            lastDelta:null,
            rowSnapshot:Object.freeze({...row}),
            rangeSnapshot:Object.freeze({start:UI.originStart,days:9999}),

      });

    window.addEventListener("pointermove",e=>{
      const drag=UI.drag;
      if(!drag || e.pointerId!==drag.pointerId) return;
      const delta=Math.round((e.clientX-drag.startX)/drag.dayWidth);
      if(delta===drag.lastDelta){ e.preventDefault(); return; }
      drag.lastDelta=delta;
      const st=state();
      let schedule={...drag.originalSchedule};
      if(drag.handle==="move"){
        schedule=shiftScheduleByWorkdays(st,drag.originalSchedule,delta);
      }else{
        schedule=resizeScheduleByPointer(st,drag.originalSchedule,drag.handle,delta);
      }
      drag.tempSchedule=schedule;
      drag.previewSchedule=schedule;
      if(UI.dragFrame) cancelAnimationFrame(UI.dragFrame);
      UI.dragFrame=requestAnimationFrame(()=>{
        UI.dragFrame=null;
        const active=UI.drag;
        if(!active || active.pointerId!==drag.pointerId) return;
        const bar=active.previewBar || document.querySelector(`.bar[data-id="${cssEsc(active.rowId)}"]`);
        if(bar){
          const geom=dragPreviewGeometry(active.rowSnapshot||{}, active.previewSchedule, active.rangeSnapshot||{start:UI.originStart,days:9999}, st);

    function drawDeps(model,rows,range){
      const svg=$("#depSvg"); svg.innerHTML="";
      if(!UI.showDeps) return;
      const rowH=UI.printMode?24:(window.innerWidth>900?38:44);
      const barTop=UI.printMode?4:2;
      const barH=UI.printMode?15:45;
      const rowIndex=new Map(rows.map((x,i)=>[x.row.id,i]));
      const w=pxPerDay();
      const width=Math.max(900,(range.days*w));
      svg.setAttribute("width",width);
      svg.setAttribute("height",rows.length*rowH);
      svg.setAttribute("viewBox",`0 0 ${width} ${rows.length*rowH}`);
      svg.style.zIndex="14";
      const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
      const marker=document.createElementNS("http://www.w3.org/2000/svg","marker");
      marker.setAttribute("id","depArrow");
      marker.setAttribute("viewBox","0 0 10 10");
      marker.setAttribute("refX","9");
      marker.setAttribute("refY","5");
      marker.setAttribute("markerWidth",UI.printMode?"4.6":"7.5");
      marker.setAttribute("markerHeight",UI.printMode?"4.6":"7.5");
      marker.setAttribute("orient","auto");
      const mp=document.createElementNS("http://www.w3.org/2000/svg","path");
      mp.setAttribute("d","M 0 0 L 10 5 L 0 10 z");
      mp.setAttribute("fill","#334155");
      marker.appendChild(mp); defs.appendChild(marker); svg.appendChild(defs);
      const sourceGap = UI.printMode ? Math.max(2,w*.14) : Math.max(5,w*.18);
      const targetGap = UI.printMode ? Math.max(3,w*.34) : Math.max(10,w*.46);
      const minElbow = UI.printMode ? Math.max(8,w*.62) : Math.max(22,w*.95);
      const effectiveMap=effectiveScheduleMap(model,state());
      model.rows.forEach(row=>{
        const i=rowIndex.get(row.id); if(i==null) return;
        parsePred(row.predecessor).forEach(p=>{
          const pi=rowIndex.get(p.id); if(pi==null) return;
          const predSc=effectiveMap[p.id]||model.sched[p.id]||summarySchedule(model,model.rows.findIndex(r=>r.id===p.id));
          const sc=effectiveMap[row.id]||model.sched[row.id]||summarySchedule(model,model.rows.findIndex(r=>r.id===row.id));
          if(!predSc?.end||!sc?.start) return;
          const predLeft=xFor(predSc.start||predSc.end,range);
          const predRight=xFor(predSc.end||predSc.start,range) + w;
          const targetLeft=xFor(sc.start,range);
          const y1=pi*rowH + barTop + barH/2;
          const y2=i*rowH + barTop + barH/2;
          const x1=Math.min(width-2, predRight + sourceGap);
          const xEnd=Math.max(2, targetLeft - targetGap*.25);
          // V47: route to a clean landing point just before the target bar; avoid drawing behind the bar/label.
          let xElbow=Math.max(x1+minElbow, Math.min(targetLeft-targetGap, predRight + Math.max(minElbow,(targetLeft-predRight)*0.42)));
          if(xElbow > targetLeft - targetGap*.65){ xElbow = Math.max(x1+minElbow, targetLeft - targetGap); }
          if(xElbow >= targetLeft-2){ xElbow = Math.max(2, targetLeft - Math.max(8,targetGap)); }
          /* compatibility marker: H ${elbow} V ${y2} H ${x2} */
          const d=`M ${x1} ${y1} H ${xElbow} V ${y2} H ${xEnd}`;
          const halo=document.createElementNS("http://www.w3.org/2000/svg","path");
          halo.setAttribute("class","dep-halo");
          halo.setAttribute("d",d); halo.setAttribute("fill","none"); halo.setAttribute("stroke","#fff"); halo.setAttribute("stroke-width",UI.printMode?"1.05":"4.8"); halo.setAttribute("stroke-linejoin","round"); halo.setAttribute("stroke-linecap","round"); halo.setAttribute("vector-effect","non-scaling-stroke");
          svg.appendChild(halo);
          const path=document.createElementNS("http://www.w3.org/2000/svg","path");
          path.setAttribute("class","dep-line");
          path.setAttribute("d",d);
          path.setAttribute("fill","none");
          path.setAttribute("stroke","#334155");
          path.setAttribute("stroke-width",UI.printMode?"0.52":"2.15");
          path.setAttribute("stroke-linejoin","round");
          path.setAttribute("stroke-linecap","round");
          path.setAttribute("marker-end","url(#depArrow)");
          path.setAttribute("vector-effect","non-scaling-stroke");
          svg.appendChild(path);
        });
      });
    }

    function insertTaskAfter(rowId, asChild=false){ if(!assertLiveMode()) return; const pid=currentProjectId(), model=getModel(pid), st=state(); const idx=model.rows.findIndex(r=>r.id===rowId); const sel=model.rows[idx]; if(!sel) return addTask(); const [a,b]=blockRange(model,rowId); const insertAt=asChild&&sel.type==="summary" ? a+1 : b+1; const parent=asChild&&sel.type==="summary" ? sel.id : (sel.parent||""); const level=asChild&&sel.type==="summary" ? Number(sel.level||0)+1 : Math.max(1,Number(sel.level||1)); const sc=model.sched[sel.id]||{}; const start=sc.end?nextWorkingIso(st,addDays(sc.end,1)):nextWorkingIso(st,firstProjectStart(st,pid)); const id=uniqueRowId(model,`${pid}-T`); const row={id,name:asChild?"Nieuwe subtaak":"Nieuwe taak",type:"task",level,parent,department:sel.department||departments(st)[0]?.id||"Engineering",resourceId:"",progress:0,status:"Niet gestart",predecessor:sel.type!=="summary"?`${sel.id}FS`:"",locked:false,colorKey:sel.colorKey||"c1",hours:0,why:"",feedback:""}; model.rows.splice(insertAt,0,row); model.sched[id]=normalizeSchedule(st,start,null,5); UI.selected=id; saveModel(pid,model,"Taak toegevoegd via rechtermuisknop"); render(); setTimeout(()=>openEdit(id),80); }
    function insertSummaryAfter(rowId=null){ if(!assertLiveMode()) return; const pid=currentProjectId(), model=getModel(pid), st=state(); let insertAt=model.rows.length, level=0, start=firstProjectStart(st,pid); if(rowId){ const [a,b]=blockRange(model,rowId); insertAt=b+1; level=Math.max(0,Number(model.rows[a]?.level||0)); const sc=model.sched[model.rows[a]?.id]||{}; if(sc.end) start=nextWorkingIso(st,addDays(sc.end,1)); } start=nextWorkingIso(st,start); const id=uniqueRowId(model,`${pid}-F`); model.rows.splice(insertAt,0,{id,name:"Nieuwe fase",type:"summary",level,department:departments(st)[0]?.id||"Engineering",resourceId:"",progress:0,status:"Niet gestart",predecessor:"",locked:false,colorKey:"c1",hours:0,why:"",feedback:""}); model.sched[id]=normalizeSchedule(st,start,null,5); UI.selected=id; saveModel(pid,model,"Fase toegevoegd via rechtermuisknop"); render(); setTimeout(()=>openEdit(id),80); }

    function setTaskProgressFromMenu(rowId,progress){ if(!assertLiveMode()) return; const pid=currentProjectId(), model=getModel(pid), row=model.rows.find(r=>r.id===rowId); if(!row) return; row.progress=Math.max(0,Math.min(100,Number(progress)||0)); row.status=row.progress>=100?"Gereed":row.progress>0?"In uitvoering":"Niet gestart"; row.progressUpdatedAt=new Date().toISOString(); saveModel(pid,model,"Voortgang aangepast via rechtermuisknop"); render(); }
