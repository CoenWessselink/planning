    function promptSet(rowId,field,label){ if(!assertLiveMode()) return; const pid=currentProjectId(), model=getModel(pid), row=model.rows.find(r=>r.id===rowId); if(!row) return; const current=field==="colorKey"?colorLabel(row.colorKey):(row[field]||""); const v=window.prompt(label,current); if(v==null) return; if(field==="colorKey") row.colorKey=normalizeColorKey(v,row.colorKey||"c1"); else row[field]=String(v).trim(); if(field==="feedback") { row.why=row.feedback||row.why||""; row.feedbackUpdatedAt=new Date().toISOString(); } saveModel(pid,model,`${label} bijgewerkt via rechtermuisknop`); render(); }
    function toggleLock(rowId){ if(!assertLiveMode()) return; const pid=currentProjectId(), model=getModel(pid), row=model.rows.find(r=>r.id===rowId); if(!row) return; row.locked=!row.locked; saveModel(pid,model,row.locked?"Taak vergrendeld":"Taak ontgrendeld"); render(); }
    function applyPhaseColor(rowId){ if(!assertLiveMode()) return; const pid=currentProjectId(), model=getModel(pid), [a,b]=blockRange(model,rowId); if(a<0) return; const color=model.rows[a].colorKey||"c1"; for(let i=a+1;i<=b;i++) model.rows[i].colorKey=color; saveModel(pid,model,"Fasekleur toegepast op onderliggende taken"); render(); }
    function runContextAction(action,rowId){ hideGanttContextMenu(); const pid=currentProjectId(), model=getModel(pid), row=model.rows.find(r=>r.id===rowId); if(action==="open") return rowId&&openEdit(rowId); if(action==="add-under") return rowId?insertTaskAfter(rowId,false):addTask(); if(action==="add-child") return rowId?insertTaskAfter(rowId,true):addTask(); if(action==="add-task") return addTask(); if(action==="add-phase") return insertSummaryAfter(rowId); if(action==="add-milestone") return insertMilestoneAfter(rowId); if(action==="duplicate") return duplicateRow(rowId); if(action==="delete") return deleteRow(rowId); if(action==="done") return row?.type==="summary"?markBlockProgress(rowId,100):setTaskProgressFromMenu(rowId,100); if(action==="zero") return row?.type==="summary"?markBlockProgress(rowId,0):setTaskProgressFromMenu(rowId,0); if(action==="progress"){ const v=window.prompt("Voortgang %",String(row?.progress??0)); if(v!=null) setTaskProgressFromMenu(rowId,v); return; } if(action==="color") return promptSet(rowId,"colorKey","Kleur wijzigen (Blauw/Groen/Geel/Rood/Paars/Turquoise/Oranje/Lime)"); if(action==="dept") return promptSet(rowId,"department","Afdeling wijzigen"); if(action==="resource") return promptSet(rowId,"resourceId","Resource wijzigen"); if(action==="pred") return openPredecessorPicker(rowId); if(action==="lock") return toggleLock(rowId); if(action==="why") return promptSet(rowId,"feedback","Notitie / WHY / terugkoppeling"); if(action==="apply-color") return applyPhaseColor(rowId); if(action==="generate") { const selected=$("#templateSel")?.value||""; if(selected){ CWS.setState(st=>{ st.templates=st.templates||{taskSets:[]}; st.templates.activeTaskSetId=selected; if(pid && st.projects?.byId?.[pid]) st.projects.byId[pid].templateId=selected; return st; }); } const m=generateModel(pid); saveModel(pid,m,"Fasen uit gekozen template gegenereerd"); toast("Fasen uit gekozen template gegenereerd"); return render(); } if(action==="today") return $("#todayBtn")?.click(); if(action==="recalc") return applyPredecessors(); if(action==="print") return printA3(); }
    function menuButtons(items){ return items.map(it=>it.sep?'<div class="sep"></div>':it.title?`<div class="title">${esc(it.title)}</div>`:`<button type="button" class="${it.danger?'danger':''}" data-ctx-action="${esc(it.action)}">${esc(it.label)}</button>`).join(""); }
    function showGanttContextMenu(event,rowId=null,kind="empty"){
      event.preventDefault(); event.stopPropagation();
      const model=getModel(currentProjectId()); const row=rowId?model.rows.find(r=>r.id===rowId):null;
      UI.selected=rowId||UI.selected; if(rowId) selectRow(model,rowId);
      const phase=row?.type==="summary";
      const items=row ? [
        {title:phase?"Fase acties":"Taak acties"},{label:phase?"Fase openen":"Taak openen",action:"open"},{label:"Taak toevoegen onder deze regel",action:"add-under"}, phase?{label:"Taak toevoegen binnen fase",action:"add-child"}:{label:"Subtaak toevoegen",action:"add-child"},{label:phase?"Fase dupliceren met taken":"Taak dupliceren",action:"duplicate"},{label:phase?"Fase verwijderen met taken":"Taak verwijderen",action:"delete",danger:true},{sep:true},{label:phase?"Alle taken gereed melden":"Markeer als gereed",action:"done"},{label:phase?"Alle taken 0% zetten":"Voortgang instellen",action:phase?"zero":"progress"},{label:"Kleur wijzigen",action:"color"},{label:"Afdeling wijzigen",action:"dept"},{label:"Resource wijzigen",action:"resource"},{label:"Voorganger instellen",action:"pred"},{label:row.locked?"Ontgrendelen":"Vergrendelen",action:"lock"},{label:"Notitie / WHY toevoegen",action:"why"}, phase?{label:"Fasekleur toepassen op onderliggende taken",action:"apply-color"}:null
      ].filter(Boolean) : [
        {title:"Gantt"},{label:"Nieuwe taak toevoegen",action:"add-task"},{label:"Nieuwe fase toevoegen",action:"add-phase"},{label:"Nieuwe mijlpaal toevoegen",action:"add-milestone"},{label:"Genereer standaard fasen/taken",action:"generate"},{sep:true},{label:"Vandaag tonen",action:"today"},{label:"Planning herberekenen",action:"recalc"},{label:"Print A3",action:"print"}
      ];
      const menu=$("#ganttContextMenu"); menu.innerHTML=menuButtons(items); menu.dataset.rowId=rowId||""; menu.setAttribute("aria-hidden","false"); menu.classList.add("show");
      const pad=8; const mw=240, mh=Math.min(520,items.length*38+40); let x=event.clientX, y=event.clientY; if(x+mw>window.innerWidth-pad) x=window.innerWidth-mw-pad; if(y+mh>window.innerHeight-pad) y=window.innerHeight-mh-pad; menu.style.left=Math.max(pad,x)+"px"; menu.style.top=Math.max(pad,y)+"px";
      menu.querySelectorAll("button[data-ctx-action]").forEach(btn=>btn.onclick=()=>runContextAction(btn.dataset.ctxAction, menu.dataset.rowId||null));
    }
    function hideGanttContextMenu(){ const menu=$("#ganttContextMenu"); if(menu){ menu.classList.remove("show"); menu.setAttribute("aria-hidden","true"); } }
    function exportCsv(){
      const cols=visibleColumns();
      const lines=[cols.map(c=>c.label)];
      const pid=currentProjectId(), model=getModel(pid);
      model.rows.forEach((r,i)=>{
        const sc=rowSchedule(model,r,i);
        lines.push(cols.map(c=>textForCol(c,r,sc)));
      });
      if(window.UI?.downloadCSV) UI.downloadCSV("gantt.csv",lines);
      else {
        const csv=lines.map(r=>r.map(c=>`"${String(c).replaceAll('"','""')}"`).join(",")).join("\n");
        const a=document.createElement("a");
        a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
        a.download="gantt.csv";
        a.click();
        URL.revokeObjectURL(a.href);
      }
    }
    function printA3(){
      const oldView=UI.view, oldZoom=UI.zoom, oldPrint=UI.printMode, oldDayW=UI.printDayW, oldTitle=document.title;
      let oldParentTitle=null;
      try{ oldParentTitle=window.parent && window.parent!==window ? window.parent.document.title : null; }catch(_e){}
      const st=state();
      const p=projects(st).find(x=>String(x.id)===String(currentProjectId())) || {};
      const wantedTitle=printFileName(p);
      // V47: set both iframe/module title AND parent shell title; PDF drivers usually read the top document title.
      document.title=wantedTitle;
      try{ if(window.parent && window.parent.document) window.parent.document.title=wantedTitle; }catch(_e){}
      document.body.dataset.printFilename=wantedTitle;
      UI.printMode=true; UI.view="both"; UI.zoom="print"; document.body.classList.add("printing");
      render();
      const restore=()=>{ UI.printMode=oldPrint; UI.view=oldView; UI.zoom=oldZoom; UI.printDayW=oldDayW; document.body.classList.remove("printing"); render(); };
      requestAnimationFrame(()=>setTimeout(()=>{
        document.title=wantedTitle;
        try{ if(window.parent && window.parent.document) window.parent.document.title=wantedTitle; }catch(_e){}
        window.print();
        // Keep title active while the Save as PDF dialog is open. Restore very late.
        setTimeout(()=>{ document.title=oldTitle; try{ if(oldParentTitle!=null && window.parent?.document) window.parent.document.title=oldParentTitle; }catch(_e){} },300000);
      },180));
      const after=()=>{ window.removeEventListener("afterprint",after); setTimeout(restore,900); };
      window.addEventListener("afterprint",after);
      setTimeout(()=>{ if(UI.printMode) restore(); },15000);
    }
    function scheduleRender(reason="state"){
      if(UI._renderScheduled) return;
      UI._renderScheduled=true;
      requestAnimationFrame(()=>{
        UI._renderScheduled=false;
        if(UI.drag || UI._finishingPointerMutation){ UI._pendingSubscriberRender=true; return; }
        render();
      });
    }
    function bind(){ $("#projectSel").onchange=e=>{UI.projectId=e.target.value; render();}; $("#deptSel").onchange=e=>{UI.dept=e.target.value; render();}; $("#resourceSel").onchange=e=>{UI.resource=e.target.value; render();}; const templateSel=$("#templateSel"); if(templateSel) templateSel.onchange=e=>{ const pid=currentProjectId(); CWS.setState(st=>{ st.templates=st.templates||{taskSets:[]}; st.templates.activeTaskSetId=e.target.value; if(pid && st.projects?.byId?.[pid]) st.projects.byId[pid].templateId=e.target.value; return st; }); render(); }; $$('[data-zoom]').forEach(b=>b.onclick=()=>{UI.zoom=b.dataset.zoom; render();}); $$('[data-view]').forEach(b=>b.onclick=()=>{UI.view=b.dataset.view; render();}); $("#generateBtn").onclick=()=>{ const pid=currentProjectId(); const selected=$("#templateSel")?.value||""; if(selected){ CWS.setState(st=>{ st.templates=st.templates||{taskSets:[]}; st.templates.activeTaskSetId=selected; if(pid && st.projects?.byId?.[pid]) st.projects.byId[pid].templateId=selected; return st; }); } const live=getModel(pid); if(live?.rows?.length){ const choice=window.confirm("Dit project bevat al Gantt-taken. OK = bestaande taken vervangen door gekozen template. Annuleren = alleen ontbrekende taken niet toevoegen en stoppen."); if(!choice) return; } const m=generateModel(pid); saveModel(pid,m,"Fasen uit gekozen template gegenereerd"); toast("Fasen uit gekozen template gegenereerd"); render();}; $("#addTaskBtn").onclick=addTask; $("#recalcBtn").onclick=applyPredecessors; $("#depsBtn").onclick=()=>{UI.showDeps=!UI.showDeps; render();}; $("#criticalBtn").onclick=()=>{UI.showCritical=!UI.showCritical; render();}; $("#baselineBtn").onclick=()=>{UI.showBaseline=!UI.showBaseline; render();}; $("#setBaselineBtn").onclick=setBaseline; $("#saveRevisionBtn").onclick=openSaveRevision; $("#revisionsBtn").onclick=openRevisions; $("#liveBtn").onclick=exitRevision; $("#indentBtn").onclick=()=>indent(1); $("#outdentBtn").onclick=()=>indent(-1); $("#undoBtn").onclick=()=>{CWS?.undo?.(); render();}; $("#redoBtn").onclick=()=>{CWS?.redo?.(); render();}; $("#printBtn").onclick=printA3; $("#columnsBtn").onclick=openColumns; $("#labelsBtn").onclick=openLabels; $("#exportBtn").onclick=exportCsv; $("#todayBtn").onclick=()=>{ const wrap=$("#boardWrap"); const todayX=xFor(toIso(new Date()),{start:UI.originStart})-250; wrap.scrollLeft=Math.max(0,todayX); }; $("#chartPane").addEventListener("contextmenu",e=>{ if(e.target.closest(".bar")) return; showGanttContextMenu(e,null,"empty"); }); const boardWrap=$("#boardWrap"); boardWrap.addEventListener("contextmenu",e=>{ if(e.target.closest(".bar")||e.target.closest("#tableRows tr")||e.target.closest("#ganttContextMenu")) return; showGanttContextMenu(e,null,"empty"); }); boardWrap.addEventListener("wheel",e=>{ const horizontalDelta=Math.abs(e.deltaX)>1?e.deltaX:(e.shiftKey?e.deltaY:0); if(horizontalDelta){ const maxX=Math.max(0,boardWrap.scrollWidth-boardWrap.clientWidth); const nextX=Math.max(0,Math.min(maxX,boardWrap.scrollLeft+horizontalDelta)); if(nextX!==boardWrap.scrollLeft){ boardWrap.scrollLeft=nextX; e.preventDefault(); } return; } const maxY=Math.max(0,boardWrap.scrollHeight-boardWrap.clientHeight); const nextY=Math.max(0,Math.min(maxY,boardWrap.scrollTop+e.deltaY)); if(nextY!==boardWrap.scrollTop){ boardWrap.scrollTop=nextY; e.preventDefault(); return; } const maxX=Math.max(0,boardWrap.scrollWidth-boardWrap.clientWidth); const nextX=Math.max(0,Math.min(maxX,boardWrap.scrollLeft+e.deltaY)); if(nextX!==boardWrap.scrollLeft){ boardWrap.scrollLeft=nextX; e.preventDefault(); } },{passive:false,capture:true}); document.body.addEventListener("contextmenu",e=>{ const inMenu=e.target.closest("#ganttContextMenu"); if(inMenu) return; if(e.target.closest("input,textarea,select,button")) return; if(e.target.closest(".bar")||e.target.closest("#tableRows tr")) return; if(e.target.closest(".gantt-shell,.board-wrap,.chart-pane,.table-pane,.panel")){ showGanttContextMenu(e,null,"empty"); } }); $("#chartPane").addEventListener("dblclick",e=>{ const bar=e.target.closest(".bar"); if(!bar) return; e.preventDefault(); e.stopPropagation(); UI.selected=bar.dataset.id; openEdit(bar.dataset.id); }); $("#modalClose").onclick=()=>$("#modalBack").classList.remove("show"); $("#modalBack").onclick=e=>{ if(e.target.id==="modalBack") $("#modalBack").classList.remove("show"); }; document.addEventListener("click",e=>{ if(!e.target.closest("#ganttContextMenu")) hideGanttContextMenu(); }); window.addEventListener("keydown",e=>{ if(e.key==="Escape"){ $("#modalBack").classList.remove("show"); hideGanttContextMenu(); } if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();CWS?.undo?.();render();} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="y"){e.preventDefault();CWS?.redo?.();render();} }); if(CWS?.subscribe) CWS.subscribe(()=>{

    bind(); scheduleRender("initial");
