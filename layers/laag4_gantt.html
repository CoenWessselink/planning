  <style>

    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--line);background:#fff}.toolbar-group{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding-right:8px;border-right:1px solid var(--line)}.toolbar-group:last-child{border-right:0}.input,.select{height:38px;min-width:150px;border:1px solid #d7dee8;border-radius:11px;background:#fff;color:#0f172a;padding:0 10px;font-size:13px;outline:none}.select.project{min-width:260px}.btn{height:38px;border:1px solid #d7dee8;border-radius:11px;background:#f8fafc;color:#111827;font-weight:700;padding:0 12px;font-size:13px;cursor:pointer;white-space:nowrap}.btn:hover{background:#eff6ff;border-color:#bfdbfe}.btn.primary{background:#e8f1ff;border-color:#9cc4ff;color:#0b5cac}.btn.active{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}.btn.danger{background:#fff7ed;border-color:#fed7aa;color:#9a3412}.btn:disabled{opacity:.55;cursor:not-allowed}

);display:flex;align-items:center;justify-content:center;font-size:11px;color:#475569;font-weight:700}.tl-cell.day.weekend{background:#fafafa;color:#94a3b8}.tl-cell.today{background:#fef2f2;color:#b91c1c}.lane{height:var(--rowH);position:relative;border-bottom:1px solid #eef2f7;background-image:linear-gradient(to right,#e7ecf3 1px,transparent 1px);background-size:var(--dayW) 100%}.lane:nth-child(even){background-color:#fbfdff}.bar{position:absolute;top:2px;height:45px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;padding:0 9px;font-size:12px;font-weight:800;box-shadow:0 4px 10px rgba(47,111,189,.22);cursor:grab;overflow:hidden}.bar.locked{opacity:.65;filter:grayscale(.25);cursor:not-allowed}.bar.critical{box-shadow:0 0 0 2px rgba(220,38,38,.65),0 4px 10px rgba(47,111,189,.22)}.bar.summary{background:transparent!important;box-shadow:none;cursor:default;color:#111827;padding:0}.bar.summary:before{content:"";position:absolute;left:0;right:0;top:20px;border-top:4px solid rgba(15,23,42,.90);border-radius:2px}.bar.summary:after{content:"";position:absolute;left:0;right:0;top:29px;border-top:2px solid rgba(15,23,42,.85);border-radius:2px}.bar-label{position:relative;z-index:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar-progress{position:absolute;left:0;top:0;bottom:0;background:rgba(187,247,208,.62);border-right:2px solid rgba(22,101,52,.72);z-index:1;pointer-events:none}.bar-progress.done{background:rgba(220,252,231,.82)}.bar-feedback-dot{position:absolute;right:5px;top:5px;width:14px;height:14px;border-radius:999px;background:#fff;color:#1d4ed8;border:1px solid rgba(29,78,216,.35);font-size:10px;line-height:12px;text-align:center;font-weight:900;z-index:3;box-shadow:0 1px 3px rgba(15,23,42,.18)}.handle{position:absolute;top:0;width:8px;height:100%;background:rgba(255,255,255,.26);cursor:ew-resize}.handle.left{left:0}.handle.right{right:0}.summary .handle{display:none}.baseline{position:absolute;height:7px;border-radius:4px;background:#111827;opacity:.32;bottom:3px}.dep-svg{position:absolute;left:0;top:var(--headH);width:100%;height:calc(100% - var(--headH));pointer-events:none;overflow:visible}.empty{margin:18px;padding:24px;border:1px dashed #cbd5e1;border-radius:14px;text-align:center;color:#64748b;background:#f8fafc}.context{margin:0 18px 18px;border:1px solid var(--line);border-radius:13px;background:#fff;overflow:hidden}.context-head{padding:11px 13px;border-bottom:1px solid var(--line);font-weight:900}.context-body{padding:12px;color:#475569;font-size:13px}.ctx-grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px}.ctx-card{border:1px solid #e2e8f0;border-radius:10px;padding:9px;background:#f8fafc}.ctx-card b{display:block;color:#0f172a;margin-bottom:3px}.modalback{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:1000}.modalback.show{display:flex}.modal{width:min(920px,96vw);max-height:88vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 18px 60px rgba(15,23,42,.28);border:1px solid #e2e8f0}.modal-head,.modal-foot{padding:14px 16px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}.modal-foot{border-top:1px solid #e2e8f0;border-bottom:0;justify-content:flex-end;gap:8px}.modal-body{padding:16px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:5px;font-size:12px;color:#64748b;font-weight:700}.field input,.field select,.field textarea{height:38px;border:1px solid #d7dee8;border-radius:10px;padding:0 10px;background:#fff}.field textarea{height:76px;padding:10px;resize:vertical}.gantt-context-menu{position:fixed;z-index:1600;min-width:230px;background:#fff;border:1px solid #cbd5e1;border-radius:12px;box-shadow:0 18px 48px rgba(15,23,42,.22);padding:6px;display:none}.gantt-context-menu.show{display:block}.gantt-context-menu button{width:100%;height:34px;border:0;backgroun     /* V12 Gantt alignment fix
       The left task table has 11 columns. In V11 the table was wider than the
       760px grid column, so its text visually flowed into the timeline and
       over the bars. Keep the table and chart in two hard columns. */
    .board{grid-template-columns:var(--leftW) max-content;min-width:calc(var(--leftW) + 900px)}
    .table-pane{width:var(--leftW);min-width:var(--leftW);max-width:var(--leftW);overflow:hidden;z-index:12}
    .chart-pane{z-index:1;overflow:hidden}
    .gantt-table{table-layout:fixed;width:var(--leftW);min-width:var(--leftW);max-width:var(--leftW)}
    .gantt-table th,.gantt-table td{overflow:hidden;text-overflow:ellipsis;max-width:0}
    .gantt-table th:nth-child(1),.gantt-table td:nth-child(1){width:100px}
    .gantt-table th:nth-child(2),.gantt-table td:nth-child(2){width:250px}
    .gantt-table th:nth-child(3),.gantt-table td:nth-child(3){width:100px}
    .gantt-table th:nth-child(4),.gantt-table td:nth-child(4){width:100px}
    .gantt-table th:nth-child(5),.gantt-table td:nth-child(5){width:60px}
    .gantt-table th:nth-child(6),.gantt-table td:nth-child(6){width:90px}
    .gantt-table th:nth-child(7),.gantt-table td:nth-child(7){width:105px}
    .gantt-table th:nth-child(8),.gantt-table td:nth-child(8){width:100px}
    .gantt-table th:nth-child(9),.gantt-table td:nth-child(9){width:90px}
    .gantt-table th:nth-child(10),.gantt-table td:nth-child(10){width:75px}
    .gantt-table th:nth-child(11),.gantt-table td:nth-child(11){width:50px}
    .taskcell{min-width:0;width:100%;overflow:hidden}.taskname{min-width:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}.cellinput,.color-select,.resource-select,.dept-select{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar{z-index:6;min-width:18px;contain:layout paint}.bar-label{min-width:0;max-width:100%;display:block;pointer-events:none;text-shadow:0 1px 1px rgba(15,23,42,.25)}.bar.summary{z-index:5}.baseline{z-index:4}.dep-svg{z-index:3}.handle{z-index:8}
    .board-wrap{scrollbar-gutter:stable both-edges}.timeline{z-index:4}.gantt-table thead th{z-index:13}
    @media (max-width: 1280px){:root{--leftW:1040px}.gantt-table th:nth-child(2),.gantt-table td:nth-child(2){width:220px}.gantt-table th:nth-child(7),.gantt-table td:nth-child(7){width:95px}.gantt-table th:nth-child(8),.gantt-table td:nth-child(8){width:95px}.gantt-table th:nth-child(9),.gantt-table td:nth-child(9){width:80px}.gantt-table th:nth-child(10),.gantt-table td:nth-child(10){width:65px}}
  

    /* V14 Gantt table/diagram/print refinements */
    :root{--print-scale:1;--print-chart-w:1000px}
    .toolbar-group.columns-group{border-right:1px solid var(--line)}
    .gantt-table{table-layout:fixed}
    .gantt-table th,.gantt-table td{box-sizing:border-box}
    .gantt-table th[data-col],.gantt-table td[data-col]{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .gantt-table input,.gantt-table select{max-width:100%;min-width:0}
    .taskcell{min-width:0;width:100%;overflow:hidden}
    .taskname{min-width:0;overflow:hidden;text-overflow:ellipsis}
    .lane{background-image:repeating-linear-gradient(to right, rgba(15,23,42,.13) 0 1px, transparent 1px var(--dayW)), repeating-linear-gradient(to right, rgba(15,23,42,.28) 0 2px, transparent 2px calc(var(--dayW) * 7));}
    .tl-cell{border-right-color:#d0d7e2;border-bottom-color:#d0d7e2}
    .bar{z-index:6;font-size:14px;line-height:1.1;text-shadow:0 1px 1px rgba(0,0,0,.26)}
    .bar-label{display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar.summary{height:45px;overflow:visible;text-shadow:none;z-index:5}
    .bar.summary:before{top:28px;border-top-width:4px}
    .bar.summary:after{top:36px;border-top-width:2px}
    .bar.summary .bar-label{position:absolute;left:0;top:3px;max-width:min(420px,100%);padding:2px 7px;border:1px solid #111827;border-radius:4px;background:#fff;color:#111827;font-size:13px;line-height:16px;font-weight:900;box-shadow:0 1px 0 rgba(255,255,255,.95);}
    .dep-svg{z-index:3}.dep-svg path{vector-effect:non-scaling-stroke}.baseline{z-index:4}.today-line{position:absolute;top:0;bottom:0;width:2px;background:#dc2626;z-index:12;pointer-events:none;box-shadow:0 0 0 1px rgba(220,38,38,.20)}
    .today-line::before{content:"Vandaag";position:absolute;top:3px;left:4px;background:#dc2626;color:#fff;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:900;white-space:nowrap}
    .print-legend{display:none;margin:0 18px 18px;border:1px solid #111827;background:#fff;color:#111827;font-size:11px}.print-legend .legend-title{font-weight:900;padding:6px 8px;border-bottom:1px solid #111827}.legend-items{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:6px 12px;padding:7px 8px}.legend-item{display:flex;align-items:center;gap:6px;min-width:0}.legend-swatch{width:30px;height:12px;border:1px solid #111827;flex:0 0 auto}.legend-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.legend-diamond{width:10px;height:10px;border:1px solid #111827;transform:rotate(45deg);background:#fff;margin-left:10px;margin-right:10px;flex:0 0 auto}
    @media print{
      @page{size:A3 landscape;margin:8mm}
      html,body{height:auto!important;overflow:visible!important;background:#fff!important}
      body{padding:0!important;color:#000!important}
      .gantt-shell{border:0!important;border-radius:0!important;box-shadow:none!important;overflow:visible!important}
      .module-head{padding:4px 6px 8px 6px!important;border-bottom:0!important;background:#fff!important;text-align:center!important}
      .module-head h1{font-size:12px!important;margin:0!important}.module-head p{font-size:8px!important;color:#000!important}.module-head .status,.toolbar,.notice,.context,.table-pane{display:none!important}
      .meta-line{font-size:7px!important;padding:2px 0 4px!important;color:#000!important}.board-wrap{margin:0!important;border:0!important;border-radius:0!important;overflow:visible!important;background:#fff!important}.board{display:block!important;min-width:0!important}.board.diagram-only{display:block!important}.chart-pane{display:block!important;min-width:0!important;overflow:visible!important;background:#fff!important}.timeline{position:relative!important;top:auto!important;height:54px!important;grid-template-rows:18px 18px 18px!important;background:#fff!important}.tl-cell{font-size:6px!important;color:#000!important;border-color:#777!important}.lane{height:30px!important;border-bottom:1px solid #bbb!important;background-image:repeating-linear-gradient(to right,#777 0 1px,transparent 1px var(--dayW)),repeating-linear-gradient(to right,#000 0 2px,transparent 2px calc(var(--dayW) * 7))!important}.bar{top:4px!important;height:18px!important;border-radius:2px!important;font-size:6px!important;padding:0 3px!important;box-shadow:none!important;text-shadow:none!important;border:1px solid #111!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.bar.summary{height:28px!important;border:0!important}.bar.summary:before{top:13px!important;border-top:2px solid #111!important}.bar.summary:after{top:18px!important;border-top:1px solid #111!important}.bar.summary .bar-label{top:0!important;font-size:6px!important;line-height:8px!important;padding:0 2px!important;border:1px solid #111!important}.handle{display:none!important}.dep-svg{top:54px!important;height:calc(100% - 54px)!important}.dep-svg path{stroke:#777!important;stroke-width:.8!important}.today-line{width:1.5px!important;background:#dc2626!important}.today-line::before{display:none!important}.print-legend{display:block!important;margin:6px 0 0!important;break-inside:avoid;page-break-inside:avoid}.legend-title{font-size:8px!important;padding:3px 4px!important}.legend-items{grid-template-columns:repeat(6,minmax(95px,1fr))!important;gap:3px 6px!important;padding:4px!important}.legend-item{font-size:7px!important}.legend-swatch{width:22px!important;height:8px!important}.legend-diamond{width:7px!important;height:7px!important;margin-left:5px;margin-right:5px}
    }


    /* V16 — Gantt kalender/print volledig herzien
       Doelen: kalender vult zichtbaar diagram, daglijnen dun maar zichtbaar,
       taakrijen gescheiden, A3-print vult de pagina en gebruikt exact projectbereik. */
    .chart-pane{min-width:100%;overflow:visible;background:#fff}
    #timeline,#lanes{min-width:100%;background:#fff}
    .tl-cell{border-right:1px solid rgba(15,23,42,.16)!important;border-bottom:1px solid rgba(15,23,42,.16)!important}
    .tl-row:nth-child(1) .tl-cell,.tl-row:nth-child(2) .tl-cell{border-right:1px solid rgba(15,23,42,.20)!important}
    .tl-row:nth-child(2) .tl-cell{border-bottom:1px solid rgba(15,23,42,.30)!important}
    .lane{border-bottom:1px solid rgba(15,23,42,.10)!important;background-image:repeating-linear-gradient(to right, rgba(15,23,42,.13) 0 1px, transparent 1px var(--dayW)), repeating-linear-gradient(to right, rgba(15,23,42,.28) 0 1px, transparent 1px calc(var(--dayW) * 7))!important;background-size:auto!important}

    const colorMap = { c1:"#2f6fbd", c2:"#16a34a", c3:"#f59e0b", c4:"#dc2626", c5:"#8b5cf6", c6:"#14b8a6", c7:"#f97316", c8:"#22c55e" };

    function normalizeColorKey(value, fallback="c1"){
      const raw = String(value ?? "").trim();

    }

    const UI = { zoom:"week", view:"both", showDeps:false, showCritical:false, showBaseline:false, projectId:null, dept:"", resource:"", selected:null, originStart:null, drag:null, printMode:false, revisionId:null, printDayW:null };
    const COL_KEY = "cws.gantt.visibleColumns.v20";
    const COL_ORDER_KEY = "cws.gantt.columnOrder.v28";
    const ALL_COLUMNS = [
      {id:"rowno",label:"Nr",min:42,control:"text"},
      {id:"id",label:"ID",min:72,control:"text"},
      {id:"name",label:"Taak",min:118,control:"task"},
      {id:"start",label:"Start",min:82,control:"date"},
      {id:"end",label:"Einde",min:82,control:"date"},
      {id:"duration",label:"Duur",min:54,control:"text"},
      {id:"progress",label:"Voortgang",min:78,control:"number"},
      {id:"taskStatus",label:"Status",min:112,control:"select"},
      {id:"feedback",label:"Terugkoppeling",min:170,control:"input"},
      {id:"hours",label:"Uren",min:58,control:"number"},
      {id:"predecessor",label:"Voorganger",min:148,control:"picker"},

      {id:"resource",label:"Resource",min:70,control:"select"},
      {id:"color",label:"Kleur",min:126,control:"select"},
      {id:"locked",label:"Lock",min:46,control:"checkbox"},
      {id:"actions",label:"Acties",min:74,control:"actions"}

    const DEFAULT_COLS = ["rowno","id","name","start","end","duration","progress","taskStatus","feedback","hours","predecessor","department","resource","color","locked","actions"];
    const BASIC_COLS = ["rowno","id","name","start","end","duration","hours","predecessor","actions"];
    const LABEL_KEY = "cws.gantt.barLabels.v25";
    const LABEL_POSITIONS = [

    const LABEL_FIELDS = [
      {id:"name", label:"Taaknaam"},
      {id:"project", label:"Project"},
      {id:"department", label:"Afdeling"},
      {id:"resource", label:"Resource"},
      {id:"start", label:"Startdatum"},
      {id:"end", label:"Einddatum"},
      {id:"duration", label:"Aantal dagen"},
      {id:"hours", label:"Uren"},
      {id:"progress", label:"Voortgang"},
      {id:"predecessor", label:"Voorganger"},
      {id:"status", label:"Status"},
      {id:"why", label:"WHY / notitie"},
      {id:"feedback", label:"Terugkoppeling"}
    ];
    const DEFAULT_LABELS = { before:[], inside:["name"], after:["resource","duration"] };
    function cleanLabelConfig(raw){
      const allowed=new Set(LABEL_FIELDS.map(f=>f.id));
      const next={before:[],inside:["name"],after:["resource","duration"]};
      LABEL_POSITIONS.forEach(pos=>{
        const arr=Array.isArray(raw?.[pos.id]) ? raw[pos.id] : DEFAULT_LABELS[pos.id];
        next[pos.id]=arr.filter(id=>allowed.has(id));
      });
      return next;
    }
    function loadLabelConfig(){
      try{ return cleanLabelConfig(JSON.parse(localStorage.getItem(LABEL_KEY)||"null")); }catch(e){ return cleanLabelConfig(DEFAULT_LABELS); }

    function loadVisibleCols(){
      try{
        const arr=JSON.parse(localStorage.getItem(COL_KEY)||"null");
        if(Array.isArray(arr)&&arr.length){
          const allowed=new Set(ALL_COLUMNS.map(c=>c.id));
          const clean=arr.filter(id=>allowed.has(id));
          if(clean.length){
            // V23: urenkolom standaard zichtbaar maken bij bestaande browsers.
            if(clean.includes("progress") && !clean.includes("hours")) clean.splice(clean.indexOf("progress")+1,0,"hours");
            return new Set(clean);
          }
        }
      }catch(e){}
      return new Set(DEFAULT_COLS);
    }
    function saveVisibleCols(set){ try{ localStorage.setItem(COL_KEY, JSON.stringify(Array.from(set))); }catch(e){} }
    function loadColumnOrder(){
      try{
        const raw=JSON.parse(localStorage.getItem(COL_ORDER_KEY)||"null");
        if(Array.isArray(raw)&&raw.length){
          const allowed=new Set(ALL_COLUMNS.map(c=>c.id));
          const clean=raw.filter(id=>allowed.has(id));
          ALL_COLUMNS.forEach(c=>{ if(!clean.includes(c.id)) clean.push(c.id); });
          return clean;
        }
      }catch(e){}
      return ALL_COLUMNS.map(c=>c.id);
    }
    function saveColumnOrder(ids){ try{ localStorage.setItem(COL_ORDER_KEY, JSON.stringify(ids)); }catch(e){} }
    function visibleColumns(){ const set=loadVisibleCols(); const order=loadColumnOrder(); const byId=new Map(ALL_COLUMNS.map(c=>[c.id,c])); return order.map(id=>byId.get(id)).filter(c=>c&&set.has(c.id)); }
    function textForCol(col,row,sc){
      const d=duration(sc.start,sc.end);
      if(col.id==="rowno") return row._displayNo || "";
      if(col.id==="id") return row.id;
      if(col.id==="name") return row.name;
      if(col.id==="start") return toNL(sc.start);
      if(col.id==="end") return toNL(sc.end);
      if(col.id==="duration") return `${d} d`;
      if(col.id==="progress") return `${Number(row.progress||0)} %`;
      if(col.id==="taskStatus") return row.status || (Number(row.progress||0)>=100 ? "Gereed" : Number(row.progress||0)>0 ? "In uitvoering" : "Niet gestart");
      if(col.id==="feedback") return row.feedback || row.why || "";
      if(col.id==="hours") return Number(row.hours||0) ? `${Number(row.hours||0)} u` : "auto";
      if(col.id==="predecessor") return predecessorDisplay(row.predecessor);
      if(col.id==="department") { const st=state(); const d=departments(st).find(x=>String(x.id||x.name)===String(row.department)||String(x.name)===String(row.department)); return d?(d.name||d.id):(row.department||""); }
      if(col.id==="resource") { const st=state(); const r=(st.resources?.byId||{})[row.resourceId]; return r?(r.name||r.id):(row.resourceId||"—"); }
      if(col.id==="color") return colorLabel(row.colorKey);
      if(col.id==="locked") return row.locked?"ja":"nee";
      if(col.id==="actions") return "";
      if(col.id==="project") { const p=state().projects?.byId?.[currentProjectId()]||{}; return p.nr||p.code||p.name||p.id||""; }
      if(col.id==="status") return row.status || (row.locked ? "Vastgezet" : row.type==="summary" ? "Fase" : "Taak");
      if(col.id==="why") return row.why || "";
      return "";
    }
    function labelTextForField(id,row,sc){ return textForCol({id},row,sc); }
    function labelText(ids,row,sc){
      return (ids||[]).map(id=>labelTextForField(id,row,sc)).map(v=>String(v||"").trim()).filter(Boolean).join(" | ");
    }
    function textMeasure(){
      if(textMeasure.ctx) return textMeasure.ctx;
      const canvas=document.createElement("canvas");
      const ctx=canvas.getContext("2d");
      ctx.font='600 13px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif';
      textMeasure.ctx=ctx;
      return ctx;
    }
    function measurePx(value, weight){
      const ctx=textMeasure();
      ctx.font=`${weight||600} 13px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif`;
      return Math.ceil(ctx.measureText(String(value ?? "")).width);
    }
    function columnPadding(col){
      if(col.control==="task") return 64;       // celpadding + twisty + inspringruimte
      if(col.id==="color") return 74;       // swatch + kleurdropdown
      if(col.control==="select") return 52;     // celpadding + dropdownpijl
      if(col.control==="checkbox") return 24;
      if(col.control==="actions") return 26;
      if(col.control==="number") return 34;
      if(col.control==="input" || col.control==="date") return 30;
      return 24;
    }
    function columnWidths(cols, rows){
      return cols.map(col=>{
        let width = measurePx(col.label, 800) + 22;
        rows.forEach(({row,sc})=>{
          const content = textForCol(col,row,sc);
          const indent = col.id==="name" ? Math.max(0,Number(row.level||0))*18 : 0;

    function buildCell(col,row,sc,st,indent){

      if(col.id==="start") return dateInputCell("start", sc.start, row.type==="summary"||row.locked||readOnly?"disabled":"");
      if(col.id==="end") return dateInputCell("end", sc.end, row.type==="summary"||row.locked||readOnly?"disabled":"");

    function openColumns(){

    function renderFilters(){ const st=state(); const pid=currentProjectId(); const projectSel=$("#projectSel"); projectSel.innerHTML=projects(st).filter(p=>p.status!=="Gereed").map(p=>`<option value="${esc(p.id)}">${esc(projectLabel(p))}</option>`).join(""); if(pid) projectSel.value=pid; $("#deptSel").innerHTML='<option value="">Alle afdelingen</option>'+departments(st).map(d=>`<option value="${esc(d.id||d.name)}">${esc(d.name||d.id)}</option>`).join(""); $("#deptSel").value=UI.dept||""; $("#resourceSel").innerHTML='<option value="">Alle resources</option>'+resources(st).map(r=>`<option value="${esc(r.id)}">${esc(r.name||r.id)} (${esc(r.dept||"")})</option>`).join(""); $("#resourceSel").value=UI.resource||""; const dl=$("#resourceOptions"); if(dl) dl.innerHTML=resources(st).map(r=>`<option value="${esc(r.id)}">${esc(r.name||r.id)}</option>`).join(""); renderTemplateSelect(st,pid); const status=CWS?.storageStatus; $("#storageBadge").textContent=status?.mode==="api"?`D1 gedeeld v${CWS.getRemoteVersion?.()||0}`:"Lokale browserdata"; $("#storageBadge").className="badge "+(status?.mode==="api"?"ok":"warn"); }

        const afterHtml=afterText&&afterW>=24?`<span class="bar-text-after" title="${esc(afterText)}" style="left:${afterLeft}px;width:${afterW}px">${esc(afterText)}</span>`:"";

      if(tl){ tl.style.display=(todayX>=0&&todayX<=chartW)?"block":"none"; tl.style.left=todayX+"px"; tl.style.height=`calc(var(--headH) + ${rows.length*(UI.printMode?22:48)}px)`; }
      $("#board").className="board "+(UI.view==="table"?"table-only":UI.view==="diagram"?"diagram-only":"");
      const revMeta=model._revision ? ` | revisie ${model._revision.revNo||""} | revisiedatum ${toNL(model._revision.revisionDate)||model._revision.revisionDate||"—"} | status ${model._revision.status||"—"}${model._revision.description?` | ${model._revision.description}`:""}` : " | live planning";
      $("#metaLine").innerHTML=`${rows.length} regels | zoom ${UI.zoom}${UI.printMode?" | printbereik: 1 week vóór eerste taak t/m 1 week na laatste taak":""} | urenbron: Projecturen per afdeling | dagen: ${days.length}${esc(revMeta)}${model._revision?` <span class="revision-pill">Alleen lezen</span>`:""}`;
      renderLegend(rows);

      else setNotice(CWS.storageStatus?.mode==="api"?"":"Let op: je werkt nu met lokale browserdata. Collega's zien deze wijzigingen niet.","warn");

    function renderLegend(rows){
      const seen=new Set(), items=[];
      rows.forEach(({row})=>{ const key=(row.colorKey||"c1")+"|"+(row.name||""); if(!seen.has(key)){ seen.add(key); items.push({name:row.name||row.id,color:colorHex(row.colorKey)}); } });
      $("#printLegend").innerHTML=`<div class="legend-title">Legenda</div><div class="legend-items">${items.slice(0,24).map(it=>`<div class="legend-item"><span class="legend-swatch" style="background:${esc(it.color)}"></span><span class="legend-text">${esc(it.name)}</span></div>`).join("")}<div class="legend-item"><span class="legend-diamond"></span><span class="legend-text">Mijlpaal</span></div></div>`;
    }
    function renderPrintTaskTable(rows){
      const host=$("#printTaskTable");
      if(!host) return;
      const body=rows.map(({row,sc})=>{

    }

    function uniqueRowId(model, base){
      const existing=new Set(model.rows.map(r=>String(r.id)));
      const clean=sanitizeIdPart(base||"TA", "TA");
      let n=1, id=`${clean}-K${n}`;
      while(existing.has(id)){ n++; id=`${clean}-K${n}`; }
      return id;
    }
    function blockRange(model, rowId){
      const idx=model.rows.findIndex(r=>r.id===rowId);
      if(idx<0) return [-1,-1];
      const row=model.rows[idx];
      if(row.type!=="summary") return [idx,idx];
      let end=idx;
      const lvl=Number(row.level||0);
      for(let i=idx+1;i<model.rows.length;i++){
        if(Number(model.rows[i].level||0)<=lvl) break;
        end=i;
      }
      return [idx,end];
    }
    function removePredRefs(raw, removed){
      return String(raw||"").split(/[;,]+/).map(x=>x.trim()).filter(Boolean).filter(part=>{
        const m=part.match(/^(.+?)(FS|SS|FF|SF)([+-]\d+)?$/i);
        const id=m?m[1].trim():part;
        return !removed.has(id);
      }).join(",");
    }
    function deleteRow(rowId){ if(!assertLiveMode()) return; 
      const pid=currentProjectId(), model=getModel(pid);
      const [a,b]=blockRange(model,rowId);
      if(a<0) return;
      const row=model.rows[a];
      const label=row.type==="summary" ? "fase inclusief onderliggende taken" : "taak";
      if(!window.confirm(`${label} verwijderen?`)) return;
      const removedRows=model.rows.slice(a,b+1);
      const removed=new Set(removedRows.map(r=>r.id));
      model.rows.splice(a,b-a+1);
      removed.forEach(id=>{ delete model.sched[id]; });
      model.rows.forEach(r=>{ if(r.predecessor) r.predecessor=removePredRefs(r.predecessor, removed); if(removed.has(r.parent)) delete r.parent; });
      UI.selected=null;
      saveModel(pid,model,"Taak verwijderd");
      toast(row.type==="summary" ? "Fase verwijderd" : "Taak verwijderd");
      render();
    }
    function duplicateRow(rowId){ if(!assertLiveMode()) return; 
      const pid=currentProjectId(), model=getModel(pid);
      const [a,b]=blockRange(model,rowId);
      if(a<0) return;
      const source=model.rows.slice(a,b+1);
      const idMap=new Map();
      source.forEach(r=>idMap.set(r.id, uniqueRowId(model, r.id)));
      const clones=source.map((r,idx)=>{
        const c=JSON.parse(JSON.stringify(r));
        c.id=idMap.get(r.id);
        if(idx===0) c.name=`${c.name || "Taak"} kopie`;
        if(c.parent && idMap.has(c.parent)) c.parent=idMap.get(c.parent);
        if(c.predecessor){
          c.predecessor=String(c.predecessor).split(/[;,]+/).map(part=>{
            const x=part.trim();
            const m=x.match(/^(.+?)(FS|SS|FF|SF)([+-]\d+)?$/i);
            if(!m){ const target=idMap.get(x) || idMap.get(sanitizeIdPart(x,x)); return target?`${target}FS`:x; }
            const repl=idMap.get(m[1].trim()) || m[1].trim();
            return `${repl}${m[2].toUpperCase()}${m[3]||""}`;
          }).filter(Boolean).join(",");
        }
        return c;
      });
      clones.forEach((c,idx)=>{
        const old=source[idx];
        if(model.sched[old.id]) model.sched[c.id]=JSON.parse(JSON.stringify(model.sched[old.id]));
      });
      model.rows.splice(b+1,0,...clones);
      UI.selected=clones[0]?.id || rowId;
      saveModel(pid,model,"Taak gedupliceerd");
      toast(source[0].type==="summary" ? "Fase gedupliceerd" : "Taak gedupliceerd");
      render();
    }
    function addTask(){ if(!assertLiveMode()) return; 
      const pid=currentProjectId(), model=getModel(pid), st=state();
      let insertAt=model.rows.length;
      let level=1, parent="", dept=departments(st)[0]?.id || departments(st)[0]?.name || "Engineering";
      let start=firstProjectStart(st,pid), pred="";
      if(UI.selected){
        const [a,b]=blockRange(model,UI.selected);
        const sel=model.rows.find(r=>r.id===UI.selected);
        if(sel){
          if(sel.type==="summary"){
            insertAt=b+1;
            level=Number(sel.level||0)+1;
            parent=sel.id;
            dept=sel.department || dept;
            const lastChild=model.rows.slice(a+1,b+1).filter(r=>r.type!=="summary").at(-1);
            const lastSc=lastChild ? model.sched[lastChild.id] : null;
            if(lastSc?.end){ start=addDays(lastSc.end,1); pred=`${lastChild.id}FS`; }
          } else {
            insertAt=b+1;
            level=Math.max(1,Number(sel.level||1));
            parent=sel.parent || "";
            dept=sel.department || dept;
            const selSc=model.sched[sel.id];
            if(selSc?.end){ start=addDays(selSc.end,1); pred=`${sel.id}FS`; }
          }
        }
      } else if(model.rows.length){
        const prev=model.rows.filter(r=>r.type!=="summary").at(-1);
        if(prev){ const sc=model.sched[prev.id]; if(sc?.end){ start=addDays(sc.end,1); pred=`${prev.id}FS`; } level=Math.max(1,Number(prev.level||1)); parent=prev.parent||""; dept=prev.department||dept; }
      }
      const id=uniqueRowId(model, `${pid}-T`);
      const row={id,name:"Nieuwe taak",type:"task",level,parent,department:dept,resourceId:"",progress:0,predecessor:pred,locked:false,colorKey:"c1",hours:0,why:""};
      model.rows.splice(insertAt,0,row);
      model.sched[id]={start,end:addDays(start,4)};
      UI.selected=id;
      saveModel(pid,model,"Taak toegevoegd");
      render();
      setTimeout(()=>openEdit(id),80);
    }
    function updateButtons(){ $$('[data-zoom]').forEach(b=>b.classList.toggle('active',b.dataset.zoom===UI.zoom)); $$('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===UI.view)); $('#depsBtn').classList.toggle('active',UI.showDeps); $('#criticalBtn').classList.toggle('active',UI.showCritical); $('#baselineBtn').classList.toggle('active',UI.showBaseline); $('#undoBtn').disabled=!!UI.revisionId||!(CWS?.canUndo?.()); $('#redoBtn').disabled=!!UI.revisionId||!(CWS?.canRedo?.()); ['generateBtn','addTaskBtn','recalcBtn','setBaselineBtn','indentBtn','outdentBtn','saveRevisionBtn'].forEach(id=>{ const el=$('#'+id); if(el) el.disabled=!!UI.revisionId; }); const live=$('#liveBtn'); if(live) live.classList.toggle('hidden',!UI.revisionId); }
    function updateRow(model,rowId,patch){ if(!assertLiveMode()) return; const row=model.rows.find(r=>r.id===rowId); if(!row) return; Object.assign(row,patch); saveModel(currentProjectId(),model); render(); }
    function saveModelNoRender(pid, model, msg="Opgeslagen"){ saveModel(pid,model,msg); }
    function scheduleRenderAfterInput(delay=220){ clearTimeout(UI.inputRenderTimer); UI.inputRenderTimer=setTimeout(()=>render(),delay); }
    function selectRow(model,rowId){
      UI.selected=rowId;
      $$("#tableRows tr").forEach(tr=>tr.classList.toggle("selected", tr.dataset.id===rowId));
      $$(".bar").forEach(b=>b.classList.toggle("selected", b.dataset.id===rowId));
      renderContext(model);
    }
    function wireColumnDrag(){
      const ths=$$("#ganttHead th[data-col]");
      ths.forEach(th=>{
        th.addEventListener("dragstart",e=>{ e.dataTransfer.setData("text/plain", th.dataset.col); e.dataTransfer.effectAllowed="move"; });
        th.addEventListener("dragover",e=>{ e.preventDefault(); e.dataTransfer.dropEffect="move"; });
        th.addEventListener("drop",e=>{
          e.preventDefault();
          const from=e.dataTransfer.getData("text/plain");
          const to=th.dataset.col;
          if(!from||!to||from===to) return;
          const order=loadColumnOrder();
          const a=order.indexOf(from), b=order.indexOf(to);
          if(a<0||b<0) return;
          const [moved]=order.splice(a,1);
          order.splice(b,0,moved);
          saveColumnOrder(order);
          toast("Kolomvolgorde opgeslagen");
          render();
        });
      });
    }
    function wireRows(model,pid){
      $$("#tableRows tr").forEach(tr=>{
        const rowId=tr.dataset.id;
        tr.addEventListener("dragstart",e=>{ if(e.target && ["INPUT","SELECT","OPTION","BUTTON","TEXTAREA"].includes(e.target.tagName)) { e.preventDefault(); return; } e.dataTransfer.setData("text/plain", rowId); e.dataTransfer.effectAllowed="move"; });
        tr.addEventListener("dragover",e=>{ e.preventDefault(); e.dataTransfer.dropEffect="move"; });
        tr.addEventListener("drop",e=>{
          e.preventDefault();
          if(!assertLiveMode()) return;
          const from=e.dataTransfer.getData("text/plain"), to=rowId;
          if(!from||!to||from===to) return;
          const fromIdx=model.rows.findIndex(r=>r.id===from), toIdx=model.rows.findIndex(r=>r.id===to);
          if(fromIdx<0||toIdx<0) return;
          const [moved]=model.rows.splice(fromIdx,1);
          model.rows.splice(toIdx,0,moved);
          UI.selected=from;
          saveModel(pid,model,"Rijvolgorde opgeslagen");
          toast("Rij versleept");
          render();
        });
        tr.querySelectorAll("button[data-action]").forEach(btn=>{
          btn.addEventListener("click",e=>{
            e.preventDefault(); e.stopPropagation();
            const action=btn.dataset.action;
            if(!assertLiveMode()) return;
            if(action==="duplicate") duplicateRow(rowId);
            if(action==="delete") deleteRow(rowId);
          });
        });
        tr.addEventListener("contextmenu",e=>showGanttContextMenu(e,rowId,"row"));
        tr.addEventListener("click",()=>{selectRow(model,rowId);});
        tr.addEventListener("dblclick",(e)=>{
          if(e.target && ["SELECT","OPTION"].includes(e.target.tagName)) return;
          openEdit(rowId);
        });
        tr.querySelectorAll("select.color-select").forEach(sel=>{
          setColorPickerPreview(sel);
          sel.addEventListener("input",()=>setColorPickerPreview(sel));
        });
        tr.querySelectorAll("button[data-pred-pick]").forEach(btn=>{
          btn.addEventListener("click",e=>{ e.preventDefault(); e.stopPropagation(); selectRow(model,rowId); openPredecessorPicker(rowId); });
        });
        tr.querySelectorAll("input,select").forEach(el=>{
          if(el.classList.contains("dateinput")){ el.addEventListener("dblclick",()=>{ try{ el.showPicker?.(); }catch(_e){} }); }
          el.addEventListener("click",()=>selectRow(model,rowId));
          el.addEventListener("change",()=>{
            if(!assertLiveMode()){ render(); return; }
            const row=model.rows.find(r=>r.id===rowId);
            if(!row) return;
            const k=el.dataset.k;
            if(k==="start"||k==="end"){
              const iso=toIso(el.value);
              if(!iso){toast("Ongeldige datum","bad");render();return;}
              model.sched[rowId]=model.sched[rowId]||{};
              const oldDur=duration(model.sched[rowId].start, model.sched[rowId].end) || 1;
              model.sched[rowId][k]=iso;
              if(k==="start" && (!model.sched[rowId].end || dayDiff(model.sched[rowId].start, model.sched[rowId].end)<0)) model.sched[rowId].end=addDays(iso, oldDur-1);
              if(k==="end" && (!model.sched[rowId].start || dayDiff(model.sched[rowId].start, model.sched[rowId].end)<0)) model.sched[rowId].start=iso;
            } else if(k==="duration"){
              const days=Math.max(1,Number(el.value)||1);
              model.sched[rowId]=model.sched[rowId]||{};
              const start=model.sched[rowId].start||firstProjectStart(state(),pid);
              model.sched[rowId].start=start;
              model.sched[rowId].end=addDays(start,days-1);
            } else if(k==="progress"){
              row.progress=Math.max(0,Math.min(100,Number(el.value)||0));
              row.status=row.progress>=100?"Gereed":row.progress>0?(row.status||"In uitvoering"):(row.status||"Niet gestart");
              row.progressUpdatedAt=new Date().toISOString();
            } else if(k==="hours"){
              row.hours=Math.max(0,Number(String(el.value).replace(",","."))||0);
            } else if(k==="status"){
              row.status=el.value;
            } else if(k==="feedback"){
              row.feedback=el.value.trim();
              row.why=row.feedback || row.why || "";
              row.feedbackUpdatedAt=row.feedback ? new Date().toISOString() : (row.feedbackUpdatedAt || "");
            } else if(k==="locked"){
              row.locked=el.checked;
            } else if(k==="predecessor"){
              const v=el.value.trim();
              if(parsePred(v).some(p=>p.id===rowId)){toast("Circulaire afhankelijkheid geweigerd","bad");render();return;}
              row.predecessor=v;
            } else if(k==="colorKey"){
              row.colorKey=normalizeColorKey(el.value,row.colorKey||"c1");
            } else {
              row[k]=el.value;
            }
            saveModelNoRender(pid,model);
            if(k==="department"||k==="resourceId"||k==="colorKey"||k==="status"||k==="feedback"){
              if(k==="colorKey") setColorPickerPreview(el);
              scheduleRenderAfterInput(260);
            }else{
              render();
            }
          });
        });
      });
    }
    function wireBars(model,pid,range){
      $$(".bar").forEach(bar=>{
        const id=bar.dataset.id;
        const row=model.rows.find(r=>r.id===id);
        if(!row) return;
        bar.dataset.openable="1";
        bar.addEventListener("contextmenu",e=>showGanttContextMenu(e,id,"bar"));
        bar.addEventListener("click",e=>{
          e.stopPropagation();
          selectRow(model,id);
          if(e.detail>=2){ e.preventDefault(); openEdit(id); }
        });
        bar.addEventListener("dblclick",e=>{ e.preventDefault(); e.stopPropagation(); selectRow(model,id); openEdit(id); });
        if(UI.revisionId||row.type==="summary"||row.locked) return;
        bar.addEventListener("pointerdown",e=>{

    function toggleLock(rowId){ if(!assertLiveMode()) return; const pid=currentProjectId(), model=getModel(pid), row=model.rows.find(r=>r.id===rowId); if(!row) return; row.locked=!row.locked; saveModel(pid,model,row.locked?"Taak vergrendeld":"Taak ontgrendeld"); render(); }
    function applyPhaseColor(rowId){ if(!assertLiveMode()) return; const pid=currentProjectId(), model=getModel(pid), [a,b]=blockRange(model,rowId); if(a<0) return; const color=model.rows[a].colorKey||"c1"; for(let i=a+1;i<=b;i++) model.rows[i].colorKey=color; saveModel(pid,model,"Fasekleur toegepast op onderliggende taken"); render(); }
    function runContextAction(action,rowId){ hideGanttContextMenu(); const pid=currentProjectId(), model=getModel(pid), row=model.rows.find(r=>r.id===rowId); if(action==="open") return rowId&&openEdit(rowId); if(action==="add-under") return rowId?insertTaskAfter(rowId,false):addTask(); if(action==="add-child") return rowId?insertTaskAfter(rowId,true):addTask(); if(action==="add-task") return addTask(); if(action==="add-phase") return insertSummaryAfter(rowId); if(action==="add-milestone") return insertMilestoneAfter(rowId); if(action==="duplicate") return duplicateRow(rowId); if(action==="delete") return deleteRow(rowId); if(action==="done") return row?.type==="summary"?markBlockProgress(rowId,100):setTaskProgressFromMenu(rowId,100); if(action==="zero") return row?.type==="summary"?markBlockProgress(rowId,0):setTaskProgressFromMenu(rowId,0); if(action==="progress"){ const v=window.prompt("Voortgang %",String(row?.progress??0)); if(v!=null) setTaskProgressFromMenu(rowId,v); return; } if(action==="color") return promptSet(rowId,"colorKey","Kleur wijzigen (Blauw/Groen/Geel/Rood/Paars/Turquoise/Oranje/Lime)"); if(action==="dept") return promptSet(rowId,"department","Afdeling wijzigen"); if(action==="resource") return promptSet(rowId,"resourceId","Resource wijzigen"); if(action==="pred") return openPredecessorPicker(rowId); if(action==="lock") return toggleLock(rowId); if(action==="why") return promptSet(rowId,"feedback","Notitie / WHY / terugkoppeling"); if(action==="apply-color") return applyPhaseColor(rowId); if(action==="generate") { const selected=$("#templateSel")?.value||""; if(selected){ CWS.setState(st=>{ st.templates=st.templates||{taskSets:[]}; st.templates.activeTaskSetId=selected; if(pid && st.projects?.byId?.[pid]) st.projects.byId[pid].templateId=selected; return st; }); } const m=generateModel(pid); saveModel(pid,m,"Fasen uit gekozen template gegenereerd"); toast("Fasen uit gekozen template gegenereerd"); return render(); } if(action==="today") return $("#todayBtn")?.click(); if(action==="recalc") return applyPredecessors(); if(action==="print") return printA3(); }
    function menuButtons(items){ return items.map(it=>it.sep?'<div class="sep"></div>':it.title?`<div class="title">${esc(it.title)}</div>`:`<button type="button" class="${it.danger?'danger':''}" data-ctx-action="${esc(it.action)}">${esc(it.label)}</button>`).join(""); }
    function showGanttContextMenu(event,rowId=null,kind="empty"){
      event.preventDefault(); event.stopPropagation();
      const model=getModel(currentProjectId()); const row=rowId?model.rows.find(r=>r.id===rowId):null;
      UI.selected=rowId||UI.selected; if(rowId) selectRow(model,rowId);
      const phase=row?.type==="summary";
      const items=row ? [
        {title:phase?"Fase acties":"Taak acties"},{label:phase?"Fase openen":"Taak openen",action:"open"},{label:"Taak toevoegen onder deze regel",action:"add-under"}, phase?{label:"Taak toevoegen binnen fase",action:"add-child"}:{label:"Subtaak toevoegen",action:"add-child"},{label:phase?"Fase dupliceren met taken":"Taak dupliceren",action:"duplicate"},{label:phase?"Fase verwijderen met taken":"Taak verwijderen",action:"delete",danger:true},{sep:true},{label:phase?"Alle taken gereed melden":"Markeer als gereed",action:"done"},{label:phase?"Alle taken 0% zetten":"Voortgang instellen",action:phase?"zero":"progress"},{label:"Kleur wijzigen",action:"color"},{label:"Afdeling wijzigen",action:"dept"},{label:"Resource wijzigen",action:"resource"},{label:"Voorganger instellen",action:"pred"},{label:row.locked?"Ontgrendelen":"Vergrendelen",action:"lock"},{label:"Notitie / WHY toevoegen",action:"why"}, phase?{label:"Fasekleur toepassen op onderliggende taken",action:"apply-color"}:null
      ].filter(Boolean) : [
        {title:"Gantt"},{label:"Nieuwe taak toevoegen",action:"add-task"},{label:"Nieuwe fase toevoegen",action:"add-phase"},{label:"Nieuwe mijlpaal toevoegen",action:"add-milestone"},{label:"Genereer standaard fasen/taken",action:"generate"},{sep:true},{label:"Vandaag tonen",action:"today"},{label:"Planning herberekenen",action:"recalc"},{label:"Print A3",action:"print"}
      ];
      const menu=$("#ganttContextMenu"); menu.innerHTML=menuButtons(items); menu.dataset.rowId=rowId||""; menu.setAttribute("aria-hidden","false"); menu.classList.add("show");
      const pad=8; const mw=240, mh=Math.min(520,items.length*38+40); let x=event.clientX, y=event.clientY; if(x+mw>window.innerWidth-pad) x=window.innerWidth-mw-pad; if(y+mh>window.innerHeight-pad) y=window.innerHeight-mh-pad; menu.style.left=Math.max(pad,x)+"px"; menu.style.top=Math.max(pad,y)+"px";
      menu.querySelectorAll("button[data-ctx-action]").forEach(btn=>btn.onclick=()=>runContextAction(btn.dataset.ctxAction, menu.dataset.rowId||null));
    }
    function hideGanttContextMenu(){ const menu=$("#ganttContextMenu"); if(menu){ menu.classList.remove("show"); menu.setAttribute("aria-hidden","true"); } }
    function exportCsv(){
      const cols=visibleColumns();
      const lines=[cols.map(c=>c.label)];
      const pid=currentProjectId(), model=getModel(pid);
      model.rows.forEach((r,i)=>{
        const sc=rowSchedule(model,r,i);
        lines.push(cols.map(c=>textForCol(c,r,sc)));
      });
      if(window.UI?.downloadCSV) UI.downloadCSV("gantt.csv",lines);
      else {
        const csv=lines.map(r=>r.map(c=>`"${String(c).replaceAll('"','""')}"`).join(",")).join("\n");
        const a=document.createElement("a");
        a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
        a.download="gantt.csv";
        a.click();
        URL.revokeObjectURL(a.href);
      }
    }
    function printA3(){
      const oldView=UI.view, oldZoom=UI.zoom, oldPrint=UI.printMode, oldDayW=UI.printDayW, oldTitle=document.title;
      const st=state();
      const p=projects(st).find(x=>String(x.id)===String(currentProjectId())) || {};
      document.title=printFileName(p);
      UI.printMode=true; UI.view="both"; UI.zoom="print"; document.body.classList.add("printing");
      render();
      requestAnimationFrame(()=>setTimeout(()=>window.print(),140));
      const restore=()=>{ window.removeEventListener("afterprint",restore); document.title=oldTitle; UI.printMode=oldPrint; UI.view=oldView; UI.zoom=oldZoom; UI.printDayW=oldDayW; document.body.classList.remove("printing"); render(); };
      window.addEventListener("afterprint",restore);
      setTimeout(()=>{ if(UI.printMode) restore(); },8000);
    }
    function bind(){ $("#projectSel").onchange=e=>{UI.projectId=e.target.value; render();}; $("#deptSel").onchange=e=>{UI.dept=e.target.value; render();}; $("#resourceSel").onchange=e=>{UI.resource=e.target.value; render();}; const templateSel=$("#templateSel"); if(templateSel) templateSel.onchange=e=>{ const pid=currentProjectId(); CWS.setState(st=>{ st.templates=st.templates||{taskSets:[]}; st.templates.activeTaskSetId=e.target.value; if(pid && st.projects?.byId?.[pid]) st.projects.byId[pid].templateId=e.target.value; return st; }); render(); }; $$('[data-zoom]').forEach(b=>b.onclick=()=>{UI.zoom=b.dataset.zoom; render();}); $$('[data-view]').forEach(b=>b.onclick=()=>{UI.view=b.dataset.view; render();}); $("#generateBtn").onclick=()=>{ const pid=currentProjectId(); const selected=$("#templateSel")?.value||""; if(selected){ CWS.setState(st=>{ st.templates=st.templates||{taskSets:[]}; st.templates.activeTaskSetId=selected; if(pid && st.projects?.byId?.[pid]) st.projects.byId[pid].templateId=selected; return st; }); } const live=getModel(pid); if(live?.rows?.length){ const choice=window.confirm("Dit project bevat al Gantt-taken. OK = bestaande taken vervangen door gekozen template. Annuleren = alleen ontbrekende taken niet toevoegen en stoppen."); if(!choice) return; } const m=generateModel(pid); saveModel(pid,m,"Fasen uit gekozen template gegenereerd"); toast("Fasen uit gekozen template gegenereerd"); render();}; $("#addTaskBtn").onclick=addTask; $("#recalcBtn").onclick=applyPredecessors; $("#depsBtn").onclick=()=>{UI.showDeps=!UI.showDeps; render();}; $("#criticalBtn").onclick=()=>{UI.showCritical=!UI.showCritical; render();}; $("#baselineBtn").onclick=()=>{UI.showBaseline=!UI.showBaseline; render();}; $("#setBaselineBtn").onclick=setBaseline; $("#saveRevisionBtn").onclick=openSaveRevision; $("#revisionsBtn").onclick=openRevisions; $("#liveBtn").onclick=exitRevision; $("#indentBtn").onclick=()=>indent(1); $("#outdentBtn").onclick=()=>indent(-1); $("#undoBtn").onclick=()=>{CWS?.undo?.(); render();}; $("#redoBtn").onclick=()=>{CWS?.redo?.(); render();}; $("#printBtn").onclick=printA3; $("#columnsBtn").onclick=openColumns; $("#labelsBtn").onclick=openLabels; $("#exportBtn").onclick=exportCsv; $("#todayBtn").onclick=()=>{ const wrap=$("#boardWrap"); const todayX=xFor(toIso(new Date()),{start:UI.originStart})-250; wrap.scrollLeft=Math.max(0,todayX); }; $("#chartPane").addEventListener("contextmenu",e=>{ if(e.target.closest(".bar")) return; showGanttContextMenu(e,null,"empty"); }); $("#boardWrap").addEventListener("contextmenu",e=>{ if(e.target.closest(".bar")||e.target.closest("#tableRows tr")||e.target.closest("#ganttContextMenu")) return; showGanttContextMenu(e,null,"empty"); }); document.body.addEventListener("contextmenu",e=>{ const inMenu=e.target.closest("#ganttContextMenu"); if(inMenu) return; if(e.target.closest("input,textarea,select,button")) return; if(e.target.closest(".bar")||e.target.closest("#tableRows tr")) return; if(e.target.closest(".gantt-shell,.board-wrap,.chart-pane,.table-pane,.panel")){ showGanttContextMenu(e,null,"empty"); } }); $("#chartPane").addEventListener("dblclick",e=>{ const bar=e.target.closest(".bar"); if(!bar) return; e.preventDefault(); e.stopPropagation(); UI.selected=bar.dataset.id; openEdit(bar.dataset.id); }); $("#modalClose").onclick=()=>$("#modalBack").classList.remove("show"); $("#modalBack").onclick=e=>{ if(e.target.id==="modalBack") $("#modalBack").classList.remove("show"); }; document.addEventListener("click",e=>{ if(!e.target.closest("#ganttContextMenu")) hideGanttContextMenu(); }); window.addEventListener("keydown",e=>{ if(e.key==="Escape"){ $("#modalBack").classList.remove("show"); hideGanttContextMenu(); } if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();CWS?.undo?.();render();} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="y"){e.preventDefault();CWS?.redo?.();render();} }); if(CWS?.subscribe) CWS.subscribe(()=>{render();}); let resizeTimer=null; window.addEventListener("resize",()=>{ if(UI.printMode) return; clearTimeout(resizeTimer); resizeTimer=setTimeout(()=>render(),120); }); }
    bind(); render();
  })();
