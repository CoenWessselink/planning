45px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;padding:0 9px;font-size:12px;font-weight:800;box-shadow:0 4px 10px rgba(47,111,189,.22);cursor:grab;overflow:hidden}.bar.locked{opacity:.65;filter:grayscale(.25);cursor:not-allowed}.bar.critical{box-shadow:0 0 0 2px rgba(220,38,38,.65),0 4px 10px rgba(47,111,189,.22)}.bar.summary{background:transparent!important;box-shadow:none;cursor:default;color:#111827;padding:0}.bar.summary:before{content:"";position:absolute;left:0;right:0;top:20px;border-top:4px solid rgba(15,23,42,.90);border-radius:2px}.bar.summary:after{content:"";position:absolute;left:0;right:0;top:29px;border-top:2px solid rgba(15,23,42,.85);border-radius:2px}.bar-label{position:relative;z-index:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.handle{position:absolute;top:0;width:8px;height:100%;background:rgba(255,255,255,.26);cursor:ew-resize}.handle.left{left:0}.handle.right{right:0}.summary .handle{display:none}.baseline{position:absolute;height:7px;border-radius:4px;background:#111827;opacity:.32;bottom:3px}.dep-svg{position:absolute;left:0;top:var(--headH);width:100%;height:calc(100% - var(--headH));pointer-events:none;overflow:visible}.empty{margin:18px;padding:24px;border:1px dashed #cbd5e1;border-radius:14px;text-align:center;color:#64748b;background:#f8fafc}.context{margin:0 18px 18px;border:1px solid var(--line);border-radius:13px;background:#fff;overflow:hidden}.context-head{padding:11px 13px;border-bottom:1px solid var(--line);font-weight:900}.context-body{padding:12px;color:#475569;font-size:13px}.ctx-grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px}.ctx-card{border:1px solid #e2e8f0;border-radius:10px;padding:9px;background:#f8fafc}.ctx-card b{display:block;color:#0f172a;margin-bottom:3px}.modalback{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:1000}.modalback.show{display:flex}.modal{width:mi     /* V12 Gantt alignment fix
       The left task table has 11 columns. In V11 the table was wider than the
       760px grid column, so its text visually flowed into the timeline and
       over the bars. Keep the table and chart in two hard columns. */
    .board{grid-template-columns:var(--leftW) max-content;min-width:calc(var(--leftW) + 900px)}
    .table-pane{width:var(--leftW);min-width:var(--leftW);max-width:var(--leftW);overflow:hidden;z-index:12}
    .chart-pane{z-index:1;overflow:hidden}
    .gantt-table{table-layout:fixed;width:var(--leftW);min-width:var(--leftW);max-width:var(--leftW)}
    .gantt-table th,.gantt-table td{overflow:hidden;text-overflow:ellipsis;max-width:0}
    .gantt-table th:nth-child(1),.gantt-table td:nth-child(1){width:100px}
    .gantt-table th:nth-child(2),.gantt-table td:nth-child(2){width:250px}
    .gantt-table th:nth-child(3),.gantt-table td:nth-child(3){width:100px}
    .gantt-table th:nth-child(4),.gantt-table td:nth-child(4){width:100px}
    .gantt-table th:nth-child(5),.gantt-table td:nth-child(5){width:60px}
    .gantt-table th:nth-child(6),.gantt-table td:nth-child(6){width:90px}
    .gantt-table th:nth-child(7),.gantt-table td:nth-child(7){width:105px}
    .gantt-table th:nth-child(8),.gantt-table td:nth-child(8){width:100px}
    .gantt-table th:nth-child(9),.gantt-table td:nth-child(9){width:90px}
    .gantt-table th:nth-child(10),.gantt-table td:nth-child(10){width:75px}
    .gantt-table th:nth-child(11),.gantt-table td:nth-child(11){width:50px}
    .taskcell{min-width:0;width:100%;overflow:hidden}.taskname{min-width:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}.cellinput,.color-select,.resource-select,.dept-select{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar{z-index:6;min-width:18px;contain:layout paint}.bar-label{min-width:0;max-width:100%;display:block;pointer-events:none;text-shadow:0 1px 1px rgba(15,23,42,.25)}.bar.summary{z-index:5}.baseline{z-index:4}.dep-svg{z-index:3}.handle{z-index:8}
    .board-wrap{scrollbar-gutter:stable both-edges}.timeline{z-index:4}.gantt-table thead th{z-index:13}
    @media (max-width: 1280px){:root{--leftW:1040px}.gantt-table th:nth-child(2),.gantt-table td:nth-child(2){width:220px}.gantt-table th:nth-child(7),.gantt-table td:nth-child(7){width:95px}.gantt-table th:nth-child(8),.gantt-table td:nth-child(8){width:95px}.gantt-table th:nth-child(9),.gantt-table td:nth-child(9){width:80px}.gantt-table th:nth-child(10),.gantt-table td:nth-child(10){width:65px}}
  

    /* V14 Gantt table/diagram/print refinements */
    :root{--print-scale:1;--print-chart-w:1000px}
    .toolbar-group.columns-group{border-right:1px solid var(--line)}
    .gantt-table{table-layout:fixed}
    .gantt-table th,.gantt-table td{box-sizing:border-box}
    .gantt-table th[data-col],.gantt-table td[data-col]{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .gantt-table input,.gantt-table select{max-width:100%;min-width:0}
    .taskcell{min-width:0;width:100%;overflow:hidden}
    .taskname{min-width:0;overflow:hidden;text-overflow:ellipsis}
    .lane{background-image:repeating-linear-gradient(to right, rgba(15,23,42,.13) 0 1px, transparent 1px var(--dayW)), repeating-linear-gradient(to right, rgba(15,23,42,.28) 0 2px, transparent 2px calc(var(--dayW) * 7));}
    .tl-cell{border-right-color:#d0d7e2;border-bottom-color:#d0d7e2}
    .bar{z-index:6;font-size:14px;line-height:1.1;text-shadow:0 1px 1px rgba(0,0,0,.26)}
    .bar-label{display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar.summary{height:45px;overflow:visible;text-shadow:none;z-index:5}
    .bar.summary:before{top:28px;border-top-width:4px}
    .bar.summary:after{top:36px;border-top-width:2px}
    .bar.summary .bar-label{position:absolute;left:0;top:3px;max-width:min(420px,100%);padding:2px 7px;border:1px solid #111827;border-radius:4px;background:#fff;color:#111827;font-size:13px;line-height:16px;font-weight:900;box-shadow:0 1px 0 rgba(255,255,255,.95);}
    .dep-svg{z-index:3}.dep-svg path{vector-effect:non-scaling-stroke}.baseline{z-index:4}.today-line{position:absolute;top:0;bottom:0;width:2px;background:#dc2626;z-index:12;pointer-events:none;box-shadow:0 0 0 1px rgba(220,38,38,.20)}
    .today-line::before{content:"Vandaag";position:absolute;top:3px;left:4px;background:#dc2626;color:#fff;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:900;white-space:nowrap}
    .print-legend{display:none;margin:0 18px 18px;border:1px solid #111827;background:#fff;color:#111827;font-size:11px}.print-legend .legend-title{font-weight:900;padding:6px 8px;border-bottom:1px solid #111827}.legend-items{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:6px 12px;padding:7px 8px}.legend-item{display:flex;align-items:center;gap:6px;min-width:0}.legend-swatch{width:30px;height:12px;border:1px solid #111827;flex:0 0 auto}.legend-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.legend-diamond{width:10px;height:10px;border:1px solid #111827;transform:rotate(45deg);background:#fff;margin-left:10px;margin-right:10px;flex:0 0 auto}

      .meta-line{font-size:7px!important;padding:2px 0 4px!important;color:#000!important}.board-wrap{margin:0!important;border:0!important;border-radius:0!important;overflow:visible!important;background:#fff!important}.board{display:block!important;min-width:0!important}.board.diagram-only{display:block!important}.chart-pane{display:block!important;min-width:0!important;overflow:visible!important;background:#fff!important}.timeline{position:relative!important;top:auto!important;height:54px!important;grid-template-rows:18px 18px 18px!important;background:#fff!important}.tl-cell{font-size:6px!important;color:#000!important;border-color:#777!important}.lane{height:30px!important;border-bottom:1px solid #bbb!important;background-image:repeating-linear-gradient(to right,#777 0 1px,transparent 1px var(--dayW)),repeating-linear-gradient(to right,#000 0 2px,transparent 2px calc(var(--dayW) * 7))!important}.bar{top:4px!important;height:18px!important;border-radius:2px!important;font-size:6px!important;padding:0 3px!important;box-shadow:none!important;text-shadow:none!important;border:1px solid #111!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.bar.summary{height:28px!important;border:0!important}.bar.summary:before{top:13px!important;border-top:2px solid #111!important}.bar.summary:after{top:18px!important;border-top:1px solid #111!important}.bar.summary .bar-label{top:0!important;font-size:6px!important;line-height:8px!important;padding:0 2px!important;border:1px solid #111!important}.handle{display:none!important}.dep-svg{top:54px!important;height:calc(100% - 54px)!important}.dep-svg path{stroke:#777!important;stroke-width:.8!important}.today-line{width:1.5px!important;background:#dc2626!important}.today-line::before{display:none!important}.print-legend{display:block!important;margin:6px 0 0!important;break-inside:avoid;page-break-inside:avoid}.legend-title{font-size:8px!important;padding:3px 4px!important}.legend-items{grid-template-columns:repeat(     }


    /* V16 — Gantt kalender/print volledig herzien
       Doelen: kalender vult zichtbaar diagram, daglijnen dun maar zichtbaar,
       taakrijen gescheiden, A3-print vult de pagina en gebruikt exact projectbereik. */

    #timeline,#lanes{min-width:100%;background:#fff}
    .tl-cell{border-right:1px solid rgba(15,23,42,.16)!important;border-bottom:1px solid rgba(15,23,42,.16)!important}
    .tl-row:nth-child(1) .tl-cell,.tl-row:nth-child(2) .tl-cell{border-right:1px solid rgba(15,23,42,.20)!important}
    .tl-row:nth-child(2) .tl-cell{border-bottom:1px solid rgba(15,23,42,.30)!important}
    .lane{border-bottom:1px solid rgba(15,23,42,.10)!important;background-image:repeating-linear-gradient(to right, rgba(15,23,42,.13) 0 1px, transparent 1px var(--dayW)), repeating-linear-gradient(to right, rgba(15,23,42,.28) 0 1px, transparent 1px calc(var(--dayW) * 7))!important;background-size:auto!important}
    .bar{z-index:8}.bar-label{display:block;min-width:0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar.summary .bar-label{background:#fff;padding:0 4px;border:1px solid rgba(15,23,42,.25);border-radius:3px;line-height:15px;height:17px;max-width:min(220px,100%)}
    .dep-svg{z-index:5}.dep-svg path{stroke-width:1.1!important;stroke:rgba(15,23,42,.38)!important;vector-effect:non-scaling-stroke}.today-line{z-index:30!important;width:2px!important;background:#dc2626!important}.today-line::before{top:0!important}

-weight:800!important;line-height:12px!important;box-shadow:none!important;border:1px solid #111827!important;print-color-adjust:exact;-webkit-print-color-adjust:exact}.printing .bar.summary{border:0!important;background:transparent!important;color:#111827!important}.printing .bar.summary:before{top:10px!important;border-top:1.5px solid #111827!important}.printing .bar.summary:after{top:14px!important;border-top:1px solid #111827!important}.printing .bar.summary .bar-label{font-size:5.5px!important;line-height:8px!important;height:9px!important;border:0!important;background:transparent!important;padding:0!important}.printing .handle{display:none!important}.printing .baseline{height:2px!important;bottom:1px!important}.printing .dep-svg{top:48px!important}.printing .dep-svg path{stroke-width:.55!important;stroke:rgba(0,0,0,.45)!important}.printing .today-line{width:1px!important;background:#dc2626!important;top:0!important}.printing .today-line::before{font-size:4px!important;padding:0 2px!important;left:1px!important;top:0!important}.printing .print-legend{display:block!important;margin:3px 0 0!important;border:1px solid #111827!important;font-size:5.5px!important;break-inside:avoid}.printing .print-legend .legend-title{padding:2px 4px!important;border-bottom:1px solid #111827!important}.printing .legend-items{grid-template-columns:repeat(4,1fr)!important;gap:2px 8px!important;padding:3px 4px!important}.printing .legend-swatch{width:18px!important;height:6px!important;border:1px solid #111827!important}.printing .legend-diamond{width:6px!important;height:6px!important;margin:0 6px!important}.printing .legend-text{font-size:5.5px!important;color:#000!important}

<body>
  <div class="gantt-shell" data-testid="gantt-root">
    <div class="module-head">
      <div><h1>Laag 4 — Gantt Planning</h1><p>SSOT-koppeling: Projecturen per afdeling → Gantt-taakplanning → Capaciteit.</p></div>
      <div class="status"><span class="badge" id="storageBadge">Opslag controleren…</span><span class="badge ok" id="saveBadge">Gereed</span></div>
    </div>
    <div class="toolbar" data-testid="gantt-toolbar">
      <div class="toolbar-group"><select class="select project" id="projectSel"></select><select class="select" id="deptSel"><option value="">Alle afdelingen</option></select><select class="select" id="resourceSel"><option value="">Alle resources</option></select></div>
      <div class="toolbar-group"><button class="btn" id="todayBtn">Vandaag</button><button class="btn" data-zoom="day">Dag</button><button class="btn active" data-zoom="week">Week</button><button class="btn" data-zoom="month">Maand</button></div>

      <div class="toolbar-group"><button class="btn active" id="depsBtn">Afhankelijkheden</button><button class="btn" id="criticalBtn">Kritiek pad</button><button class="btn" id="baselineBtn">Baseline</button><button class="btn" id="setBaselineBtn">Baseline = actueel</button></div>
      <div class="toolbar-group"><button class="btn" id="indentBtn">Inspringen</button><button class="btn" id="outdentBtn">Uitspringen</button><button class="btn" id="undoBtn">Undo</button><button class="btn" id="redoBtn">Redo</button></div>
      <div class="toolbar-group columns-group"><button class="btn" id="columnsBtn">Kolommen</button></div><div class="toolbar-group"><button class="btn" data-view="table">Tabel</button><button class="btn active" data-view="both">Beide</button><button class="btn" data-view="diagram">Diagram</button><button class="btn" id="printBtn">Print A3</button><button class="btn" id="exportBtn">Export</button></div>
    </div>
    <div class="notice hidden" id="notice"></div>
    <div class="meta-line" id="metaLine">—</div>
    <div class="board-wrap" id="boardWrap"><div class="board" id="board"><div class="table-pane"><table class="gantt-table" id="ganttTable"><thead><tr id="ganttHead"></tr></thead><tbody id="tableRows"></tbody></table></div><div class="chart-pane" id="chartPane"><div class="timeline" id="timeline"></div><div id="lanes"></div><svg class="dep-svg" id="depSvg"></svg><div class="today-line" id="todayLine" aria-hidden="true"></div></div></div></div><div class="print-legend" id="printLegend"></div>
    <div class="context"><div class="context-head">Context / WHY</div><div class="context-body" id="contextBody">Selecteer een taak of balk om details te zien.</div></div>
  </div>
  <div class="modalback" id="modalBack"><div class="modal"><div class="modal-head"><b id="modalTitle">Taak bewerken</b><button class="btn" id="modalClose">Sluiten</button></div><div class="modal-body" id="modalBody"></div><div class="modal-foot"><button class="btn primary" id="modalSave">Opslaan</button></div></div></div>
  <div class="toast" id="toast"></div>
  <script src="../js/core/ui.js"></script>
  <script>
  (function(){
    const CWS = window.parent?.CWS || window.CWS;
    const $ = (s, r=document) => r.querySelector(s);
    const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
    const esc = (s) => String(s ?? "").replace(/[&<>\"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    const cssEsc = (v) => (window.CSS && CSS.escape) ? CSS.escape(String(v)) : String(v).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
    const colorMap = { c1:"#2f6fbd", c2:"#16a34a", c3:"#f59e0b", c4:"#dc2626", c5:"#8b5cf6", c6:"#14b8a6", c7:"#f97316", c8:"#22c55e" };
    const colorNames = { c1:"Blauw", c2:"Groen", c3:"Geel", c4:"Rood", c5:"Paars", c6:"Turquoise", c7:"Oranje", c8:"Lime" };
    function normalizeColorKey(value, fallback="c1"){
      const raw = String(value ?? "").trim();
      if(colorMap[raw]) return raw;
      const lower = raw.toLowerCase();
      const byName = Object.entries(colorNames).find(([,name])=>String(name).toLowerCase()===lower);
      if(byName) return byName[0];
      const byHex = Object.entries(colorMap).find(([,hex])=>String(hex).toLowerCase()===lower);
      if(byHex) return byHex[0];
      return colorMap[fallback] ? fallback : "c1";
    }
    function colorHex(value){ return colorMap[normalizeColorKey(value)] || colorMap.c1; }
    function colorLabel(value){ const key=normalizeColorKey(value); return colorNames[key] || colorNames.c1; }
    function colorOptions(selected){
      const sel = normalizeColorKey(selected);
      return Object.keys(colorMap).map(k=>`<option value="${k}" ${sel===k?"selected":""}>● ${colorNames[k]}</option>`).join("");
    }
    function colorPickerHtml(dataK, value, disabled=""){
      const key = normalizeColorKey(value);
      return `<div class="color-pick"><span class="color-swatch" style="background:${esc(colorMap[key])}"></span><select class="color-select" data-k="${esc(dataK)}" ${disabled}>${colorOptions(key)}</select></div>`;
    }
    function setColorPickerPreview(selectEl){
      const wrap = selectEl && selectEl.closest ? selectEl.closest(".color-pick") : null;
      const sw = wrap ? wrap.querySelector(".color-swatch") : null;
      if(sw) sw.style.background = colorHex(selectEl.value);
    }
    const UI = { zoom:"week", view:"both", showDeps:true, showCritical:false, showBaseline:false, projectId:null, dept:"", resource:"", selected:null, originStart:null, drag:null, printMode:false };
    const COL_KEY = "cws.gantt.visibleColumns.v17";
    const ALL_COLUMNS = [
      {id:"id",label:"ID",min:72,control:"text"},
      {id:"name",label:"Taak",min:118,control:"task"},
      {id:"start",label:"Start",min:82,control:"date"},
      {id:"end",label:"Einde",min:82,control:"date"},
      {id:"duration",label:"Duur",min:54,control:"text"},
      {id:"progress",label:"Voortgang",min:78,control:"number"},
      {id:"predecessor",label:"Voorganger",min:82,control:"input"},
      {id:"department",label:"Afdeling",min:78,control:"select"},
      {id:"resource",label:"Resource",min:70,control:"select"},
      {id:"color",label:"Kleur",min:62,control:"select"},
      {id:"locked",label:"Lock",min:46,control:"checkbox"}
    ];
    const DEFAULT_COLS = ["id","name","start","end","duration","progress","predecessor","department","resource","color","locked"];
    const BASIC_COLS = ["id","name","start","end","duration","predecessor"];
    function loadVisibleCols(){
      try{
        const arr=JSON.parse(localStorage.getItem(COL_KEY)||"null");
        if(Array.isArray(arr)&&arr.length){
          const allowed=new Set(ALL_COLUMNS.map(c=>c.id));
          const clean=arr.filter(id=>allowed.has(id));
          if(clean.length) return new Set(clean);
        }
      }catch(e){}
      return new Set(DEFAULT_COLS);
    }
    function saveVisibleCols(set){ try{ localStorage.setItem(COL_KEY, JSON.stringify(Array.from(set))); }catch(e){} }
    function visibleColumns(){ const set=loadVisibleCols(); return ALL_COLUMNS.filter(c=>set.has(c.id)); }
    function textForCol(col,row,sc){
      const d=duration(sc.start,sc.end);
      if(col.id==="id") return row.id;
      if(col.id==="name") return row.name;
      if(col.id==="start") return toNL(sc.start);
      if(col.id==="end") return toNL(sc.end);
      if(col.id==="duration") return `${d} d`;
      if(col.id==="progress") return `${Number(row.progress||0)} %`;
      if(col.id==="predecessor") return row.predecessor||"";
      if(col.id==="department") { const st=state(); const d=departments(st).find(x=>String(x.id||x.name)===String(row.department)||String(x.name)===String(row.department)); return d?(d.name||d.id):(row.department||""); }
      if(col.id==="resource") { const st=state(); const r=(st.resources?.byId||{})[row.resourceId]; return r?(r.name||r.id):(row.resourceId||"—"); }
      if(col.id==="color") return colorLabel(row.colorKey);
      if(col.id==="locked") return row.locked?"ja":"nee";
      return "";
    }
    function textMeasure(){
      if(textMeasure.ctx) return textMeasure.ctx;
      const canvas=document.createElement("canvas");
      const ctx=canvas.getContext("2d");
      ctx.font='600 13px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif';
      textMeasure.ctx=ctx;
      return ctx;
    }
    function measurePx(value, weight){
      const ctx=textMeasure();
      ctx.font=`${weight||600} 13px Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif`;
      return Math.ceil(ctx.measureText(String(value ?? "")).width);
    }
    function columnPadding(col){
      if(col.control==="task") return 64;       // celpadding + twisty + inspringruimte
      if(col.control==="select") return 42;     // celpadding + dropdownpijl
      if(col.control==="checkbox") return 24;
      if(col.control==="number") return 34;
      if(col.control==="input" || col.control==="date") return 30;
      return 24;
    }
    function columnWidths(cols, rows){
      return cols.map(col=>{
        let width = measurePx(col.label, 800) + 22;
        rows.forEach(({row,sc})=>{
          const content = textForCol(col,row,sc);
          const indent = col.id==="name" ? Math.max(0,Number(row.level||0))*18 : 0;
          const weight = (col.id==="name" && row.type==="summary") ? 900 : 600;
          width = Math.max(width, measurePx(content, weight) + columnPadding(col) + indent);
        });
        // Exact passend op inhoud: geen kunstmatige max-width. Alleen afronden op hele pixels.
        return Math.ceil(Math.max(col.min, width));
      });
    }
    function buildCell(col,row,sc,st,indent){
      const dis=row.locked?"disabled":"";
      if(col.id==="id") return esc(row.id);
      if(col.id==="name") return `<div class="taskcell"><span class="twisty">${row.type==="summary"?"▾":""}</span><span style="width:${indent}px"></span><input class="taskname" data-k="name" value="${esc(row.name)}" ${dis}></div>`;
      if(col.id==="start") return `<input class="cellinput" data-k="start" value="${esc(toNL(sc.start))}" ${row.type==="summary"||row.locked?"disabled":""}>`;
      if(col.id==="end") return `<input class="cellinput" data-k="end" value="${esc(toNL(sc.end))}" ${row.type==="summary"||row.locked?"disabled":""}>`;
      if(col.id==="duration") return `${duration(sc.start,sc.end)} d`;
      if(col.id==="progress") return `<input class="cellinput smallinput" data-k="progress" value="${Number(row.progress||0)}" ${dis}>%`;
      if(col.id==="predecessor") return `<input class="cellinput" data-k="predecessor" value="${esc(row.predecessor||"")}" ${dis}>`;
      if(col.id==="department") return `<select class="dept-select" data-k="department" ${dis}>${departments(st).map(d=>`<option value="${esc(d.id||d.name)}" ${String(row.department)===String(d.id||d.name)||String(row.department)===String(d.name)?"selected":""}>${esc(d.name||d.id)}</option>`).join("")}</select>`;
      if(col.id==="resource") return `<select class="resource-select" data-k="resourceId" ${dis}><option value="">—</option>${resources(st).map(r=>`<option value="${esc(r.id)}" ${row.resourceId===r.id?"selected":""}>${esc(r.name||r.id)}</option>`).join("")}</select>`;
      if(col.id==="color") return colorPickerHtml("colorKey", row.colorKey, dis);
      if(col.id==="locked") return `<input class="lockbox" type="checkbox" data-k="locked" ${row.locked?"checked":""}>`;
      return esc(textForCol(col,row,sc));
    }
    function openColumns(){
      const set=loadVisibleCols();
      $("#modalTitle").textContent="Gantt tabelkolommen";
      $("#modalBody").innerHTML=`
        <p style="margin-top:0;color:#64748b;line-height:1.45">
          Kies welke kolommen zichtbaar zijn in de linker Gantt-tabel. Na opslaan wordt elke zichtbare kolom automatisch exact op de inhoud berekend: niet smaller dan de tekst, en niet breder dan nodig.
        </p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px 0">
          <button class="btn" type="button" id="colsAll">Alles aan</button>
          <button class="btn" type="button" id="colsBasic">Basis</button>
          <button class="btn" type="button" id="colsDefault">Standaard</button>
        </div>
        <div class="form-grid" id="colsGrid">
          ${ALL_COLUMNS.map(c=>`<label class="field" style="flex-direction:row;align-items:center;color:#0f172a;border:1px solid #e2e8f0;border-radius:10px;padding:9px 10px;background:#f8fafc"><input type="checkbox" data-col="${c.id}" ${set.has(c.id)?"checked":""} style="width:18px;height:18px;flex:0 0 auto"> <span>${esc(c.label)}</span></label>`).join("")}
        </div>
      `;
      const applyPreset=(ids)=>{ const use=new Set(ids); $$("#modalBody input[data-col]").forEach(x=>x.checked=use.has(x.dataset.col)); };
      $("#colsAll").onclick=()=>applyPreset(ALL_COLUMNS.map(c=>c.id));
      $("#colsBasic").onclick=()=>applyPreset(BASIC_COLS);
      $("#colsDefault").onclick=()=>applyPreset(DEFAULT_COLS);
      $("#modalBack").classList.add("show");
      $("#modalSave").onclick=()=>{
        const next=new Set($$("#modalBody input[data-col]:checked").map(x=>x.dataset.col));
        if(!next.size) next.add("name");
        saveVisibleCols(next);
        $("#modalBack").classList.remove("show");
        toast("Kolommen bijgewerkt");
        render();
      };
    }


    function toast(msg, type){ const el=$("#toast"); el.textContent=msg; el.style.background=type==="bad"?"#991b1b":type==="warn"?"#92400e":"#172033"; el.classList.add("show"); clearTimeout(toast.t); toast.t=setTimeout(()=>el.classList.remove("show"),2200); }
    function setNotice(msg, kind="warn"){ const n=$("#notice"); if(!msg){ n.classList.add("hidden"); return; } n.textContent=msg; n.className="notice"; if(kind==="bad"){ n.style.borderColor="#fecaca"; n.style.background="#fef2f2"; n.style.color="#991b1b"; } else { n.style.borderColor="#fed7aa"; n.style.background="#fff7ed"; n.style.color="#9a3412"; } }
    function setSave(msg, kind="ok"){ const b=$("#saveBadge"); b.textContent=msg; b.className="badge "+(kind==="bad"?"bad":kind==="warn"?"warn":"ok"); }
    const pad = n => String(n).padStart(2,"0");
    function parseDate(v){ if(!v) return null; const s=String(v).trim(); let m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/); if(m) return new Date(Date.UTC(+m[1],+m[2]-1,+m[3])); m=s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/); if(m) return new Date(Date.UTC(+m[3],+m[2]-1,+m[1])); return null; }
    function toIso(v){ const d = v instanceof Date ? v : parseDate(v); return d ? `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}` : ""; }
    function toNL(v){ const d=parseDate(v); return d?`${pad(d.getUTCDate())}-${pad(d.getUTCMonth()+1)}-${d.getUTCFullYear()}`:""; }
    function addDays(iso,n){ const d=parseDate(iso)||new Date(); d.setUTCDate(d.getUTCDate()+n); return toIso(d); }
    function dayDiff(a,b){ const da=parseDate(a), db=parseDate(b); if(!da||!db) return 0; return Math.round((db-da)/86400000); }
    function startOfWeek(iso){ const d=parseDate(iso)||new Date(); const dow=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()-dow+1); return toIso(d); }
    function isoWeek(d0){ const d = new Date(Date.UTC(d0.getUTCFullYear(), d0.getUTCMonth(), d0.getUTCDate())); const day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day); const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1)); return { year:d.getUTCFullYear(), week:Math.ceil((((d-ys)/86400000)+1)/7) }; }
    function duration(s,e){ if(!s||!e) return 0; return Math.max(1, dayDiff(s,e)+1); }
    function state(){ return CWS?.getState?.() || { projects:{order:[],byId:{},deptHours:[]}, resources:{order:[],byId:{}}, departments:{order:[],byId:{}}, tasks:{byProject:{}}, ganttV2:{byProject:{},ui:{}}, gantt:{hoursByDay:{},sourcesByDay:{}} }; }
    function projects(st=state()){ return (st.projects?.order||[]).map(id=>st.projects.byId[id]).filter(Boolean); }
    function departments(st=state()){ const byId=st.departments?.byId||{}; const order=st.departments?.order||Object.keys(byId); const out=order.map(id=>byId[id]).filter(Boolean); if(out.length) return out; const names=[...new Set((st.resources?.order||[]).map(id=>st.resources.byId[id]?.dept).filter(Boolean))]; return names.map(n=>({id:n,name:n})); }
    function resources(st=state()){ return (st.resources?.order||[]).map(id=>st.resources.byId[id]).filter(Boolean); }
    function currentProjectId(){ return UI.projectId || $("#projectSel")?.value || projects()[0]?.id || null; }
    function projectLabel(p){ return `${p.nr||p.code||p.id} - ${p.name||"Project"}`; }

    function drawDeps(model,rows,range){ const svg=$("#depSvg"); svg.innerHTML=""; if(!UI.showDeps) return; const rowH=UI.printMode?22:48; const rowIndex=new Map(rows.map((x,i)=>[x.row.id,i])); const w=pxPerDay(); svg.setAttribute("width",Math.max(900,(range.days*w))); svg.setAttribute("height",rows.length*rowH); model.rows.forEach(row=>{ const i=rowIndex.get(row.id); if(i==null) return; parsePred(row.predecessor).forEach(p=>{ const pi=rowIndex.get(p.id); if(pi==null) return; const predSc=model.sched[p.id]||summarySchedule(model,model.rows.findIndex(r=>r.id===p.id)); const sc=model.sched[row.id]||summarySchedule(model,model.rows.findIndex(r=>r.id===row.id)); if(!predSc?.end||!sc?.start) return; const x1=xFor(predSc.end,range)+duration(predSc.start,predSc.end)*w, y1=pi*rowH+(rowH/2), x2=xFor(sc.start,range)+2, y2=i*rowH+(rowH/2); const mid=x1+Math.max(14,(x2-x1)/2); const path=document.createElementNS("http://www.w3.org/2000/svg","path"); path.setAttribute("d",`M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`); path.setAttribute("fill","none"); path.setAttribute("stroke","rgba(15,23,42,.45)"); path.setAttribute("stroke-width",UI.printMode?"0.55":"1.1"); svg.appendChild(path); }); }); }
    function renderContext(model){ const row=model.rows.find(r=>r.id===UI.selected); if(!row){ $("#contextBody").textContent="Selecteer een taak of balk om details te zien."; return; } const sc=model.sched[row.id]||{}; $("#contextBody").innerHTML=`<div class="ctx-grid"><div class="ctx-card"><b>Taak</b>${esc(row.name)}</div><div class="ctx-card"><b>Start / eind</b>${esc(toNL(sc.start))} — ${esc(toNL(sc.end))}</div><div class="ctx-card"><b>Afdeling</b>${esc(row.department||"—")}</div><div class="ctx-card"><b>Voorganger</b>${esc(row.predecessor||"—")}</div></div>`; }
    function applyPredecessors(){ const pid=currentProjectId(), model=getModel(pid); let changed=0; model.rows.forEach(row=>{ if(row.type!=="task"||row.locked) return; parsePred(row.predecessor).forEach(p=>{ const pred=model.sched[p.id]; const cur=model.sched[row.id]; if(!pred||!cur) return; const min=addDays(pred.end,1+(p.lag||0)); if(cur.start<min){ const dur=duration(cur.start,cur.end); cur.start=min; cur.end=addDays(min,dur-1); changed++; } }); }); saveModel(pid,model,changed?"Planning herberekend":"Planning ongewijzigd"); toast(changed?`${changed} taak/taken verschoven`:"Planning al geldig"); render(); }
    function setBaseline(){ const pid=currentProjectId(), model=getModel(pid); model.rows.forEach(row=>{ const sc=model.sched[row.id]; if(sc?.start&&sc?.end){ row.baselineStart=sc.start; row.baselineEnd=sc.end; }}); saveModel(pid,model,"Baseline ingesteld"); render(); }
    function indent(delta){ const pid=currentProjectId(), model=getModel(pid); const row=model.rows.find(r=>r.id===UI.selected); if(!row||row.type==="summary"||row.locked){toast("Selecteer een ontgrendelde taak","warn");return;} row.level=Math.max(1,Number(row.level||1)+delta); saveModel(pid,model); render(); }
    function openEdit(rowId){
      const pid=currentProjectId(), model=getModel(pid), row=model.rows.find(r=>r.id===rowId), rowIndex=model.rows.findIndex(r=>r.id===rowId), sc=rowSchedule(model,row||{},rowIndex)||{};
      if(!row) return;
      const st=state();
      const deptOptions=departments(st).map(d=>`<option value="${esc(d.id||d.name)}" ${String(row.department)===String(d.id||d.name)||String(row.department)===String(d.name)?"selected":""}>${esc(d.name||d.id)}</option>`).join("");
      const resOptions=`<option value="">—</option>`+resources(st).map(r=>`<option value="${esc(r.id)}" ${String(row.resourceId||"")===String(r.id)?"selected":""}>${esc(r.name||r.id)}</option>`).join("");
      $("#modalTitle").textContent=row.type==="summary" ? "Fase bewerken" : "Taak bewerken";
      $("#modalBody").innerHTML=`<div class="form-grid">
        <label class="field">Naam<input id="mName" value="${esc(row.name)}"></label>
        <label class="field">Type<input value="${row.type==="summary"?"Fase / samenvatting":"Taak"}" disabled></label>
        <label class="field">Afdeling<select id="mDept">${deptOptions}${row.department?`<option value="${esc(row.department)}" selected>${esc(row.department)}</option>`:""}</select></label>
        <label class="field">Resource<select id="mResource">${resOptions}</select></label>
        <label class="field">Start<input id="mStart" value="${esc(toNL(sc.start))}" ${row.type==="summary"?"disabled":""}></label>
        <label class="field">Einde<input id="mEnd" value="${esc(toNL(sc.end))}" ${row.type==="summary"?"disabled":""}></label>
        <label class="field">Duur<input id="mDur" value="${duration(sc.start,sc.end)} d" disabled></label>
        <label class="field">Voortgang<input id="mProg" type="number" min="0" max="100" value="${Number(row.progress||0)}"></label>
        <label class="field">Voorganger<input id="mPred" value="${esc(row.predecessor||"")}" placeholder="P-1001-T1FS, P-1001-T2SS+2"></label>
        <label class="field">Kleur${colorPickerHtml("mColor", row.colorKey, "")}</label>
        <label class="field">Uren<input id="mHours" type="number" min="0" step="0.25" value="${Number(row.hours||0)}"></label>
        <label class="field">Lock<select id="mLock"><option value="0" ${!row.locked?"selected":""}>Nee</option><option value="1" ${row.locked?"selected":""}>Ja</option></select></label>
        <label class="field" style="grid-column:1/-1">WHY / notitie<textarea id="mWhy">${esc(row.why||"")}</textarea></label>
      </div>`;
      $("#modalBack").classList.add("show");
      const colorSel=$("#modalBody select[data-k='mColor']");
      if(colorSel){ setColorPickerPreview(colorSel); colorSel.addEventListener("input",()=>setColorPickerPreview(colorSel)); }
      $("#modalSave").onclick=()=>{
        row.name=$("#mName").value.trim()||row.name;
        row.department=$("#mDept").value.trim()||row.department;
        row.resourceId=$("#mResource").value.trim();
        row.progress=Math.max(0,Math.min(100,Number($("#mProg").value)||0));
        row.predecessor=$("#mPred").value.trim();
        row.colorKey=normalizeColorKey(colorSel?.value||row.colorKey);
        row.hours=Math.max(0,Number($("#mHours").value)||0);
        row.locked=$("#mLock").value==="1";
        row.why=$("#mWhy").value.trim();
        if(row.type!=="summary"){
          const start=toIso($("#mStart").value)||sc.start;
          const end=toIso($("#mEnd").value)||sc.end;
          model.sched[rowId]={start,end};
        }
        saveModel(pid,model,"Taak bijgewerkt");
        $("#modalBack").classList.remove("show");
        render();
      };
    }
    function exportCsv(){
      const cols=visibleColumns();
      const lines=[cols.map(c=>c.label)];
      const pid=currentProjectId(), model=getModel(pid);
      model.rows.forEach((r,i)=>{
        const sc=rowSchedule(model,r,i);
        lines.push(cols.map(c=>textForCol(c,r,sc)));
      });
      if(window.UI?.downloadCSV) UI.downloadCSV("gantt.csv",lines);
      else {
        const csv=lines.map(r=>r.map(c=>`"${String(c).replaceAll('"','""')}"`).join(",")).join("\n");
        const a=document.createElement("a");
        a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
        a.download="gantt.csv";
        a.click();
        URL.revokeObjectURL(a.href);
      }
    }
    function printA3(){ const oldView=UI.view, oldZoom=UI.zoom, oldPrint=UI.printMode, oldDayW=UI.printDayW; UI.printMode=true; UI.view="diagram"; UI.zoom="print"; document.body.classList.add("printing"); render(); requestAnimationFrame(()=>setTimeout(()=>window.print(),120)); const restore=()=>{ window.removeEventListener("afterprint",restore); UI.printMode=oldPrint; UI.view=oldView; UI.zoom=oldZoom; UI.printDayW=oldDayW; document.body.classList.remove("printing"); render(); }; window.addEventListener("afterprint",restore); setTimeout(()=>{ if(UI.printMode) restore(); },8000); }
    function bind(){ $("#projectSel").onchange=e=>{UI.projectId=e.target.value; render();}; $("#deptSel").onchange=e=>{UI.dept=e.target.value; render();}; $("#resourceSel").onchange=e=>{UI.resource=e.target.value; render();}; $$('[data-zoom]').forEach(b=>b.onclick=()=>{UI.zoom=b.dataset.zoom; render();}); $$('[data-view]').forEach(b=>b.onclick=()=>{UI.view=b.dataset.view; render();}); $("#generateBtn").onclick=()=>{ const pid=currentProjectId(); const m=generateModel(pid); saveModel(pid,m,"Fasen uit standaardtemplate gegenereerd"); toast("Fasen uit standaardtemplate gegenereerd"); render();}; $("#recalcBtn").onclick=applyPredecessors; $("#hoursBtn").onclick=()=>{ CWS?.gantt?.recalculateHours?.(); toast("Uren herberekend voor Capaciteit"); render(); }; $("#depsBtn").onclick=()=>{UI.showDeps=!UI.showDeps; render();}; $("#criticalBtn").onclick=()=>{UI.showCritical=!UI.showCritical; render();}; $("#baselineBtn").onclick=()=>{UI.showBaseline=!UI.showBaseline; render();}; $("#setBaselineBtn").onclick=setBaseline; $("#indentBtn").onclick=()=>indent(1); $("#outdentBtn").onclick=()=>indent(-1); $("#undoBtn").onclick=()=>{CWS?.undo?.(); render();}; $("#redoBtn").onclick=()=>{CWS?.redo?.(); render();}; $("#printBtn").onclick=printA3; $("#columnsBtn").onclick=openColumns; $("#exportBtn").onclick=exportCsv; $("#todayBtn").onclick=()=>{ const wrap=$("#boardWrap"); const todayX=xFor(toIso(new Date()),{start:UI.originStart})-250; wrap.scrollLeft=Math.max(0,todayX); }; $("#modalClose").onclick=()=>$("#modalBack").classList.remove("show"); $("#modalBack").onclick=e=>{ if(e.target.id==="modalBack") $("#modalBack").classList.remove("show"); }; window.addEventListener("keydown",e=>{ if(e.key==="Escape") $("#modalBack").classList.remove("show"); if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();CWS?.undo?.();render();} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="y"){e.preventDefault();CWS?.redo?.();render();} }); if(CWS?.subscribe) CWS.subscribe(()=>{render();}); let resizeTimer=null; window.addEventListener("resize",()=>{ if(UI.printMode) return; clearTimeout(resizeTimer); resizeTimer=setTimeout(()=>render(),120); }); }
    bind(); render();
  })();
  </script>
