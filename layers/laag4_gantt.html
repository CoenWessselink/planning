<body>
  <div class="gantt-shell" data-testid="gantt-root">
    <div class="module-head">
      <div><h1>Laag 4 — Gantt Planning</h1><p>SSOT-koppeling: Projecturen per afdeling → Gantt-taakplanning → Capaciteit.</p></div>
      <div class="status"><span class="badge" id="storageBadge">Opslag controleren…</span><span class="badge ok" id="saveBadge">Gereed</span></div>
    </div>
    <div class="toolbar" data-testid="gantt-toolbar">
      <div class="toolbar-group"><select class="select project" id="projectSel"></select><select class="select" id="deptSel"><option value="">Alle afdelingen</option></select><select class="select" id="resourceSel"><option value="">Alle resources</option></select></div>
      <div class="toolbar-group"><button class="btn" id="todayBtn">Vandaag</button><button class="btn" data-zoom="day">Dag</button><button class="btn active" data-zoom="week">Week</button><button class="btn" data-zoom="month">Maand</button></div>
      <div class="toolbar-group"><button class="btn primary" id="generateBtn">Genereer fasen</button><button class="btn" id="recalcBtn">Herbereken planning</button><button class="btn" id="hoursBtn">Herbereken uren</button></div>
      <div class="toolbar-group"><button class="btn active" id="depsBtn">Afhankelijkheden</button><button class="btn" id="criticalBtn">Kritiek pad</button><button class="btn" id="baselineBtn">Baseline</button><button class="btn" id="setBaselineBtn">Baseline = actueel</button></div>
      <div class="toolbar-group"><button class="btn" id="indentBtn">Inspringen</button><button class="btn" id="outdentBtn">Uitspringen</button><button class="btn" id="undoBtn">Undo</button><button class="btn" id="redoBtn">Redo</button></div>
      <div class="toolbar-group"><button class="btn" data-view="table">Tabel</button><button class="btn active" data-view="both">Beide</button><button class="btn" data-view="diagram">Diagram</button><button class="btn" id="printBtn">Print A3</button><button class="btn" id="exportBtn">Export</button></div>
    </div>
    <div class="notice hidden" id="notice"></div>
    <div class="meta-line" id="metaLine">—</div>
    <div class="board-wrap" id="boardWrap"><div class="board" id="board"><div class="table-pane"><table class="gantt-table"><thead><tr><th>ID</th><th>Taak</th><th>Start</th><th>Einde</th><th>Duur</th><th>Voortgang</th><th>Voorganger</th><th>Afdeling</th><th>Resource</th><th>Kleur</th><th>Lock</th></tr></thead><tbody id="tableRows"></tbody></table></div><div class="chart-pane"><div class="timeline" id="timeline"></div><div id="lanes"></div><svg class="dep-svg" id="depSvg"></svg></div></div></div>
    <div class="context"><div class="context-head">Context / WHY</div><div class="context-body" id="contextBody">Selecteer een taak of balk om details te zien.</div></div>
  </div>
  <div class="modalback" id="modalBack"><div class="modal"><div class="modal-head"><b id="modalTitle">Taak bewerken</b><button class="btn" id="modalClose">Sluiten</button></div><div class="modal-body" id="modalBody"></div><div class="modal-foot"><button class="btn primary" id="modalSave">Opslaan</button></div></div></div>
  <div class="toast" id="toast"></div>
  <script src="../js/core/ui.js"></script>
  <script>
  (function(){
    const CWS = window.parent?.CWS || window.CWS;
    const $ = (s, r=document) => r.querySelector(s);
    const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
    const esc = (s) => String(s ?? "").replace(/[&<>\"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    const cssEsc = (v) => (window.CSS && CSS.escape) ? CSS.escape(String(v)) : String(v).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
    const colorMap = { c1:"#2f6fbd", c2:"#16a34a", c3:"#f59e0b", c4:"#dc2626", c5:"#8b5cf6", c6:"#14b8a6", c7:"#f97316", c8:"#22c55e" };
    const colorNames = { c1:"Blauw", c2:"Groen", c3:"Geel", c4:"Rood", c5:"Paars", c6:"Turquoise", c7:"Oranje", c8:"Lime" };
    const UI = { zoom:"week", view:"both", showDeps:true, showCritical:false, showBaseline:false, projectId:null, dept:"", resource:"", selected:null, originStart:null, drag:null };

    function toast(msg, type){ const el=$("#toast"); el.textContent=msg; el.style.background=type==="bad"?"#991b1b":type==="warn"?"#92400e":"#172033"; el.classList.add("show"); clearTimeout(toast.t); toast.t=setTimeout(()=>el.classList.remove("show"),2200); }
    function setNotice(msg, kind="warn"){ const n=$("#notice"); if(!msg){ n.classList.add("hidden"); return; } n.textContent=msg; n.className="notice"; if(kind==="bad"){ n.style.borderColor="#fecaca"; n.style.background="#fef2f2"; n.style.color="#991b1b"; } else { n.style.borderColor="#fed7aa"; n.style.background="#fff7ed"; n.style.color="#9a3412"; } }
    function setSave(msg, kind="ok"){ const b=$("#saveBadge"); b.textContent=msg; b.className="badge "+(kind==="bad"?"bad":kind==="warn"?"warn":"ok"); }
    const pad = n => String(n).padStart(2,"0");
    function parseDate(v){ if(!v) return null; const s=String(v).trim(); let m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/); if(m) return new Date(Date.UTC(+m[1],+m[2]-1,+m[3])); m=s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/); if(m) return new Date(Date.UTC(+m[3],+m[2]-1,+m[1])); return null; }
    function toIso(v){ const d = v instanceof Date ? v : parseDate(v); return d ? `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}` : ""; }
    function toNL(v){ const d=parseDate(v); return d?`${pad(d.getUTCDate())}-${pad(d.getUTCMonth()+1)}-${d.getUTCFullYear()}`:""; }
    function addDays(iso,n){ const d=parseDate(iso)||new Date(); d.setUTCDate(d.getUTCDate()+n); return toIso(d); }
    function dayDiff(a,b){ const da=parseDate(a), db=parseDate(b); if(!da||!db) return 0; return Math.round((db-da)/86400000); }
    function startOfWeek(iso){ const d=parseDate(iso)||new Date(); const dow=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()-dow+1); return toIso(d); }
    function isoWeek(d0){ const d = new Date(Date.UTC(d0.getUTCFullYear(), d0.getUTCMonth(), d0.getUTCDate())); const day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day); const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1)); return { year:d.getUTCFullYear(), week:Math.ceil((((d-ys)/86400000)+1)/7) }; }
    function duration(s,e){ if(!s||!e) return 0; return Math.max(1, dayDiff(s,e)+1); }
    function state(){ return CWS?.getState?.() || { projects:{order:[],byId:{},deptHours:[]}, resources:{order:[],byId:{}}, departments:{order:[],byId:{}}, tasks:{byProject:{}}, ganttV2:{byProject:{},ui:{}}, gantt:{hoursByDay:{},sourcesByDay:{}} }; }
    function projects(st=state()){ return (st.projects?.order||[]).map(id=>st.projects.byId[id]).filter(Boolean); }
    function departments(st=state()){ const byId=st.departments?.byId||{}; const order=st.departments?.order||Object.keys(byId); const out=order.map(id=>byId[id]).filter(Boolean); if(out.length) return out; const names=[...new Set((st.resources?.order||[]).map(id=>st.resources.byId[id]?.dept).filter(Boolean))]; return names.map(n=>({id:n,name:n})); }
    function resources(st=state()){ return (st.resources?.order||[]).map(id=>st.resources.byId[id]).filter(Boolean); }
    function currentProjectId(){ return UI.projectId || $("#projectSel")?.value || projects()[0]?.id || null; }
    function projectLabel(p){ return `${p.nr||p.code||p.id} - ${p.name||"Project"}`; }
    function getModel(projectId){ const m = CWS?.gantt?.getProjectGantt ? CWS.gantt.getProjectGantt(projectId) : (state().ganttV2?.byProject?.[projectId] || {rows:[],sched:{}}); m.rows = Array.isArray(m.rows)?m.rows:[]; m.sched = m.sched || {}; return m; }
    function saveModel(projectId, model, msg="Opgeslagen"){ if(!projectId) return; if(CWS?.gantt?.saveProjectGantt){ CWS.gantt.saveProjectGantt(projectId, model); } else if(CWS?.setState){ CWS.setState(s=>{ s.ganttV2=s.ganttV2||{byProject:{},ui:{}}; s.ganttV2.byProject[projectId]=model; return s; }); } setSave(msg,"ok"); }
    function firstProjectStart(st, pid){ const p=st.projects?.byId?.[pid]||{}; return toIso(p.startDate||p.start||p.date)||toIso(new Date()); }
    function generateModel(projectId){ const st=state(), p=st.projects.byId[projectId]; if(!p) return {rows:[],sched:{}}; const pack=st.tasks?.byProject?.[projectId]; let phaseData = pack?.phases || [];
      if(!phaseData.length){ const rows=(st.projects?.deptHours||[]).filter(r=>r.projectId===projectId); phaseData = rows.length ? rows.map((r,i)=>({ id:`PH-${i+1}`, name:r.deptId||"Afdeling", tasks:[{id:`T-${i+1}`,name:r.deptId||"Werkzaamheden"}] })) : [{id:"PH-E",name:"Engineering",tasks:[{id:"T-1",name:"Voorbereiding"},{id:"T-2",name:"Uitvoering"}]}]; }
      const model={rows:[],sched:{}}; let cursor=firstProjectStart(st,projectId); let taskSeq=1;
      phaseData.forEach((ph,pi)=>{ const summaryId=`${projectId}-${ph.id||`PH-${pi+1}`}`; const dept=ph.name||"Afdeling"; model.rows.push({id:summaryId,name:dept,type:"summary",level:0,department:dept,progress:0,predecessor:"",locked:false,colorKey:`c${(pi%8)+1}`}); const tasks=(ph.tasks&&ph.tasks.length?ph.tasks:[{id:`T-${pi+1}`,name:dept}]); tasks.forEach((t,ti)=>{ const id=`${projectId}-${t.id||`T-${taskSeq++}`}`; const prev=ti>0?`${projectId}-${tasks[ti-1].id||`T-${taskSeq-2}`}FS`:""; model.rows.push({id,name:t.name||"Taak",type:"task",level:1,parent:summaryId,department:dept,resourceId:"",progress:ti===0?25:0,predecessor:prev,locked:false,colorKey:`c${(pi%8)+1}`}); model.sched[id]={start:cursor,end:addDays(cursor,4)}; cursor=addDays(cursor,5); }); }); return model; }
    function ensureModel(projectId){ let m=getModel(projectId); if(!m.rows.length && projectId){ m=generateModel(projectId); saveModel(projectId,m,"Fasen gegenereerd"); } return m; }
    function summarySchedule(model, index){ const row=model.rows[index]; const children=[]; for(let i=index+1;i<model.rows.length&&Number(model.rows[i].level)>Number(row.level||0);i++){ const sc=model.sched[model.rows[i].id]; if(sc?.start&&sc?.end) children.push(sc); } if(!children.length) return {}; return { start:children.map(x=>x.start).sort()[0], end:children.map(x=>x.end).sort().at(-1) }; }
    function rowSchedule(model, row, index){ return row.type==="summary" ? summarySchedule(model,index) : (model.sched[row.id]||{}); }
    function parsePred(raw){ const s=String(raw||"").trim(); if(!s) return []; return s.split(/[;,]+/).map(x=>x.trim()).filter(Boolean).map(x=>{ const m=x.match(/^(.+?)(FS|SS|FF|SF)([+-]\d+)?$/i); return m?{id:m[1],type:m[2].toUpperCase(),lag:Number(m[3]||0)}:null; }).filter(Boolean); }
    function filteredRows(model){ const dept=UI.dept, res=UI.resource, q=String($("#searchInput")?.value||"").toLowerCase(); return model.rows.map((row,index)=>({row,index,sc:rowSchedule(model,row,index)})).filter(x=>{ const r=x.row; const matchSelf=(!dept||r.department===dept)&&(!res||r.resourceId===res)&&(!q||[r.id,r.name,r.department].join(" ").toLowerCase().includes(q)); if(r.type!=="summary") return matchSelf; // keep summary if any direct/desc child visible
      if(matchSelf) return true; for(let i=x.index+1;i<model.rows.length&&Number(model.rows[i].level)>Number(r.level||0);i++){ const c=model.rows[i]; if((!dept||c.department===dept)&&(!res||c.resourceId===res)&&(!q||[c.id,c.name,c.department].join(" ").toLowerCase().includes(q))) return true; } return false; }); }
    function timelineRange(rows, st, pid){ const dates=[]; rows.forEach(x=>{ if(x.sc?.start)dates.push(x.sc.start); if(x.sc?.end)dates.push(x.sc.end); }); if(!dates.length) dates.push(firstProjectStart(st,pid)); const min=dates.sort()[0]; const max=dates.sort().at(-1); const start=startOfWeek(addDays(min,-7)); let days=UI.zoom==="month"?120:UI.zoom==="week"?70:42; const needed=dayDiff(start,max)+14; days=Math.max(days,needed); return {start,days}; }
    function pxPerDay(){ return UI.zoom==="day"?34:UI.zoom==="week"?22:10; }
    function buildTimeline(range){ const w=pxPerDay(); document.documentElement.style.setProperty("--dayW",w+"px"); const days=[]; for(let i=0;i<range.days;i++) days.push(addDays(range.start,i)); const groups=(kind)=>{ const out=[]; days.forEach((iso,i)=>{ const d=parseDate(iso); const key=kind==="month"?`${d.getUTCFullYear()}-${d.getUTCMonth()}`:`${isoWeek(d).year}-W${isoWeek(d).week}`; const label=kind==="month"?d.toLocaleDateString("nl-NL",{month:"short",year:"numeric",timeZone:"UTC"}):`W${String(isoWeek(d).week).padStart(2,"0")}`; let g=out[out.length-1]; if(!g||g.key!==key) out.push({key,label,count:1}); else g.count++; }); return out; };
      const months=groups("month").map(g=>`<div class="tl-cell" style="grid-column:span ${g.count}">${esc(g.label)}</div>`).join(""); const weeks=groups("week").map(g=>`<div class="tl-cell" style="grid-column:span ${g.count}">${esc(g.label)}</div>`).join(""); const today=toIso(new Date()); const dayHtml=days.map(iso=>{ const d=parseDate(iso), wknd=[0,6].includes(d.getUTCDay()); return `<div class="tl-cell day ${wknd?"weekend":""} ${iso===today?"today":""}">${d.toLocaleDateString("nl-NL",{weekday:"short",timeZone:"UTC"})} ${pad(d.getUTCDate())}</div>`; }).join(""); $("#timeline").innerHTML=`<div class="tl-row" style="grid-template-columns:repeat(${days.length},${w}px)">${months}</div><div class="tl-row" style="grid-template-columns:repeat(${days.length},${w}px)">${weeks}</div><div class="tl-row" style="grid-template-columns:repeat(${days.length},${w}px)">${dayHtml}</div>`; return days; }
    function xFor(iso, range){ return Math.max(0,dayDiff(range.start,iso)*pxPerDay()); }
    function criticalIds(model){ const ids=new Set(); model.rows.forEach(r=>{ if(r.type==="task"&&parsePred(r.predecessor).length) ids.add(r.id); }); const maxEnd=Object.values(model.sched||{}).map(s=>s.end).filter(Boolean).sort().at(-1); model.rows.forEach(r=>{ if(model.sched[r.id]?.end===maxEnd) ids.add(r.id); }); return ids; }
    function renderFilters(){ const st=state(); const pid=currentProjectId(); const projectSel=$("#projectSel"); projectSel.innerHTML=projects(st).filter(p=>p.status!=="Gereed").map(p=>`<option value="${esc(p.id)}">${esc(projectLabel(p))}</option>`).join(""); if(pid) projectSel.value=pid; $("#deptSel").innerHTML='<option value="">Alle afdelingen</option>'+departments(st).map(d=>`<option value="${esc(d.id||d.name)}">${esc(d.name||d.id)}</option>`).join(""); $("#deptSel").value=UI.dept||""; $("#resourceSel").innerHTML='<option value="">Alle resources</option>'+resources(st).map(r=>`<option value="${esc(r.id)}">${esc(r.name||r.id)} (${esc(r.dept||"")})</option>`).join(""); $("#resourceSel").value=UI.resource||""; const status=CWS?.storageStatus; $("#storageBadge").textContent=status?.mode==="api"?`D1 gedeeld v${CWS.getRemoteVersion?.()||0}`:"Lokale browserdata"; $("#storageBadge").className="badge "+(status?.mode==="api"?"ok":"warn"); }
    function render(){ if(!CWS?.getState){ setNotice("CWS Store is niet geladen.","bad"); return; } renderFilters(); const st=state(), pid=currentProjectId(); UI.projectId=pid; if(!pid){ $("#tableRows").innerHTML=""; $("#lanes").innerHTML='<div class="empty">Geen projecten beschikbaar.</div>'; return; } const model=ensureModel(pid); const rows=filteredRows(model); const range=timelineRange(rows,st,pid); UI.originStart=range.start; const days=buildTimeline(range); const cids=UI.showCritical?criticalIds(model):new Set();
      $("#tableRows").innerHTML=rows.map(({row,index,sc})=>{ const d=duration(sc.start,sc.end), indent=Math.max(0,Number(row.level||0))*18; return `<tr data-id="${esc(row.id)}" class="${row.id===UI.selected?"selected":""} ${row.type==="summary"?"summary":""}"><td>${esc(row.id)}</td><td><div class="taskcell"><span class="twisty">${row.type==="summary"?"▾":""}</span><span style="width:${indent}px"></span><input class="taskname" data-k="name" value="${esc(row.name)}" ${row.locked?"disabled":""}></div></td><td><input class="cellinput" data-k="start" value="${esc(toNL(sc.start))}" ${row.type==="summary"||row.locked?"disabled":""}></td><td><input class="cellinput" data-k="end" value="${esc(toNL(sc.end))}" ${row.type==="summary"||row.locked?"disabled":""}></td><td>${d} d</td><td><input class="cellinput smallinput" data-k="progress" value="${Number(row.progress||0)}" ${row.locked?"disabled":""}>%</td><td><input class="cellinput" data-k="predecessor" value="${esc(row.predecessor||"")}" ${row.locked?"disabled":""}></td><td><select class="dept-select" data-k="department" ${row.locked?"disabled":""}>${departments(st).map(d=>`<option value="${esc(d.id||d.name)}" ${String(row.department)===String(d.id||d.name)||String(row.department)===String(d.name)?"selected":""}>${esc(d.name||d.id)}</option>`).join("")}</select></td><td><select class="resource-select" data-k="resourceId" ${row.locked?"disabled":""}><option value="">—</option>${resources(st).map(r=>`<option value="${esc(r.id)}" ${row.resourceId===r.id?"selected":""}>${esc(r.name||r.id)}</option>`).join("")}</select></td><td><select class="color-select" data-k="colorKey" ${row.locked?"disabled":""}>${Object.keys(colorMap).map(k=>`<option value="${k}" ${row.colorKey===k?"selected":""}>${colorNames[k]}</option>`).join("")}</select></td><td><input class="lockbox" type="checkbox" data-k="locked" ${row.locked?"checked":""}></td></tr>`; }).join("");
      $("#lanes").style.width=(days.length*pxPerDay())+"px"; $("#lanes").innerHTML=rows.map(({row,index,sc})=>{ const left=xFor(sc.start||range.start,range), width=Math.max(pxPerDay(),duration(sc.start,sc.end)*pxPerDay()); const isCritical=cids.has(row.id); const base=row.baselineStart&&row.baselineEnd?`<div class="baseline" style="left:${xFor(row.baselineStart,range)}px;width:${Math.max(pxPerDay(),duration(row.baselineStart,row.baselineEnd)*pxPerDay())}px"></div>`:""; return `<div class="lane" data-id="${esc(row.id)}">${base}<div class="bar ${row.type==="summary"?"summary":""} ${row.locked?"locked":""} ${isCritical?"critical":""}" data-id="${esc(row.id)}" style="left:${left}px;width:${width}px;background:${esc(colorMap[row.colorKey]||colorMap.c1)}"><span class="handle left"></span><span class="bar-label">${esc(row.name)}</span><span class="handle right"></span></div></div>`; }).join("");
      $("#board").className="board "+(UI.view==="table"?"table-only":UI.view==="diagram"?"diagram-only":""); $("#metaLine").textContent=`${rows.length} regels | zoom ${UI.zoom} | urenbron: Projecturen per afdeling | dagen: ${days.length}`; wireRows(model,pid); wireBars(model,pid,range); drawDeps(model,rows,range); renderContext(model); setNotice(CWS.storageStatus?.mode==="api"?"":"Let op: je werkt nu met lokale browserdata. Collega's zien deze wijzigingen niet.","warn"); updateButtons(); }
    function updateButtons(){ $$('[data-zoom]').forEach(b=>b.classList.toggle('active',b.dataset.zoom===UI.zoom)); $$('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===UI.view)); $('#depsBtn').classList.toggle('active',UI.showDeps); $('#criticalBtn').classList.toggle('active',UI.showCritical); $('#baselineBtn').classList.toggle('active',UI.showBaseline); $('#undoBtn').disabled=!(CWS?.canUndo?.()); $('#redoBtn').disabled=!(CWS?.canRedo?.()); }
    function updateRow(model,rowId,patch){ const row=model.rows.find(r=>r.id===rowId); if(!row) return; Object.assign(row,patch); saveModel(currentProjectId(),model); render(); }
    function wireRows(model,pid){ $$("#tableRows tr").forEach(tr=>{ const rowId=tr.dataset.id; tr.addEventListener("click",()=>{UI.selected=rowId; render();}); tr.addEventListener("dblclick",()=>openEdit(rowId)); tr.querySelectorAll("input,select").forEach(el=>{ el.addEventListener("change",()=>{ const row=model.rows.find(r=>r.id===rowId); if(!row) return; const k=el.dataset.k; if(k==="start"||k==="end"){ const iso=toIso(el.value); if(!iso){toast("Ongeldige datum","bad");render();return;} model.sched[rowId]=model.sched[rowId]||{}; model.sched[rowId][k]=iso; } else if(k==="progress"){ row.progress=Math.max(0,Math.min(100,Number(el.value)||0)); } else if(k==="locked"){ row.locked=el.checked; } else if(k==="predecessor"){ const v=el.value.trim(); if(parsePred(v).some(p=>p.id===rowId)){toast("Circulaire afhankelijkheid geweigerd","bad");render();return;} row.predecessor=v; } else { row[k]=el.value; } saveModel(pid,model); render(); }); }); }); }
    function wireBars(model,pid,range){ $$(".bar").forEach(bar=>{ const id=bar.dataset.id; const row=model.rows.find(r=>r.id===id); if(!row||row.type==="summary"||row.locked) return; bar.addEventListener("pointerdown",e=>{ const handle=e.target.classList.contains("left")?"left":e.target.classList.contains("right")?"right":"move"; UI.drag={id,handle,startX:e.clientX,orig:{...(model.sched[id]||{})}}; bar.setPointerCapture(e.pointerId); e.preventDefault(); }); }); }
    window.addEventListener("pointermove",e=>{ if(!UI.drag) return; const d=Math.round((e.clientX-UI.drag.startX)/pxPerDay()); const sc={...UI.drag.orig}; if(UI.drag.handle==="move"){ sc.start=addDays(UI.drag.orig.start,d); sc.end=addDays(UI.drag.orig.end,d); } else if(UI.drag.handle==="left"){ sc.start=addDays(UI.drag.orig.start,d); if(dayDiff(sc.start,sc.end)<0) sc.start=sc.end; } else { sc.end=addDays(UI.drag.orig.end,d); if(dayDiff(sc.start,sc.end)<0) sc.end=sc.start; } const bar=$(`.bar[data-id="${cssEsc(UI.drag.id)}"]`); if(bar){ bar.style.left=xFor(sc.start,{start:UI.originStart})+"px"; bar.style.width=Math.max(pxPerDay(),duration(sc.start,sc.end)*pxPerDay())+"px"; bar.dataset.tmpStart=sc.start; bar.dataset.tmpEnd=sc.end; } });
    window.addEventListener("pointerup",()=>{ if(!UI.drag) return; const id=UI.drag.id, pid=currentProjectId(), model=getModel(pid); const bar=$(`.bar[data-id="${cssEsc(id)}"]`); if(bar?.dataset.tmpStart&&bar?.dataset.tmpEnd){ model.sched[id]={start:bar.dataset.tmpStart,end:bar.dataset.tmpEnd}; saveModel(pid,model,"Balk bijgewerkt"); } UI.drag=null; render(); });
    function drawDeps(model,rows,range){ const svg=$("#depSvg"); svg.innerHTML=""; if(!UI.showDeps) return; const rowIndex=new Map(rows.map((x,i)=>[x.row.id,i])); const w=pxPerDay(); svg.setAttribute("width",Math.max(900,(range.days*w))); svg.setAttribute("height",rows.length*48); model.rows.forEach(row=>{ const i=rowIndex.get(row.id); if(i==null) return; parsePred(row.predecessor).forEach(p=>{ const pi=rowIndex.get(p.id); if(pi==null) return; const predSc=model.sched[p.id]||summarySchedule(model,model.rows.findIndex(r=>r.id===p.id)); const sc=model.sched[row.id]||summarySchedule(model,model.rows.findIndex(r=>r.id===row.id)); if(!predSc?.end||!sc?.start) return; const x1=xFor(predSc.end,range)+duration(predSc.start,predSc.end)*w, y1=pi*48+24, x2=xFor(sc.start,range)+2, y2=i*48+24; const mid=x1+Math.max(18,(x2-x1)/2); const path=document.createElementNS("http://www.w3.org/2000/svg","path"); path.setAttribute("d",`M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`); path.setAttribute("fill","none"); path.setAttribute("stroke","rgba(15,23,42,.45)"); path.setAttribute("stroke-width","1.5"); svg.appendChild(path); }); }); }
    function renderContext(model){ const row=model.rows.find(r=>r.id===UI.selected); if(!row){ $("#contextBody").textContent="Selecteer een taak of balk om details te zien."; return; } const sc=model.sched[row.id]||{}; $("#contextBody").innerHTML=`<div class="ctx-grid"><div class="ctx-card"><b>Taak</b>${esc(row.name)}</div><div class="ctx-card"><b>Start / eind</b>${esc(toNL(sc.start))} — ${esc(toNL(sc.end))}</div><div class="ctx-card"><b>Afdeling</b>${esc(row.department||"—")}</div><div class="ctx-card"><b>Voorganger</b>${esc(row.predecessor||"—")}</div></div>`; }
    function applyPredecessors(){ const pid=currentProjectId(), model=getModel(pid); let changed=0; model.rows.forEach(row=>{ if(row.type!=="task"||row.locked) return; parsePred(row.predecessor).forEach(p=>{ const pred=model.sched[p.id]; const cur=model.sched[row.id]; if(!pred||!cur) return; const min=addDays(pred.end,1+(p.lag||0)); if(cur.start<min){ const dur=duration(cur.start,cur.end); cur.start=min; cur.end=addDays(min,dur-1); changed++; } }); }); saveModel(pid,model,changed?"Planning herberekend":"Planning ongewijzigd"); toast(changed?`${changed} taak/taken verschoven`:"Planning al geldig"); render(); }
    function setBaseline(){ const pid=currentProjectId(), model=getModel(pid); model.rows.forEach(row=>{ const sc=model.sched[row.id]; if(sc?.start&&sc?.end){ row.baselineStart=sc.start; row.baselineEnd=sc.end; }}); saveModel(pid,model,"Baseline ingesteld"); render(); }
    function indent(delta){ const pid=currentProjectId(), model=getModel(pid); const row=model.rows.find(r=>r.id===UI.selected); if(!row||row.type==="summary"||row.locked){toast("Selecteer een ontgrendelde taak","warn");return;} row.level=Math.max(1,Number(row.level||1)+delta); saveModel(pid,model); render(); }
    function openEdit(rowId){ const pid=currentProjectId(), model=getModel(pid), row=model.rows.find(r=>r.id===rowId), sc=model.sched[rowId]||{}; if(!row) return; $("#modalTitle").textContent="Taak bewerken"; $("#modalBody").innerHTML=`<div class="form-grid"><label class="field">Taak<input id="mName" value="${esc(row.name)}"></label><label class="field">Afdeling<input id="mDept" value="${esc(row.department||"")}"></label><label class="field">Start<input id="mStart" value="${esc(toNL(sc.start))}"></label><label class="field">Einde<input id="mEnd" value="${esc(toNL(sc.end))}"></label><label class="field">Voortgang<input id="mProg" type="number" min="0" max="100" value="${Number(row.progress||0)}"></label><label class="field">Voorganger<input id="mPred" value="${esc(row.predecessor||"")}"></label><label class="field">Kleur<select id="mColor">${Object.keys(colorMap).map(k=>`<option value="${k}" ${row.colorKey===k?"selected":""}>${colorNames[k]}</option>`).join("")}</select></label><label class="field">Lock<select id="mLock"><option value="0" ${!row.locked?"selected":""}>Nee</option><option value="1" ${row.locked?"selected":""}>Ja</option></select></label><label class="field" style="grid-column:1/-1">WHY / notitie<textarea id="mWhy">${esc(row.why||"")}</textarea></label></div>`; $("#modalBack").classList.add("show"); $("#modalSave").onclick=()=>{ row.name=$("#mName").value.trim()||row.name; row.department=$("#mDept").value.trim()||row.department; row.progress=Math.max(0,Math.min(100,Number($("#mProg").value)||0)); row.predecessor=$("#mPred").value.trim(); row.colorKey=$("#mColor").value; row.locked=$("#mLock").value==="1"; row.why=$("#mWhy").value.trim(); if(row.type!=="summary"){ model.sched[rowId]={start:toIso($("#mStart").value)||sc.start,end:toIso($("#mEnd").value)||sc.end}; } saveModel(pid,model); $("#modalBack").classList.remove("show"); render(); }; }
    function exportCsv(){ const lines=[["ID","Taak","Start","Einde","Duur","Voortgang","Voorganger","Afdeling","Resource","Lock"]]; const pid=currentProjectId(), model=getModel(pid); model.rows.forEach((r,i)=>{ const sc=rowSchedule(model,r,i); lines.push([r.id,r.name,toNL(sc.start),toNL(sc.end),duration(sc.start,sc.end),r.progress||0,r.predecessor||"",r.department||"",r.resourceId||"",r.locked?"ja":"nee"]); }); if(window.UI?.downloadCSV) UI.downloadCSV("gantt.csv",lines); else { const csv=lines.map(r=>r.map(c=>`"${String(c).replaceAll('"','""')}"`).join(",")).join("\n"); const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="gantt.csv"; a.click(); URL.revokeObjectURL(a.href);} }
    function bind(){ $("#projectSel").onchange=e=>{UI.projectId=e.target.value; render();}; $("#deptSel").onchange=e=>{UI.dept=e.target.value; render();}; $("#resourceSel").onchange=e=>{UI.resource=e.target.value; render();}; $$('[data-zoom]').forEach(b=>b.onclick=()=>{UI.zoom=b.dataset.zoom; render();}); $$('[data-view]').forEach(b=>b.onclick=()=>{UI.view=b.dataset.view; render();}); $("#generateBtn").onclick=()=>{ const pid=currentProjectId(); const m=generateModel(pid); saveModel(pid,m,"Fasen gegenereerd"); render();}; $("#recalcBtn").onclick=applyPredecessors; $("#hoursBtn").onclick=()=>{ CWS?.gantt?.recalculateHours?.(); toast("Uren herberekend voor Capaciteit"); render(); }; $("#depsBtn").onclick=()=>{UI.showDeps=!UI.showDeps; render();}; $("#criticalBtn").onclick=()=>{UI.showCritical=!UI.showCritical; render();}; $("#baselineBtn").onclick=()=>{UI.showBaseline=!UI.showBaseline; render();}; $("#setBaselineBtn").onclick=setBaseline; $("#indentBtn").onclick=()=>indent(1); $("#outdentBtn").onclick=()=>indent(-1); $("#undoBtn").onclick=()=>{CWS?.undo?.(); render();}; $("#redoBtn").onclick=()=>{CWS?.redo?.(); render();}; $("#printBtn").onclick=()=>window.print(); $("#exportBtn").onclick=exportCsv; $("#todayBtn").onclick=()=>{ const wrap=$("#boardWrap"); const todayX=xFor(toIso(new Date()),{start:UI.originStart})-250; wrap.scrollLeft=Math.max(0,todayX); }; $("#modalClose").onclick=()=>$("#modalBack").classList.remove("show"); $("#modalBack").onclick=e=>{ if(e.target.id==="modalBack") $("#modalBack").classList.remove("show"); }; window.addEventListener("keydown",e=>{ if(e.key==="Escape") $("#modalBack").classList.remove("show"); if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();CWS?.undo?.();render();} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="y"){e.preventDefault();CWS?.redo?.();render();} }); if(CWS?.subscribe) CWS.subscribe(()=>{render();}); }
    bind(); render();
  })();
  </script>
