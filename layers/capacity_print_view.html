<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CAPACITEITSOVERZICHT</title>
</head>
<body>
  <script>
    (function(){
      "use strict";
      const params = new URLSearchParams(location.search);
      const key = params.get("key") || "";
      const html = key ? localStorage.getItem(key) : "";
      if(key) {
        try { localStorage.removeItem(key); } catch (_error) {}
      }
      if(!html || !html.includes("CWS_CAPACITY_TASCHE_A3_PRINT_V159") || !html.includes("CAPACITEITSOVERZICHT")){
        document.body.innerHTML = "<p style=\"font:16px Arial,sans-serif;padding:24px\">Capaciteitsoverzicht kon niet worden geladen. Sluit dit venster en probeer opnieuw.</p>";
        return;
      }
      document.open();
      document.write(html.replace("</body>", "<script>(function(){function p(){setTimeout(function(){window.focus();window.print();},180)}if(document.readyState==='complete'){p()}else{window.addEventListener('load',p,{once:true})}}());<\/script></body>"));
      document.close();
    })();
  </script>
</body>
</html>
