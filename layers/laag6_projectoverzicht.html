<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Projectoverzicht</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    body{padding:14px}.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .content{padding:14px}.tablewrap{overflow:auto;border:1px solid var(--border);border-radius:8px}
    table{width:100%;border-collapse:separate;border-spacing:0}th,td{padding:9px;border-bottom:1px solid var(--border);white-space:nowrap;text-align:left}
    th{position:sticky;top:0;background:#f8fafc;z-index:2}.progress{width:110px;height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden}
    .progress i{display:block;height:100%;background:#2f6fbd}.tabs360{display:flex;gap:6px;margin-bottom:12px}.tab360.active{background:#dbeafe}
    .section360{min-height:220px}.status-select{min-width:110px}
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-head">
      <div><strong>Laag 6 - Projectoverzicht</strong><div class="smallmuted">Projectstatus, Gantt-voortgang en Project 360</div></div>
      <div class="toolbar">
        <input class="input search" id="search" placeholder="Zoeken...">
        <button class="btn" id="undo">Undo</button>
        <button class="btn" id="redo">Redo</button>
        <button class="btn" id="export">Export CSV</button>
        <button class="btn" id="print">Print</button>
      </div>
    </div>
    <div class="content">
      <div class="tablewrap"><table><thead id="head"></thead><tbody id="body"></tbody></table></div>
      <div class="smallmuted" id="count" style="margin-top:8px"></div>
    </div>
  </div>
  <script>const CWS = window.parent?.CWS || window.CWS;</script>
  <script src="../js/core/ui.js"></script>
  <script>
    const $ = s => document.querySelector(s);
    const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    const projects = st => (st.projects.order || []).map(id => st.projects.byId[id]).filter(Boolean);
    const taskNames = st => {
      const names = [];
      Object.values(st.tasks?.byProject || {}).forEach(pack => (pack.phases || []).forEach(ph => (ph.tasks || []).forEach(t => {
        if(t.name && !names.includes(t.name)) names.push(t.name);
      })));
      return names.slice(0, 8);
    };
    function progressFor(st, projectId){
      const phases = st.ganttV2?.byProject?.[projectId]?.rows || [];
      if(phases.length){
        const values = phases.filter(r => r.type === "task").map(r => Number(r.progress || 0));
        return values.length ? Math.round(values.reduce((a,b)=>a+b,0)/values.length) : 0;
      }
      const p = st.projects.byId[projectId];
      return p?.status === "Gereed" ? 100 : p?.status === "In uitvoering" ? 60 : p?.status === "Ingepland" ? 25 : 0;
    }
    function taskStatus(st, projectId, name){
      const rows = st.ganttV2?.byProject?.[projectId]?.rows || [];
      const row = rows.find(r => r.name === name);
      if(!row) return "NVT";
      return Number(row.progress || 0) >= 100 ? "Gereed" : "Open";
    }
    function render(){
      const st = CWS.getState();
      const dynamic = taskNames(st);
      $("#head").innerHTML = `<tr><th>Project</th><th>Opdrachtgever</th><th>Status</th><th>Start</th><th>Uren</th><th>Voortgang</th>${dynamic.map(n=>`<th>${esc(n)}</th>`).join("")}<th>Actie</th></tr>`;
      const q = $("#search").value.toLowerCase().trim();
      const rows = projects(st).filter(p => JSON.stringify(p).toLowerCase().includes(q));
      $("#body").innerHTML = rows.map(p => {
        const progress = progressFor(st,p.id);
        const status = st.projectOverview?.statusByProject?.[p.id] || p.status || "In te plannen";
        return `<tr data-id="${esc(p.id)}">
          <td><strong>${esc(p.nr || p.id)}</strong><br><span class="smallmuted">${esc(p.name)}</span></td>
          <td>${esc(p.client)}</td>
          <td><select class="input status-select" data-status><option${status==="In te plannen"?" selected":""}>In te plannen</option><option${status==="Ingepland"?" selected":""}>Ingepland</option><option${status==="In uitvoering"?" selected":""}>In uitvoering</option><option${status==="Gereed"?" selected":""}>Gereed</option></select></td>
          <td>${esc(p.start || "-")}</td><td>${Number(p.needHours || 0).toFixed(1)}</td>
          <td><div class="progress"><i style="width:${progress}%"></i></div><span class="smallmuted">${progress}%</span></td>
          ${dynamic.map(n=>`<td>${taskStatus(st,p.id,n)}</td>`).join("")}
          <td><button class="btn" data-360>Project 360</button></td>
        </tr>`;
      }).join("");
      $("#count").textContent = `${rows.length} projecten`;
      $("#body").querySelectorAll("[data-status]").forEach(el => el.addEventListener("change", e => {
        const id = e.target.closest("tr").dataset.id;
        CWS.mutate("projectoverview_status", {projectId:id,status:e.target.value}, s => {
          s.projectOverview.statusByProject[id] = e.target.value;
          s.projects.byId[id].status = e.target.value;
        });
        render();
      }));
      $("#body").querySelectorAll("[data-360]").forEach(el => el.addEventListener("click", e => open360(e.target.closest("tr").dataset.id)));
    }
    function open360(projectId){
      const st=CWS.getState(), p=st.projects.byId[projectId];
      const wrap=document.createElement("div");
      const tabs=["Algemeen","Planning","Capaciteit","Status","Notities","Historie"];
      wrap.innerHTML=`<div class="tabs360">${tabs.map((t,i)=>`<button class="btn tab360${i?"":" active"}" data-tab="${t}">${t}</button>`).join("")}</div><div class="section360" id="section360"></div>`;
      const show = tab => {
        const fresh=CWS.getState();
        const allocations=Object.entries(fresh.allocations.byWeek||{}).flatMap(([week,rs])=>(rs||[]).filter(r=>r.projectId===projectId).map(r=>({...r,week})));
        const notes=fresh.projectOverview.notesByProject[projectId]||"";
        const history=(fresh.auditLog||[]).filter(a=>a.meta?.projectId===projectId).slice(-20).reverse();
        const html={
          Algemeen:`<h3>${esc(p.nr)} - ${esc(p.name)}</h3><p>Opdrachtgever: ${esc(p.client)}</p><p>Startdatum: ${esc(p.start||"-")}</p>`,
          Planning:`<h3>Planning</h3><p>${allocations.length} toewijzingen, ${allocations.reduce((n,r)=>n+Number(r.hours||0),0)} uur ingepland.</p>`,
          Capaciteit:`<h3>Capaciteit</h3><p>Benodigd: ${Number(p.needHours||0)} uur.</p>`,
          Status:`<h3>Status</h3><p>${esc(p.status||"In te plannen")} | ${progressFor(fresh,projectId)}% voortgang</p>`,
          Notities:`<h3>Notities</h3><textarea class="input" id="notes360" style="width:100%;min-height:140px">${esc(notes)}</textarea><p><button class="btn" id="saveNotes">Opslaan</button></p>`,
          Historie:`<h3>Historie</h3>${history.length?history.map(a=>`<p><strong>${esc(a.action)}</strong> <span class="smallmuted">${esc(a.ts)}</span></p>`).join(""):"<p>Geen historie.</p>"}`
        };
        wrap.querySelector("#section360").innerHTML=html[tab];
        wrap.querySelector("#saveNotes")?.addEventListener("click",()=>{
          const value=wrap.querySelector("#notes360").value;
          CWS.mutate("projectoverview_note",{projectId},s=>{s.projectOverview.notesByProject[projectId]=value;});
          UI.toast("Notitie opgeslagen");
        });
      };
      wrap.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{
        wrap.querySelectorAll("[data-tab]").forEach(x=>x.classList.remove("active")); b.classList.add("active"); show(b.dataset.tab);
      }));
      show("Algemeen");
      UI.openModal({title:"Project 360",subtitle:`${p.nr} - ${p.name}`,contentEl:wrap,actions:[{label:"Sluiten",onClick:({close})=>close()}]});
    }
    $("#search").addEventListener("input",render);
    $("#undo").addEventListener("click",()=>{CWS.undo();render();});
    $("#redo").addEventListener("click",()=>{CWS.redo();render();});
    $("#export").addEventListener("click",()=>{const st=CWS.getState();UI.downloadCSV("projectoverzicht.csv",[["Project","Naam","Klant","Status","Voortgang"],...projects(st).map(p=>[p.nr,p.name,p.client,p.status,progressFor(st,p.id)])]);});
    $("#print").addEventListener("click",()=>UI.printA3("Projectoverzicht","CWS Planning",document.querySelector(".tablewrap").innerHTML));
    render();
  </script>
</body>
</html>
