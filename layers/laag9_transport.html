<!doctype html>
<html lang="nl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Transportplanning</title><link rel="stylesheet" href="../css/theme.css">
<style>
body{padding:14px}.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.content{padding:14px}.tablewrap{overflow:auto;border:1px solid var(--border);border-radius:8px}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}th{background:#f8fafc;position:sticky;top:0}.conflict{background:#fef2f2;color:#991b1b}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid .wide{grid-column:1/-1}.danger{color:#b91c1c}
</style></head>
<body><div class="panel"><div class="panel-head"><div><strong>Laag 9 - Transportplanning</strong><div class="smallmuted">Ritlijst, projectkoppeling en overlapcontrole</div></div><div class="toolbar"><input class="input" id="dateFilter" type="date"><button class="btn" id="newTrip">Nieuwe rit</button><button class="btn" id="export">Export</button><button class="btn" id="print">Print</button></div></div><div class="content"><div class="tablewrap"><table><thead><tr><th>Datum</th><th>Tijd</th><th>Project</th><th>Voertuig</th><th>Chauffeur</th><th>Van</th><th>Naar</th><th>Rijtijd</th><th>Status</th><th></th></tr></thead><tbody id="body"></tbody></table></div><div class="smallmuted" id="count" style="margin-top:8px"></div></div></div>
<script>const CWS = window.parent?.CWS || window.CWS;</script><script src="../js/core/ui.js"></script><script>
const $=s=>document.querySelector(s),esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const byId=(rows,id)=>rows.find(r=>r.id===id)||{};
function hasConflict(trip,trips){return trips.some(other=>other.id!==trip.id&&other.date===trip.date&&(other.vehicleId===trip.vehicleId||other.driverId===trip.driverId)&&trip.start<other.end&&trip.end>other.start);}
function render(){const st=CWS.getState(),filter=$("#dateFilter").value;const rows=st.transport.trips.filter(r=>!filter||r.date===filter);$("#body").innerHTML=rows.map(r=>{const conflict=hasConflict(r,st.transport.trips);return `<tr data-id="${r.id}" class="${conflict?"conflict":""}"><td>${esc(r.date)}</td><td>${esc(r.start)} - ${esc(r.end)}</td><td>${esc(st.projects.byId[r.projectId]?.nr||"-")}</td><td>${esc(byId(st.transport.vehicles,r.vehicleId).name)}</td><td>${esc(byId(st.transport.drivers,r.driverId).name)}</td><td>${esc(byId(st.transport.locations,r.fromId).name)}</td><td>${esc(byId(st.transport.locations,r.toId).name)}</td><td>${Number(r.minutes||0)} min</td><td>${conflict?"Conflict":esc(r.status)}</td><td><button class="btn" data-edit>Bewerken</button> <button class="btn danger" data-del>Verwijder</button></td></tr>`}).join("");$("#count").textContent=`${rows.length} ritten | ${rows.filter(r=>hasConflict(r,st.transport.trips)).length} conflicten`;$("#body").querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",e=>openTrip(e.target.closest("tr").dataset.id)));$("#body").querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",e=>{const id=e.target.closest("tr").dataset.id;if(confirm("Rit verwijderen?")){CWS.mutate("transport_delete",{tripId:id},s=>{s.transport.trips=s.transport.trips.filter(r=>r.id!==id);});render();}}));}
function openTrip(id){const st=CWS.getState(),trip=st.transport.trips.find(r=>r.id===id)||{id:"TR-"+Date.now(),date:new Date().toISOString().slice(0,10),start:"08:00",end:"09:00",minutes:60,status:"Gepland"};const wrap=document.createElement("div");const opts=(rows,value,label="name")=>rows.map(r=>`<option value="${r.id}"${r.id===value?" selected":""}>${esc(r[label]||r.id)}</option>`).join("");wrap.innerHTML=`<div class="grid"><label>Datum<input class="input wide" id="tDate" type="date" value="${esc(trip.date)}"></label><label>Start<input class="input" id="tStart" type="time" value="${esc(trip.start)}"></label><label>Einde<input class="input" id="tEnd" type="time" value="${esc(trip.end)}"></label><label>Project<select class="input" id="tProject">${opts(st.projects.order.map(x=>st.projects.byId[x]),trip.projectId,"name")}</select></label><label>Voertuig<select class="input" id="tVehicle">${opts(st.transport.vehicles,trip.vehicleId)}</select></label><label>Chauffeur<select class="input" id="tDriver">${opts(st.transport.drivers,trip.driverId)}</select></label><label>Van<select class="input" id="tFrom">${opts(st.transport.locations,trip.fromId)}</select></label><label>Naar<select class="input" id="tTo">${opts(st.transport.locations,trip.toId)}</select></label><label>Rijtijd (min)<input class="input" id="tMinutes" type="number" min="0" value="${Number(trip.minutes||0)}"></label><label>Status<select class="input" id="tStatus"><option>Gepland</option><option>Onderweg</option><option>Gereed</option></select></label></div>`;wrap.querySelector("#tStatus").value=trip.status;UI.openModal({title:id?"Rit bewerken":"Nieuwe rit",contentEl:wrap,actions:[{label:"Annuleren",onClick:({close})=>close()},{label:"Opslaan",className:"btn primary",onClick:({close})=>{const next={id:trip.id,date:wrap.querySelector("#tDate").value,start:wrap.querySelector("#tStart").value,end:wrap.querySelector("#tEnd").value,projectId:wrap.querySelector("#tProject").value,vehicleId:wrap.querySelector("#tVehicle").value,driverId:wrap.querySelector("#tDriver").value,fromId:wrap.querySelector("#tFrom").value,toId:wrap.querySelector("#tTo").value,minutes:Number(wrap.querySelector("#tMinutes").value),status:wrap.querySelector("#tStatus").value};if(!next.date||!next.start||!next.end||next.end<=next.start)return UI.toast("Controleer datum en tijden.");CWS.mutate(id?"transport_update":"transport_create",{tripId:next.id},s=>{const i=s.transport.trips.findIndex(r=>r.id===next.id);if(i>=0)s.transport.trips[i]=next;else s.transport.trips.push(next);});close();render();}}]});}
$("#newTrip").addEventListener("click",()=>openTrip(null));$("#dateFilter").addEventListener("change",render);$("#export").addEventListener("click",()=>{const st=CWS.getState();UI.downloadCSV("transport.csv",[["Datum","Start","Einde","Project","Voertuig","Chauffeur","Minuten"],...st.transport.trips.map(r=>[r.date,r.start,r.end,st.projects.byId[r.projectId]?.nr,byId(st.transport.vehicles,r.vehicleId).name,byId(st.transport.drivers,r.driverId).name,r.minutes])]);});$("#print").addEventListener("click",()=>UI.printA3("Transportplanning","CWS Planning",document.querySelector(".tablewrap").innerHTML));render();
</script></body></html>
